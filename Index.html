<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZapCaderno Pro</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { font-family: sans-serif; background-color: #f8fafc; margin: 0; padding: 0; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* TELA DE BOAS-VINDAS - Camada máxima */
        #telaBemVindo {
            position: fixed; top:0; left:0; width:100%; height:100%; 
            background: white; z-index: 99999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 30px; text-align: center;
        }

        #bloqueioPagamento {
            display: none; position: fixed; inset: 0; background: #1e1b4b;
            z-index: 99990; flex-direction: column; justify-content: center;
            align-items: center; padding: 20px; color: white; text-align: center;
        }

        .bg-custom-blue { background-color: #4f46e5; }
        
        .nav-bar {
            position: fixed; bottom: 20px; left: 15px; right: 15px; height: 75px;
            background: white; border-radius: 25px; display: flex; 
            justify-content: space-around; align-items: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); z-index: 100;
        }

        .btn-plus {
            background: #4f46e5; color: white; width: 55px; height: 55px;
            border-radius: 18px; display: flex; align-items: center; justify-content: center;
            margin-top: -45px; box-shadow: 0 8px 20px rgba(79, 70, 229, 0.3);
        }
        
        button { cursor: pointer; touch-action: manipulation; }
    </style>
</head>
<body class="pb-32">

    <div id="telaBemVindo">
        <div class="w-20 h-20 bg-indigo-100 rounded-3xl flex items-center justify-center mb-6">
            <i class="fas fa-book-open text-3xl text-indigo-600"></i>
        </div>
        <h1 class="text-3xl font-extrabold text-gray-800 mb-2">ZapCaderno Pro</h1>
        <p class="text-gray-500 mb-10 text-sm px-4">Aposente o caderno! Controle fiados e cobre pelo WhatsApp.</p>
        
        <button id="btnComeçar" onclick="fecharBemVindo()" class="w-full max-w-xs bg-indigo-600 text-white font-bold py-5 rounded-2xl shadow-xl" style="border:none;">
            COMEÇAR AGORA
        </button>
    </div>

    <div id="bloqueioPagamento">
        <i class="fas fa-lock text-5xl text-yellow-400 mb-4"></i>
        <h2 class="text-2xl font-bold mb-2">Acesso Suspenso</h2>
        <p class="text-indigo-200 text-sm mb-8 px-6">Sua mensalidade venceu.</p>
        <a href="https://mpago.la/2CGD9Ar" target="_blank" class="block w-full max-w-xs bg-indigo-500 text-white font-bold py-4 rounded-xl mb-4 text-center no-underline">PAGAR R$ 14,99</a>
        <input type="text" id="chaveAtivacao" placeholder="Senha do Mês" class="w-full max-w-xs p-4 rounded-xl text-center mb-3 uppercase font-bold text-gray-900">
        <button onclick="verificarChave()" class="w-full max-w-xs bg-white bg-opacity-20 text-white py-3 rounded-xl border-white font-bold">ATIVAR</button>
    </div>

    <header class="bg-custom-blue text-white p-6 pb-12 rounded-b-3xl shadow-lg">
        <div class="flex justify-between items-center mb-2">
            <h1 class="text-xl font-bold">ZapCaderno Pro</h1>
            <span id="statusBadge" class="text-[10px] bg-black bg-opacity-20 px-3 py-1 rounded-full font-bold">...</span>
        </div>
        <p id="nomeLojaExibicao" class="text-indigo-100 text-xs italic">Minha Loja</p>
    </header>

    <main class="p-4 -mt-8">
        <section id="dashboard" class="tab-content active">
            <div class="bg-white p-5 rounded-3xl shadow-md mb-6 flex justify-between items-center">
                <div>
                    <p class="text-[10px] text-red-500 font-bold uppercase">A Receber</p>
                    <p id="totalReceber" class="text-2xl font-black text-gray-800">R$ 0,00</p>
                </div>
                <div class="text-right">
                    <p id="totalHistorico" class="text-md font-bold text-emerald-600">R$ 0,00</p>
                </div>
            </div>
            <input type="text" id="buscaCliente" placeholder="Buscar cliente..." oninput="renderDashboard()" class="w-full p-4 bg-white rounded-2xl shadow-sm mb-6 outline-none text-sm border-gray-100 border">
            <div id="listaDividas" class="space-y-4"></div>
        </section>

        <section id="novo" class="tab-content">
            <div class="bg-white p-6 rounded-3xl shadow-xl">
                <form id="formFiado" class="space-y-4">
                    <input type="text" id="nome" placeholder="Nome" required class="w-full p-4 bg-gray-50 rounded-xl outline-none">
                    <input type="tel" id="whatsapp" placeholder="Zap (DDD+Número)" required class="w-full p-4 bg-gray-50 rounded-xl outline-none">
                    <input type="text" id="produto" placeholder="Produto" required class="w-full p-4 bg-gray-50 rounded-xl outline-none">
                    <input type="text" id="valor" placeholder="R$ 0,00" required class="w-full p-4 bg-gray-50 rounded-xl outline-none font-bold text-indigo-600">
                    <input type="date" id="data" required class="w-full p-4 bg-gray-50 rounded-xl outline-none">
                    <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-5 rounded-xl">SALVAR</button>
                </form>
            </div>
        </section>

        <section id="clientes" class="tab-content">
            <div id="listaFichasClientes" class="space-y-3"></div>
        </section>

        <section id="config" class="tab-content">
            <div class="bg-white p-6 rounded-3xl shadow-md space-y-4">
                <input type="text" id="cfgLoja" placeholder="Nome da Loja" class="w-full p-4 bg-gray-50 rounded-xl outline-none">
                <input type="text" id="cfgPix" placeholder="Chave PIX" class="w-full p-4 bg-gray-50 rounded-xl outline-none">
                <button onclick="salvarConfig()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold">SALVAR</button>
                <div class="grid grid-cols-2 gap-2 pt-4">
                    <button onclick="exportarBackup()" class="bg-gray-100 p-3 rounded-xl text-[10px] font-bold uppercase">Exportar</button>
                    <button onclick="document.getElementById('fileInput').click()" class="bg-gray-100 p-3 rounded-xl text-[10px] font-bold uppercase">Importar</button>
                </div>
                <input type="file" id="fileInput" class="hidden" accept=".json" onchange="importarBackup(event)">
            </div>
        </section>
    </main>

    <div class="nav-bar">
        <button onclick="showTab('dashboard')" class="bg-transparent border-none text-indigo-600 nav-btn"><i class="fas fa-home text-lg"></i></button>
        <button onclick="showTab('clientes')" class="bg-transparent border-none text-gray-400 nav-btn"><i class="fas fa-users text-lg"></i></button>
        <button onclick="showTab('novo')" class="btn-plus border-none"><i class="fas fa-plus text-xl"></i></button>
        <button onclick="showTab('config')" class="bg-transparent border-none text-gray-400 nav-btn"><i class="fas fa-cog text-lg"></i></button>
    </div>

    <script>
        let dividas = JSON.parse(localStorage.getItem('zap_dividas')) || [];
        let historico = JSON.parse(localStorage.getItem('zap_historico')) || [];
        let config = JSON.parse(localStorage.getItem('zap_config')) || { loja: "Minha Loja", pix: "" };

        function fecharBemVindo() {
            localStorage.setItem('zap_primeira_vez', 'false');
            document.getElementById('telaBemVindo').style.display = 'none';
            showTab('dashboard');
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.replace('text-indigo-600', 'text-gray-400'));
            if(id === 'dashboard') renderDashboard();
            if(id === 'clientes') renderFichasClientes();
        }

        function renderDashboard() {
            const container = document.getElementById('listaDividas');
            let total = 0;
            container.innerHTML = '';
            dividas.forEach(d => {
                total += d.valor;
                container.innerHTML += `<div class="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">
                    <div class="flex justify-between"><b>${d.nome}</b> <span class="text-indigo-600 font-bold">R$ ${d.valor.toFixed(2)}</span></div>
                    <div class="flex gap-2 mt-4">
                        <button onclick='cobrar(${JSON.stringify(d)})' class="flex-1 bg-green-500 text-white py-3 rounded-xl text-[10px] font-bold border-none">COBRAR</button>
                        <button onclick="darBaixa(${d.id})" class="flex-1 bg-indigo-600 text-white py-3 rounded-xl text-[10px] font-bold border-none">RECEBI</button>
                    </div>
                </div>`;
            });
            document.getElementById('totalReceber').innerText = `R$ ${total.toFixed(2)}`;
        }

        function inicializarApp() {
            if (localStorage.getItem('zap_primeira_vez') === 'false') {
                document.getElementById('telaBemVindo').style.display = 'none';
            }
            document.getElementById('cfgLoja').value = config.loja;
            document.getElementById('cfgPix').value = config.pix;
            renderDashboard();
        }

        document.getElementById('formFiado').addEventListener('submit', (e) => {
            e.preventDefault();
            const val = document.getElementById('valor').value.replace('R$ ', '').replace(',', '.');
            dividas.push({
                id: Date.now(),
                nome: document.getElementById('nome').value,
                whatsapp: document.getElementById('whatsapp').value,
                produto: document.getElementById('produto').value,
                valor: parseFloat(val) || 0
            });
            localStorage.setItem('zap_dividas', JSON.stringify(dividas));
            alert("Salvo!");
            showTab('dashboard');
        });

        // MASSA CRÍTICA: Roda a inicialização forçada
        document.addEventListener('DOMContentLoaded', inicializarApp);
        // Backup para o SPCK caso o DOMContentLoaded falhe
        setTimeout(inicializarApp, 500);

        function cobrar(d) {
            const msg = `Olá ${d.nome}, lembrete de pagamento: R$ ${d.valor.toFixed(2)}. Pix: ${config.pix}`;
            window.open(`https://wa.me/55${d.whatsapp}?text=${encodeURIComponent(msg)}`);
        }

        function darBaixa(id) {
            dividas = dividas.filter(d => d.id !== id);
            localStorage.setItem('zap_dividas', JSON.stringify(dividas));
            renderDashboard();
        }
        
        function salvarConfig() {
            config.loja = document.getElementById('cfgLoja').value;
            config.pix = document.getElementById('cfgPix').value;
            localStorage.setItem('zap_config', JSON.stringify(config));
            alert("Salvo!");
        }
    </script>
</body>
</html>
