<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ZapCaderno - Oficial</title>
    
    <style>
        /* DESIGN MODERNO E RESPONSIVO */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 15px;
            display: flex;
            justify-content: center;
        }
        
        .container { width: 100%; max-width: 500px; }
        
        .tela {
            background: white;
            border-radius: 24px;
            padding: 24px;
            min-height: 85vh;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            position: relative;
            display: flex;
            flex-direction: column;
        }
        
        .hidden { display: none !important; }
        
        h1 {
            text-align: center;
            font-size: 28px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        
        .subtitulo { text-align: center; color: #666; margin-bottom: 32px; font-size: 14px; }
        
        /* INPUTS E BOTÕES */
        .input-group { margin-bottom: 15px; }
        .input-group input {
            width: 100%;
            padding: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .input-group input:focus { border-color: #667eea; outline: none; }
        
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }
        button:active { transform: scale(0.97); opacity: 0.9; }
        
        /* CABEÇALHO DO APP */
        .app-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .app-header h1 { font-size: 20px; margin: 0; }
        .btn-sair { width: auto; padding: 8px 15px; background: #e74c3c; font-size: 12px; }
        
        /* CARD DE TOTAL */
        .total-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 16px;
            padding: 20px;
            color: white;
            text-align: center;
            margin-bottom: 20px;
        }
        .total-card span { font-size: 12px; opacity: 0.8; letter-spacing: 1px; }
        .total-card h2 { font-size: 32px; margin-top: 5px; }
        
        /* NAVEGAÇÃO POR ABAS */
        .tab-nav { display: flex; background: #f0f2f5; border-radius: 15px; padding: 5px; margin-bottom: 20px; }
        .tab-item { flex: 1; text-align: center; padding: 12px 5px; border-radius: 12px; cursor: pointer; color: #666; font-size: 13px; font-weight: 600; transition: 0.3s; }
        .tab-item.active { background: white; color: #764ba2; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        /* LISTAS E CARDS */
        .lista-scroll { flex: 1; overflow-y: auto; padding-right: 5px; }
        .card-item {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 5px solid #667eea;
        }
        .card-info b { display: block; color: #333; margin-bottom: 3px; }
        .card-info span { font-size: 11px; color: #999; }
        .card-valor { font-weight: 800; color: #27ae60; }
        
        .btn-delete { background: none; color: #e74c3c; width: auto; padding: 5px; font-size: 18px; }

        .btn-flutuante {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 60px;
            height: 60px;
            border-radius: 30px;
            font-size: 30px;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .erro { color: #e74c3c; text-align: center; margin-top: 15px; font-size: 13px; font-weight: 500; }
        .link { text-align: center; margin-top: 25px; font-size: 14px; color: #666; }
        .link a { color: #667eea; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div id="telaLogin" class="tela">
        <h1>📓 ZapCaderno</h1>
        <p class="subtitulo">Sua gestão na palma da mão</p>
        <div class="input-group"><input type="email" id="loginEmail" placeholder="Seu email"></div>
        <div class="input-group"><input type="password" id="loginSenha" placeholder="Sua senha"></div>
        <button id="btnLogin">Entrar no Caderno</button>
        <div id="erroLogin" class="erro"></div>
        <div class="link">Novo por aqui? <a href="#" id="linkCadastro">Criar conta grátis</a></div>
    </div>

    <div id="telaCadastro" class="tela hidden">
        <h1>📝 Criar Conta</h1>
        <p class="subtitulo">Rápido, fácil e seguro</p>
        <div class="input-group"><input type="email" id="cadastroEmail" placeholder="Email"></div>
        <div class="input-group"><input type="password" id="cadastroSenha" placeholder="Senha (mín. 6 dígitos)"></div>
        <div class="input-group"><input type="password" id="cadastroConfirmar" placeholder="Confirme a senha"></div>
        <button id="btnCadastrar">Cadastrar Agora</button>
        <div id="erroCadastro" class="erro"></div>
        <div class="link">Já tem conta? <a href="#" id="linkLogin">Fazer login</a></div>
    </div>

    <div id="telaApp" class="tela hidden">
        <div class="app-header">
            <h1>📓 ZapCaderno</h1>
            <button id="btnLogout" class="btn-sair">Sair 🚪</button>
        </div>

        <div class="total-card">
            <span>SALDO EM DÉBITO</span>
            <h2 id="totalDebito">R$ 0,00</h2>
        </div>

        <div class="tab-nav">
            <div class="tab-item active" id="tabVendas">Vendas</div>
            <div class="tab-item" id="tabOrcamentos">Orçamentos</div>
            <div class="tab-item" id="tabHistorico">Histórico</div>
        </div>

        <div id="conteudoPrincipal" class="lista-scroll">
            </div>
        
        <button id="btnNovo" class="btn-flutuante">+</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // CONFIGURAÇÃO FIREBASE
    const firebaseConfig = {
        apiKey: "AIzaSyB4qzJ4rft8V_jDIMuXsPp2CguNo7RAH_0",
        authDomain: "zapcaderno01.firebaseapp.com",
        projectId: "zapcaderno01",
        storageBucket: "zapcaderno01.firebasestorage.app",
        messagingSenderId: "853039336870",
        appId: "1:853039336870:web:d710e8f8f006cd40d3d367"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let userLogado = null;
    let abaAtiva = 'vendas';

    // ELEMENTOS
    const UI = {
        telas: { login: document.getElementById('telaLogin'), cadastro: document.getElementById('telaCadastro'), app: document.getElementById('telaApp') },
        tabs: { vendas: document.getElementById('tabVendas'), orcamentos: document.getElementById('tabOrcamentos'), historico: document.getElementById('tabHistorico') },
        conteudo: document.getElementById('conteudoPrincipal'),
        total: document.getElementById('totalDebito')
    };

    // NAVEGAÇÃO
    function trocarTela(nome) {
        Object.keys(UI.telas).forEach(t => UI.telas[t].classList.add('hidden'));
        UI.telas[nome].classList.remove('hidden');
    }

    function trocarAba(novaAba) {
        abaAtiva = novaAba;
        Object.keys(UI.tabs).forEach(t => UI.tabs[t].classList.remove('active'));
        UI.tabs[novaAba].classList.add('active');
        carregarDados();
    }

    // AUTH
    document.getElementById('btnLogin').onclick = async () => {
        const e = document.getElementById('loginEmail').value;
        const s = document.getElementById('loginSenha').value;
        try { await signInWithEmailAndPassword(auth, e, s); } 
        catch { document.getElementById('erroLogin').textContent = "❌ E-mail ou senha inválidos."; }
    };

    document.getElementById('btnCadastrar').onclick = async () => {
        const e = document.getElementById('cadastroEmail').value;
        const s = document.getElementById('cadastroSenha').value;
        const c = document.getElementById('cadastroConfirmar').value;
        if(s !== c) { document.getElementById('erroCadastro').textContent = "❌ Senhas não conferem."; return; }
        try { await createUserWithEmailAndPassword(auth, e, s); } 
        catch { document.getElementById('erroCadastro').textContent = "❌ Erro ao cadastrar. Tente outro e-mail."; }
    };

    document.getElementById('btnLogout').onclick = () => signOut(auth);
    document.getElementById('linkCadastro').onclick = (e) => { e.preventDefault(); trocarTela('cadastro'); };
    document.getElementById('linkLogin').onclick = (e) => { e.preventDefault(); trocarTela('login'); };

    // ACTIONS ABAS
    UI.tabs.vendas.onclick = () => trocarAba('vendas');
    UI.tabs.orcamentos.onclick = () => trocarAba('orcamentos');
    UI.tabs.historico.onclick = () => trocarAba('historico');

    // CRUD DATA
    async function carregarDados() {
        if (!userLogado) return;
        UI.conteudo.innerHTML = "<p style='text-align:center; padding:20px;'>Buscando dados...</p>";
        
        try {
            const q = query(collection(db, abaAtiva), where("userId", "==", userLogado.uid), orderBy("data", "desc"));
            const snap = await getDocs(q);
            
            let html = "";
            let somaTotal = 0;

            if (snap.empty) {
                html = `<div style='text-align:center; margin-top:40px; color:#999;'>Nada encontrado em ${abaAtiva}</div>`;
            } else {
                snap.forEach(docSnap => {
                    const item = docSnap.data();
                    const id = docSnap.id;
                    const valor = item.valor || 0;
                    somaTotal += valor;

                    html += `
                        <div class="card-item">
                            <div class="card-info">
                                <b>${item.cliente || 'Sem Nome'}</b>
                                <span>${new Date(item.data.seconds * 1000).toLocaleDateString()}</span>
                            </div>
                            <div style="display:flex; align-items:center; gap:10px;">
                                <div class="card-valor">R$ ${valor.toFixed(2)}</div>
                                <button class="btn-delete" onclick="window.excluirDoc('${id}')">🗑️</button>
                            </div>
                        </div>
                    `;
                });
            }

            UI.conteudo.innerHTML = html;
            UI.total.textContent = `R$ ${somaTotal.toFixed(2)}`;
        } catch (e) {
            UI.conteudo.innerHTML = "<p class='erro'>Erro ao carregar dados. Verifique sua conexão.</p>";
        }
    }

    document.getElementById('btnNovo').onclick = async () => {
        const cliente = prompt(`Nome do cliente para ${abaAtiva}:`);
        if (!cliente) return;
        const valorStr = prompt("Valor (ex: 150.50):");
        const valor = parseFloat(valorStr.replace(',', '.'));
        
        if (isNaN(valor)) { alert("Valor inválido!"); return; }

        try {
            await addDoc(collection(db, abaAtiva), {
                cliente, valor, userId: userLogado.uid, data: new Date()
            });
            // Grava no histórico automaticamente
            await addDoc(collection(db, "historico"), {
                cliente: `Registro em ${abaAtiva}`, valor, userId: userLogado.uid, data: new Date(), acao: `Novo(a) ${cliente}`
            });
            carregarDados();
        } catch (e) { alert("Erro ao salvar!"); }
    };

    window.excluirDoc = async (id) => {
        if (confirm("Deseja apagar este registro?")) {
            await deleteDoc(doc(db, abaAtiva, id));
            carregarDados();
        }
    };

    // OBSERVAR USUÁRIO
    onAuthStateChanged(auth, (user) => {
        userLogado = user;
        if (user) {
            trocarTela('app');
            trocarAba('vendas');
        } else {
            trocarTela('login');
        }
    });

</script>
</body>
</html>
