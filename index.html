<!DOCTYPE html>
<html>
<head>
    <title>Teste Firebase</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
</head>
<body>
    <h1>Teste de Conexão</h1>
    <div id="status">Testando...</div>
    
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyASmjopW-EUIpZUsVFESFwMvpUZTMcdvMU",
            authDomain: "zapcaderno.firebaseapp.com",
            projectId: "zapcaderno",
            storageBucket: "zapcaderno.firebasestorage.app",
            messagingSenderId: "446641643061",
            appId: "1:446641643061:web:daf768922b53614f229b7c"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        document.getElementById('status').innerHTML = "Firebase carregado!<br>";
        
        // Verificar autenticação
        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('status').innerHTML += "✅ Usuário logado: " + user.email + "<br>";
                
                // Testar leitura do Firestore
                db.collection("vendas").limit(1).get()
                    .then(() => {
                        document.getElementById('status').innerHTML += "✅ Firestore: Conexão OK!";
                    })
                    .catch(err => {
                        document.getElementById('status').innerHTML += "❌ Firestore: " + err.message;
                    });
            } else {
                document.getElementById('status').innerHTML += "⚠️ Ninguém logado. Faça login!<br>";
                document.getElementById('status').innerHTML += '<input type="email" id="email" placeholder="Email"><br>';
                document.getElementById('status').innerHTML += '<input type="password" id="senha" placeholder="Senha"><br>';
                document.getElementById('status').innerHTML += '<button onclick="logar()">Login</button>';
            }
        });
        
        function logar() {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            auth.signInWithEmailAndPassword(email, senha);
        }
    </script>
</body>
</html>
