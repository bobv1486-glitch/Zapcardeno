<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZapCaderno Ultra Pro</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; padding: 0; transition: 0.3s; -webkit-tap-highlight-color: transparent; }
        .dark-mode { background-color: #0f172a; color: #f1f5f9; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        #telaLogin, #bloqueioPagamento {
            position: fixed; inset: 0; background: white; z-index: 99999;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            padding: 30px; text-align: center;
        }
        #bloqueioPagamento { background: #1e1b4b; color: white; }

        .nav-bar {
            position: fixed; bottom: 20px; left: 15px; right: 15px; height: 75px;
            background: white; border-radius: 25px; display: flex; 
            justify-content: space-around; align-items: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 100;
        }
        .dark-mode .nav-bar { background: #1e293b; border: 1px solid #334155; }
        .btn-plus {
            background: #4f46e5; color: white; width: 55px; height: 55px;
            border-radius: 18px; display: flex; align-items: center; justify-content: center;
            margin-top: -45px; box-shadow: 0 8px 20px rgba(79, 70, 229, 0.4); border: none;
        }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid rgba(0,0,0,0.05); }
        .dark-mode .card { background: #1e293b; border-color: #334155; }
        .progress-bar { height: 10px; border-radius: 5px; background: #e2e8f0; overflow: hidden; margin: 10px 0; }
        .progress-fill { height: 100%; background: #4f46e5; width: 0%; transition: 0.8s ease-in-out; }
        input { border: 1px solid #e2e8f0; width: 100%; max-width: 320px; padding: 15px; border-radius: 12px; margin-bottom: 12px; outline: none; }
        .dark-mode input { background: #0f172a !important; color: white !important; border-color: #334155; }
    </style>
</head>
<body class="pb-32">

    <div id="telaLogin">
        <div class="w-20 h-20 bg-indigo-100 rounded-3xl flex items-center justify-center mb-6">
            <i class="fas fa-user-lock text-3xl text-indigo-600"></i>
        </div>
        <h1 class="text-2xl font-bold mb-2">ZapCaderno Pro</h1>
        <p class="text-gray-500 mb-6 text-sm">Entre para acessar seus dados salvos</p>
        <input type="email" id="logEmail" placeholder="Seu e-mail">
        <input type="password" id="logSenha" placeholder="Sua senha">
        <button onclick="authAcesso()" class="w-full max-w-xs bg-indigo-600 text-white font-bold py-4 rounded-xl shadow-lg border-none mt-2">ENTRAR / CADASTRAR</button>
    </div>

    <div id="bloqueioPagamento">
        <i class="fas fa-rocket text-5xl text-yellow-400 mb-6"></i>
        <h2 class="text-2xl font-bold mb-2">Acesso Expirado</h2>
        <p class="text-indigo-200 text-sm mb-8 px-8">Sua assinatura venceu. Pague para liberar o acesso instantâneo!</p>
        <a href="https://mpago.la/2CGD9Ar" target="_blank" class="block w-full max-w-xs bg-green-500 text-white font-bold py-4 rounded-xl mb-4 text-center no-underline">PAGAR R$ 14,99</a>
        <button onclick="firebaseLogout()" class="text-sm opacity-50 underline">Sair da conta</button>
    </div>

    <header class="bg-indigo-600 text-white p-6 pb-12 rounded-b-[40px] shadow-lg">
        <div class="flex justify-between items-center mb-2">
            <div>
                <h1 id="nomeLojaExibicao" class="text-xl font-bold tracking-tight uppercase">Minha Loja</h1>
                <span id="statusBadge" class="text-[9px] bg-green-500 px-2 py-0.5 rounded-full font-bold uppercase">Sincronizado</span>
            </div>
            <button onclick="toggleDarkMode()" class="w-10 h-10 bg-white bg-opacity-10 rounded-full flex items-center justify-center border-none text-white">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </header>

    <main class="p-4 -mt-8">
        <section id="dashboard" class="tab-content active">
            <div class="card">
                <div class="flex justify-between items-end mb-2">
                    <div>
                        <p class="text-[10px] font-bold text-indigo-500 uppercase">Total a Receber</p>
                        <p id="totalReceber" class="text-3xl font-black text-red-500">R$ 0,00</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] font-bold text-green-500 uppercase">Recebido</p>
                        <p id="totalHistorico" class="text-lg font-bold">R$ 0,00</p>
                    </div>
                </div>
                <div class="progress-bar"><div id="progressoVendas" class="progress-fill"></div></div>
            </div>
            <input type="text" id="buscaCliente" placeholder="🔍 Buscar cliente..." oninput="renderDashboard()" class="p-4 bg-white rounded-2xl shadow-sm border-none text-sm mb-4">
            <div id="listaDividas" class="space-y-4"></div>
        </section>

        <section id="novo" class="tab-content">
            <div class="card">
                <h2 class="text-lg font-bold mb-6">Nova Venda Fiada</h2>
                <div class="space-y-4">
                    <input type="text" id="nome" placeholder="Nome do Cliente" class="w-full p-4 rounded-xl border">
                    <input type="tel" id="whatsapp" placeholder="WhatsApp (DDD+Número)" class="w-full p-4 rounded-xl border">
                    <input type="text" id="produto" placeholder="O que ele comprou?" class="w-full p-4 rounded-xl border">
                    <input type="text" id="valor" placeholder="R$ 0,00" class="w-full p-4 rounded-xl border font-bold text-indigo-600 text-xl">
                    <button onclick="salvarNoFirebase()" class="w-full bg-indigo-600 text-white font-bold py-5 rounded-2xl shadow-lg border-none mt-4">SALVAR NO CADERNO</button>
                </div>
            </div>
        </section>

        <section id="config" class="tab-content">
            <div class="card space-y-6 text-center">
                <h2 class="font-bold">Configurações</h2>
                <input type="text" id="cfgLoja" placeholder="Nome da Loja" class="w-full p-4 border rounded-xl">
                <input type="text" id="cfgPix" placeholder="Chave PIX" class="w-full p-4 border rounded-xl">
                <button onclick="salvarConfig()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold border-none">SALVAR AJUSTES</button>
                <button onclick="firebaseLogout()" class="w-full bg-red-100 text-red-600 py-4 rounded-xl font-bold border-none mt-10">SAIR DA CONTA</button>
            </div>
        </section>
    </main>

    <nav class="nav-bar">
        <button onclick="showTab('dashboard')" class="bg-transparent text-indigo-600 nav-btn border-none"><i class="fas fa-home text-xl"></i></button>
        <button onclick="showTab('novo')" class="btn-plus border-none"><i class="fas fa-plus text-xl"></i></button>
        <button onclick="showTab('config')" class="bg-transparent text-gray-400 nav-btn border-none"><i class="fas fa-cog text-xl"></i></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection, addDoc, onSnapshot, query, where, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyASmjopW-EUIpZUsVFESFwMvpUZTMcdvMU",
            authDomain: "zapcaderno.firebaseapp.com",
            projectId: "zapcaderno",
            storageBucket: "zapcaderno.firebasestorage.app",
            messagingSenderId: "446641643061",
            appId: "1:446641643061:web:daf768922b53614f229b7c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let dividasAtuais = [];
        let configLoja = { loja: "MINHA LOJA", pix: "" };

        // AUTH
        window.authAcesso = async () => {
            const email = document.getElementById('logEmail').value;
            const senha = document.getElementById('logSenha').value;
            if(!email || !senha) return alert("Preencha tudo!");
            try {
                await signInWithEmailAndPassword(auth, email, senha);
            } catch (e) {
                try {
                    const res = await createUserWithEmailAndPassword(auth, email, senha);
                    const validade = new Date();
                    validade.setDate(validade.getDate() + 3);
                    await setDoc(doc(db, "usuarios", res.user.uid), { email, pagoAte: validade, loja: "MINHA LOJA", pix: "" });
                } catch (err) { alert("Erro: " + err.message); }
            }
        };

        window.firebaseLogout = () => signOut(auth).then(() => location.reload());

        onAuthStateChanged(auth, async (user) => {
            const tLogin = document.getElementById('telaLogin');
            const tBloqueio = document.getElementById('bloqueioPagamento');
            if (user) {
                tLogin.style.display = 'none';
                const docSnap = await getDoc(doc(db, "usuarios", user.uid));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    configLoja = { loja: data.loja || "MINHA LOJA", pix: data.pix || "" };
                    document.getElementById('nomeLojaExibicao').innerText = configLoja.loja;
                    document.getElementById('cfgLoja').value = configLoja.loja;
                    document.getElementById('cfgPix').value = configLoja.pix;

                    if (data.pagoAte.toDate() < new Date()) {
                        tBloqueio.style.display = 'flex';
                    } else {
                        tBloqueio.style.display = 'none';
                        carregarDados(user.uid);
                    }
                }
            } else { tLogin.style.display = 'flex'; }
        });

        // CRUD
        window.salvarNoFirebase = async () => {
            const vRaw = document.getElementById('valor').value.replace('R$ ', '').replace(/\./g, '').replace(',', '.');
            const nova = {
                uid: auth.currentUser.uid,
                nome: document.getElementById('nome').value,
                whatsapp: document.getElementById('whatsapp').value,
                produto: document.getElementById('produto').value,
                valor: parseFloat(vRaw) || 0,
                pago: false,
                data: new Date()
            };
            await addDoc(collection(db, "vendas"), nova);
            alert("Salvo!");
            showTab('dashboard');
        };

        function carregarDados(uid) {
            const q = query(collection(db, "vendas"), where("uid", "==", uid));
            onSnapshot(q, (snapshot) => {
                dividasAtuais = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                renderDashboard();
            });
        }

        window.renderDashboard = () => {
            const container = document.getElementById('listaDividas');
            const busca = document.getElementById('buscaCliente').value.toLowerCase();
            let totalDevendo = 0;
            let totalPago = 0;
            container.innerHTML = '';

            dividasAtuais.filter(d => d.nome.toLowerCase().includes(busca)).forEach(d => {
                if(!d.pago) totalDevendo += d.valor; else totalPago += d.valor;
                
                if(!d.pago) {
                    container.innerHTML += `
                    <div class="card border-l-4 border-indigo-500">
                        <div class="flex justify-between items-start">
                            <div><b class="text-lg">${d.nome}</b><p class="text-[10px] opacity-40">${d.produto}</p></div>
                            <span class="text-xl font-black text-red-500">R$ ${d.valor.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</span>
                        </div>
                        <div class="flex gap-2 mt-4">
                            <button onclick='cobrarZap("${d.nome}", "${d.whatsapp}", ${d.valor})' class="flex-1 bg-green-500 text-white py-4 rounded-xl text-[10px] font-bold border-none">COBRAR ZAP</button>
                            <button onclick="darBaixa('${d.id}')" class="flex-1 bg-indigo-600 text-white py-4 rounded-xl text-[10px] font-bold border-none">RECEBI</button>
                        </div>
                    </div>`;
                }
            });

            document.getElementById('totalReceber').innerText = `R$ ${totalDevendo.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            document.getElementById('totalHistorico').innerText = `R$ ${totalPago.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            const meta = totalDevendo + totalPago;
            document.getElementById('progressoVendas').style.width = (meta > 0 ? (totalPago/meta)*100 : 0) + "%";
        };

        window.darBaixa = async (id) => {
            if(confirm("Marcar como pago?")) await updateDoc(doc(db, "vendas", id), { pago: true });
        };

        window.cobrarZap = (nome, whats, valor) => {
            const msg = `Olá *${nome}*, lembrete da loja *${configLoja.loja}*.\nValor em aberto: *R$ ${valor.toLocaleString('pt-BR')}*.\nPix: ${configLoja.pix}`;
            window.open(`https://wa.me/55${whats.replace(/\D/g, '')}?text=${encodeURIComponent(msg)}`);
        };

        window.salvarConfig = async () => {
            const loja = document.getElementById('cfgLoja').value;
            const pix = document.getElementById('cfgPix').value;
            await updateDoc(doc(db, "usuarios", auth.currentUser.uid), { loja, pix });
            alert("Atualizado!");
        };

        // UI HELPERS
        window.showTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(btn => btn.style.color = "#94a3b8");
        };

        window.toggleDarkMode = () => document.body.classList.toggle('dark-mode');

        document.getElementById('valor').addEventListener('input', (e) => {
            let v = e.target.value.replace(/\D/g, '');
            v = (v / 100).toFixed(2).replace('.', ',');
            e.target.value = v ? 'R$ ' + v : '';
        });
    </script>
</body>
</html>
