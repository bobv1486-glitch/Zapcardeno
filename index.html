<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZapCaderno Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; }
        /* Telas de sobreposição */
        #telaLogin, #bloqueioPagamento {
            position: fixed; inset: 0; z-index: 99999;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            padding: 30px; text-align: center; background: white;
        }
        #bloqueioPagamento { background: #1e1b4b; color: white; }
        .input-estilizado { width: 100%; max-width: 320px; padding: 15px; border: 1px solid #ddd; border-radius: 12px; margin-bottom: 12px; outline: none; }
    </style>
</head>
<body class="bg-gray-50">

    <div id="telaLogin">
        <div class="mb-6 text-indigo-600"><i class="fas fa-user-circle text-6xl"></i></div>
        <h1 class="text-2xl font-bold mb-2">ZapCaderno</h1>
        <p class="text-gray-500 mb-6">Entre ou crie sua conta para salvar suas dívidas</p>
        <input type="email" id="logEmail" placeholder="Seu e-mail" class="input-estilizado">
        <input type="password" id="logSenha" placeholder="Sua senha" class="input-estilizado">
        <button onclick="authAcesso()" class="w-full max-w-xs bg-indigo-600 text-white font-bold py-4 rounded-xl shadow-lg">ACESSAR MEU CADERNO</button>
    </div>

    <div id="bloqueioPagamento">
        <i class="fas fa-rocket text-5xl text-yellow-400 mb-6"></i>
        <h2 class="text-2xl font-bold mb-2">Acesso Expirado</h2>
        <p class="text-indigo-200 mb-8">Sua assinatura venceu. Pague agora para liberar o acesso instantâneo!</p>
        <a href="https://mpago.la/2CGD9Ar" target="_blank" class="block w-full max-w-xs bg-green-500 text-white font-bold py-4 rounded-xl mb-4 text-center">PAGAR R$ 14,99</a>
        <button onclick="firebaseLogout()" class="text-sm opacity-50 underline">Sair da conta</button>
    </div>

    <header class="bg-indigo-600 text-white p-6 rounded-b-3xl shadow-lg">
        <div class="flex justify-between items-center">
            <h1 class="font-bold uppercase tracking-wider">Meu Caderno</h1>
            <button onclick="firebaseLogout()" class="text-xs bg-indigo-700 px-3 py-1 rounded-lg">Sair</button>
        </div>
    </header>

    <main class="p-6">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <p class="text-gray-400 text-xs font-bold uppercase mb-1">Status da Conta</p>
            <p id="statusTxt" class="text-lg font-bold text-green-600 italic">Verificando...</p>
        </div>
        <p class="mt-6 text-center text-gray-400 text-sm">Seu app de dívidas está pronto para uso!</p>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        // Suas chaves que você forneceu
        const firebaseConfig = {
            apiKey: "AIzaSyASmjopW-EUIpZUsVFESFwMvpUZTMcdvMU",
            authDomain: "zapcaderno.firebaseapp.com",
            projectId: "zapcaderno",
            storageBucket: "zapcaderno.firebasestorage.app",
            messagingSenderId: "446641643061",
            appId: "1:446641643061:web:daf768922b53614f229b7c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Função de Login/Cadastro
        window.authAcesso = async () => {
            const email = document.getElementById('logEmail').value;
            const senha = document.getElementById('logSenha').value;
            if(!email || !senha) return alert("Preencha e-mail e senha!");

            try {
                await signInWithEmailAndPassword(auth, email, senha);
            } catch (e) {
                // Se o usuário não existir, cria um novo com 3 dias grátis
                try {
                    const res = await createUserWithEmailAndPassword(auth, email, senha);
                    const validade = new Date();
                    validade.setDate(validade.getDate() + 3); // 3 dias de teste
                    await setDoc(doc(db, "usuarios", res.user.uid), {
                        email: email,
                        pagoAte: validade
                    });
                    alert("Bem-vindo! Você ganhou 3 dias grátis.");
                } catch (err) { alert("Erro: " + err.message); }
            }
        };

        window.firebaseLogout = () => signOut(auth).then(() => location.reload());

        // O VIGIA: Controla o acesso
        onAuthStateChanged(auth, async (user) => {
            const telaLogin = document.getElementById('telaLogin');
            const telaBloqueio = document.getElementById('bloqueioPagamento');

            if (user) {
                telaLogin.style.display = 'none';
                const docRef = doc(db, "usuarios", user.uid);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const info = docSnap.data();
                    const hoje = new Date();
                    const pagoAte = info.pagoAte.toDate();

                    if (pagoAte > hoje) {
                        telaBloqueio.style.display = 'none';
                        document.getElementById('statusTxt').innerText = "Assinatura Ativa";
                    } else {
                        telaBloqueio.style.display = 'flex';
                    }
                }
            } else {
                telaLogin.style.display = 'flex';
                telaBloqueio.style.display = 'none';
            }
        });
    </script>
</body>
</html>
