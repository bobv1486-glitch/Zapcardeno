<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZapCaderno Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: white; margin: 0; padding-bottom: 110px; overflow-x: hidden; }
        
        .tab-content { display: none; padding: 20px; min-height: 80vh; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--card); border-radius: 20px; padding: 18px; border: 1px solid #334155; margin-bottom: 12px; }
        .card-pago { border-left: 6px solid #10b981; opacity: 0.6; }
        
        .nav-bar { position: fixed; bottom: 15px; left: 15px; right: 15px; height: 75px; background: #1e293b; border-radius: 25px; display: flex; justify-content: space-around; align-items: center; border: 1px solid #334155; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .btn-plus { background: var(--primary); color: white; width: 55px; height: 55px; border-radius: 18px; display: flex; align-items: center; justify-content: center; margin-top: -45px; box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4); border: none; }
        
        input, textarea { background: #0f172a; border: 1px solid #334155; width: 100%; padding: 14px; border-radius: 14px; margin-bottom: 10px; color: white; font-size: 16px; outline: none; }
        input:focus { border-color: var(--primary); }
        
        #overlay { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; }
    </style>
</head>
<body>

    <div id="overlay">
        <div id="auth-box" class="w-full max-w-sm">
            <h1 class="text-4xl font-black mb-2 italic text-indigo-400">ZAPCADERNO</h1>
            <p class="mb-8 text-sm opacity-50">Seu caderno de fiados inteligente</p>
            
            <input type="email" id="l-email" placeholder="E-mail">
            <input type="password" id="l-senha" placeholder="Senha (min. 6 dígitos)">
            
            <div class="flex flex-col gap-3 mt-4">
                <button id="btnEntrar" class="w-full bg-indigo-600 py-4 rounded-xl font-bold">ENTRAR</button>
                <button id="btnCadastrar" class="w-full bg-transparent border border-indigo-500 text-indigo-400 py-3 rounded-xl font-bold">CRIAR NOVA CONTA</button>
            </div>
            <p id="auth-msg" class="text-xs mt-6 text-red-400 font-bold"></p>
        </div>
    </div>

    <header class="bg-indigo-600 p-6 pb-16 rounded-b-[40px] flex justify-between items-center shadow-2xl">
        <div>
            <h1 id="header-loja" class="text-xl font-bold uppercase tracking-tight text-white">CARREGANDO...</h1>
            <p class="text-[10px] font-bold opacity-60 uppercase"><i class="fas fa-circle text-green-400"></i> Cloud Ativo</p>
        </div>
        <button onclick="abrir('config')" class="bg-white bg-opacity-10 w-10 h-10 rounded-full border-none text-white"><i class="fas fa-cog"></i></button>
    </header>

    <main class="-mt-10">
        <section id="dashboard" class="tab-content active">
            <div class="card bg-gradient-to-br from-indigo-900 to-black border-none p-6 mb-6">
                <span class="text-[10px] font-bold opacity-50 uppercase tracking-widest text-white">Total a Receber</span>
                <h2 id="total-txt" class="text-4xl font-black text-white">R$ 0,00</h2>
            </div>
            <div id="lista-vendas" class="space-y-3"></div>
        </section>

        <section id="historico" class="tab-content">
            <h2 class="text-lg font-bold mb-4 ml-2">Histórico de Pagamentos</h2>
            <div id="lista-pagos" class="space-y-3"></div>
        </section>

        <section id="novo" class="tab-content">
            <div class="card">
                <h2 class="text-lg font-bold mb-6 text-center text-indigo-400 uppercase">Novo Fiado</h2>
                <input type="text" id="v-nome" placeholder="Nome do Cliente">
                <input type="tel" id="v-whats" placeholder="WhatsApp (ex: 11999998888)">
                <input type="text" id="v-item" placeholder="O que ele comprou?">
                <input type="number" id="v-valor" placeholder="Valor R$">
                <button id="btnSalvar" class="w-full bg-indigo-600 py-5 rounded-2xl font-bold shadow-lg mt-2">SALVAR NO BANCO</button>
            </div>
        </section>

        <section id="orcamentos" class="tab-content">
            <div class="card">
                <h2 class="text-lg font-bold mb-4 text-indigo-400 uppercase">Gerar Orçamento</h2>
                <input type="text" id="o-nome" placeholder="Cliente">
                <input type="tel" id="o-whats" placeholder="WhatsApp">
                <textarea id="o-desc" rows="3" placeholder="Descrição do serviço..."></textarea>
                <input type="number" id="o-total" placeholder="Valor Total R$">
                <button id="btnSalvarOrc" class="w-full bg-indigo-600 py-4 rounded-xl font-bold">REGISTRAR ORÇAMENTO</button>
            </div>
            <div id="lista-orc" class="mt-4"></div>
        </section>

        <section id="config" class="tab-content">
            <div class="card">
                <h2 class="text-lg font-bold mb-4 italic">Configurações</h2>
                <label class="text-xs opacity-50 ml-1">Nome da sua Loja/Negócio</label>
                <input type="text" id="c-loja" placeholder="Ex: Mercado do João">
                <label class="text-xs opacity-50 ml-1">Sua Chave PIX</label>
                <input type="text" id="c-pix" placeholder="Para enviar nas cobranças">
