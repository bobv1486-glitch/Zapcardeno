<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZapCaderno Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: #ffffff; margin: 0; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        #telaLogin { position: fixed; inset: 0; background: #121212; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .nav-bar { position: fixed; bottom: 15px; left: 15px; right: 15px; height: 70px; background: #1a1a1a; border-radius: 25px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 100; }

        .btn-plus { background: #5851db; color: white; width: 60px; height: 60px; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin-top: -40px; box-shadow: 0 8px 20px rgba(88, 81, 219, 0.4); border: none; }
        
        .card { background: #1a1a1a; border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid #222; }
        
        input, textarea { background: #242424 !important; border: 1px solid #333 !important; border-radius: 12px !important; padding: 15px !important; width: 100%; margin-bottom: 12px; color: #fff !important; outline: none; }
        
        .nav-btn { color: #666; font-size: 24px; background: none; border: none; }
        .nav-btn.active { color: #a5a1f5; }
    </style>
</head>
<body class="pb-32">

    <div id="telaLogin">
        <h1 class="text-3xl font-bold mb-6 text-indigo-500">ZapCaderno</h1>
        <input type="email" id="logEmail" placeholder="E-mail">
        <input type="password" id="logSenha" placeholder="Senha">
        <button id="btnEntrar" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold">ENTRAR</button>
    </div>

    <header class="p-6">
        <div class="flex justify-between items-center">
            <div>
                <h1 id="headerNome" class="text-xl font-bold uppercase tracking-tight tracking-widest">CARREGANDO...</h1>
                <p id="headerPix" class="text-[10px] text-gray-500 font-mono">PIX: ---</p>
            </div>
            <i class="fas fa-moon text-xl"></i>
        </div>
    </header>

    <main class="p-4">
        <div id="dashboard" class="tab-content active">
            <div class="card mb-4">
                <p class="text-xs text-gray-400 uppercase font-bold mb-1">Total a Receber</p>
                <p id="totalReceber" class="text-4xl font-bold text-white">R$ 0,00</p>
            </div>
            <div id="listaDividas"></div>
        </div>

        <div id="orcamentos" class="tab-content">
            <h2 class="font-bold mb-4 uppercase text-xs tracking-widest text-indigo-400">Meus Orçamentos</h2>
            <div id="listaOrcamentos"></div>
        </div>

        <div id="novo" class="tab-content">
            <div class="card shadow-2xl">
                <h2 class="font-bold mb-4 text-indigo-400 uppercase text-xs">Preencha os Dados</h2>
                <input type="text" id="propNome" placeholder="Nome do Cliente">
                <input type="text" id="propWhatsapp" placeholder="WhatsApp (DDD+Número)">
                
                <h2 class="font-bold mb-1 text-gray-400 text-[10px] uppercase">Detalhes do Trabalho</h2>
                <textarea id="propDetalhes" placeholder="Ex: Cimento, Areia, Pintura da sala..." rows="3"></textarea>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] text-gray-500 font-bold uppercase">Preço Materiais</label>
                        <input type="number" id="propMat" value="0">
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-500 font-bold uppercase">Mão de Obra</label>
                        <input type="number" id="propMao" value="0">
                    </div>
                </div>
                
                <button id="btnGerarOrcamento" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold shadow-lg mb-3 uppercase text-xs">Gerar Proposta de Orçamento</button>
                <button id="btnVendaRapida" class="w-full bg-gray-800 text-gray-400 py-3 rounded-xl font-bold text-[10px] uppercase">Apenas Salvar Venda Rápida</button>
            </div>
        </div>

        <div id="config" class="tab-content">
            <div class="card">
                <h2 class="font-bold mb-4 uppercase text-xs">Meus Dados</h2>
                <input type="text" id="confNome" placeholder="Nome da Empresa">
                <input type="text" id="confPix" placeholder="Sua Chave PIX">
                <button id="btnSalvarConfig" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold uppercase text-xs">Salvar Alterações</button>
            </div>
        </div>
    </main>

    <nav class="nav-bar">
        <button id="tabDash" class="nav-btn active"><i class="fas fa-home"></i></button>
        <button id="tabOrc" class="nav-btn"><i class="fas fa-file-invoice-dollar"></i></button>
        <button id="tabNovo" class="btn-plus"><i class="fas fa-plus"></i></button>
        <button id="tabConf" class="nav-btn"><i class="fas fa-cog"></i></button>
        <button id="btnLogout" class="nav-btn"><i class="fas fa-sign-out-alt"></i></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, doc, updateDoc, setDoc, getDoc, delete
