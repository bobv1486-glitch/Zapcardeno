<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZapCaderno Ultra Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; padding: 0; transition: 0.3s; -webkit-tap-highlight-color: transparent; }
        .dark-mode { background-color: #0f172a; color: #f1f5f9; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        #telaLogin, #bloqueioPagamento { position: fixed; inset: 0; background: #0f172a; z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; color: white; }
        #bloqueioPagamento { background: #1e1b4b; display: none; }

        .nav-bar { position: fixed; bottom: 20px; left: 15px; right: 15px; height: 75px; background: white; border-radius: 25px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 100; }
        .dark-mode .nav-bar { background: #1e293b; border: 1px solid #334155; }

        .btn-plus { background: #4f46e5; color: white; width: 55px; height: 55px; border-radius: 18px; display: flex; align-items: center; justify-content: center; margin-top: -45px; box-shadow: 0 8px 20px rgba(79, 70, 229, 0.4); border: none; }
        
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid rgba(0,0,0,0.05); }
        .dark-mode .card { background: #1e293b; border-color: #334155; }

        .progress-bar { height: 10px; border-radius: 5px; background: #e2e8f0; overflow: hidden; margin: 10px 0; }
        .progress-fill { height: 100%; background: #4f46e5; width: 0%; transition: 0.8s ease-in-out; }

        input, textarea { border: 1px solid #e2e8f0; width: 100%; padding: 14px; border-radius: 12px; outline: none; margin-bottom: 10px; }
        .dark-mode input, .dark-mode textarea { background: #0f172a !important; color: white !important; border-color: #334155; }
        button:active { transform: scale(0.95); }
    </style>
</head>
<body class="pb-32">

    <div id="telaLogin" style="display:none;">
        <h1 class="text-2xl font-black mb-6 italic text-indigo-500">ZAPCADERNO PRO</h1>
        <input type="email" id="l-email" placeholder="E-mail">
        <input type="password" id="l-senha" placeholder="Senha">
        <button id="btnEntrar" class="w-full max-w-xs bg-indigo-600 py-4 rounded-xl font-bold border-none">ENTRAR</button>
    </div>

    <div id="bloqueioPagamento">
        <i class="fas fa-lock text-5xl text-yellow-400 mb-6"></i>
        <h2 class="text-2xl font-bold mb-2">Assinatura Expirada</h2>
        <p class="text-indigo-200 text-sm mb-8">Realize o pagamento mensal para liberar o acesso.</p>
        <a href="https://mpago.la/2CGD9Ar" target="_blank" class="w-full max-w-xs bg-indigo-500 py-4 rounded-xl font-bold mb-4 block text-center no-underline text-white">PAGAR R$ 14,99</a>
        <input type="text" id="chaveAtivacao" placeholder="SENHA DO MÊS" class="max-w-xs text-center uppercase font-bold text-gray-900">
        <button onclick="verificarChave()" class="w-full max-w-xs bg-white bg-opacity-10 py-3 rounded-xl font-bold border-none text-white">ATIVAR ACESSO</button>
    </div>

    <header class="bg-indigo-600 text-white p-6 pb-12 rounded-b-[40px] shadow-lg">
        <div class="flex justify-between items-center mb-2">
            <div>
                <h1 id="h-nome" class="text-xl font-bold uppercase">CARREGANDO...</h1>
                <span id="statusBadge" class="text-[9px] bg-black bg-opacity-20 px-2 py-0.5 rounded-full font-bold uppercase">Sincronizado</span>
            </div>
            <button onclick="toggleDarkMode()" class="w-10 h-10 bg-white bg-opacity-10 rounded-full flex items-center justify-center border-none text-white">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </header>

    <main class="p-4 -mt-8">
        <section id="dashboard" class="tab-content active">
            <div class="card">
                <div class="flex justify-between items-end mb-2">
                    <div><p class="text-[10px] font-bold text-indigo-500 uppercase">A Receber</p><p id="t-pendente" class="text-3xl font-black">R$ 0,00</p></div>
                    <div class="text-right"><p class="text-[10px] font-bold text-green-500 uppercase">Pago</p><p id="t-recebido" class="text-lg font-bold">R$ 0,00</p></div>
                </div>
                <div class="progress-bar"><div id="barra" class="progress-fill"></div></div>
            </div>
            <input type="text" id="busca" placeholder="🔍 Buscar cliente..." class="w-full bg-white shadow-sm border-none mb-4">
            <div id="listaVendas" class="space-y-4"></div>
        </section>

        <section id="orcamentos" class="tab-content">
            <div class="card">
                <h2 class="text-lg font-bold mb-4">Novo Orçamento</h2>
                <input type="text" id="o-nome" placeholder="Cliente">
                <input type="tel" id="o-whats" placeholder="WhatsApp (DDD+Número)">
                <textarea id="o-detalhes" placeholder="Descrição do serviço..."></textarea>
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" id="o-mat" placeholder="Material R$">
                    <input type="number" id="o-mao" placeholder="Mão de Obra R$">
                </div>
                <button id="btnSalvarOrc" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold border-none mt-2">GERAR PROPOSTA</button>
            </div>
            <div id="listaOrcamentos" class="space-y-4 mt-6"></div>
        </section>

        <section id="novo" class="tab-content">
            <div class="card">
                <h2 class="text-lg font-bold mb-6">Registrar Venda Fiada</h2>
                <input type="text" id="v-nome" placeholder="Nome do Cliente">
                <input type="tel" id="v-whats" placeholder="WhatsApp">
                <input type="text" id="v-item" placeholder="Produto/Serviço">
                <input type="number" id="v-valor" placeholder="Valor R$" class="font-bold text-indigo-600 text-xl">
                <input type="date" id="v-data">
                <button id="btnSalvarVenda" class="w-full bg-indigo-600 text-white font-bold py-5 rounded-2xl border-none mt-4">SALVAR NO CADERNO</button>
            </div>
        </section>

        <section id="config" class="tab-content">
            <div class="card">
                <h2 class="text-lg font-bold mb-4">Perfil da Loja</h2>
                <input type="text" id="c-loja" placeholder="Nome da Loja">
                <input type="text" id="c-pix" placeholder="Sua Chave PIX">
                <button id="btnSaveConf" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold border-none">ATUALIZAR DADOS</button>
                <button onclick="firebase.auth().signOut()" class="w-full mt-10 text-red-500 font-bold text-xs bg-transparent border-none">SAIR DA CONTA</button>
            </div>
        </section>
    </main>

    <nav class="nav-bar">
        <button onclick="abrir('dashboard')" class="bg-transparent text-indigo-600 border-none"><i class="fas fa-home text-xl"></i></button>
        <button onclick="abrir('orcamentos')" class="bg-transparent text-gray-400 border-none"><i class="fas fa-file-invoice-dollar text-xl"></i></button>
        <button onclick="abrir('novo')" class="btn-plus border-none"><i class="fas fa-plus text-xl"></i></button>
        <button onclick="abrir('config')" class="bg-transparent text-gray-400 border-none"><i class="fas fa-cog text-xl"></i></button>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyASmjopW-EUIpZUsVFESFwMvpUZTMcdvMU",
            authDomain: "zapcaderno.firebaseapp.com",
            projectId: "zapcaderno",
            storageBucket: "zapcaderno.firebasestorage.app",
            messagingSenderId: "446641643061",
            appId: "1:446641643061:web:daf768922b53614f229b7c"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        let configLoja = { loja: "ZAPCADERNO", pix: "" };

        function abrir(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function toggleDarkMode() { document.body.classList.toggle('dark-mode'); }

        // Sistema de Assinatura
        function verificarAssinatura() {
            const mesAno = (new Date().getMonth() + 1).toString().padStart(2, '0') + new Date().getFullYear().toString().slice(-2);
            if (localStorage.getItem('zap_chave') === "ZAP" + mesAno) {
                document.getElementById('statusBadge').innerText = "ASSINATURA ATIVA";
                document.getElementById('statusBadge').style.background = "#10b981";
            } else {
                let dI = localStorage.getItem('zap_instala') || new Date().getTime();
                localStorage.setItem('zap_instala', dI);
                if (new Date().getTime() - dI > (15 * 24 * 60 * 60 * 1000)) document.getElementById('bloqueioPagamento').style.display = 'flex';
            }
        }

        window.verificarChave = () => {
            const mesAno = (new Date().getMonth() + 1).toString().padStart(2, '0') + new Date().getFullYear().toString().slice(-2);
            if (document.getElementById('chaveAtivacao').value.toUpperCase() === "ZAP" + mesAno) {
                localStorage.setItem('zap_chave', "ZAP" + mesAno);
                location.reload();
            } else alert("Senha incorreta!");
        };

        auth.onAuthStateChanged(async user => {
            if (user) {
                document.getElementById('telaLogin').style.display = 'none';
                const doc = await db.collection("configuracoes").doc(user.uid).get();
                if(doc.exists()) {
                    configLoja = doc.data();
                    document.getElementById('h-nome').innerText = configLoja.loja;
                    document.getElementById('c-loja').value = configLoja.loja;
                    document.getElementById('c-pix').value = configLoja.pix;
                }
                verificarAssinatura();
                carregarDados(user.uid);
            } else document.getElementById('telaLogin').style.display = 'flex';
        });

        document.getElementById('btnEntrar').onclick = () => {
            auth.signInWithEmailAndPassword(document.getElementById('l-email').value, document.getElementById('l-senha').value);
        };

        // Salvar Fiado
        document.getElementById('btnSalvarVenda').onclick = async () => {
            await db.collection("vendas").add({
                uid: auth.currentUser.uid,
                nome: document.getElementById('v-nome').value,
                whatsapp: document.getElementById('v-whats').value,
                item: document.getElementById('v-item').value,
                valor: parseFloat(document.getElementById('v-valor').value),
                data: document.getElementById('v-data').value,
                pago: false
            });
            abrir('dashboard');
        };

        // Salvar Orçamento
        document.getElementById('btnSalvarOrc').onclick = async () => {
            const total = (parseFloat(document.getElementById('o-mat').value) || 0) + (parseFloat(document.getElementById('o-mao').value) || 0);
            await db.collection("orcamentos").add({
                uid: auth.currentUser.uid,
                nome: document.getElementById('o-nome').value,
                whatsapp: document.getElementById('o-whats').value,
                detalhes: document.getElementById('o-detalhes').value,
                valor: total
            });
            abrir('orcamentos');
        };

        function carregarDados(uid) {
            // Vendas
            db.collection("vendas").where("uid", "==", uid).onSnapshot(snap => {
                let pend = 0, rec = 0;
                const container = document.getElementById('listaVendas');
                container.innerHTML = '';
                snap.forEach(doc => {
                    const d = doc.data();
                    if(d.pago) rec += d.valor;
                    else {
                        pend += d.valor;
                        container.innerHTML += `
                        <div class="card border-l-4 border-indigo-500">
                            <div class="flex justify-between mb-4">
                                <div><b>${d.nome}</b><p class="text-[10px] opacity-40 uppercase">${d.item}</p></div>
                                <b class="text-indigo-500">R$ ${d.valor.toFixed(2)}</b>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="cobrar('${d.whatsapp}', '${d.valor}', '${d.nome}')" class="flex-1 bg-green-500 text-white py-3 rounded-xl font-bold border-none"><i class="fab fa-whatsapp mr-2"></i>COBRAR</button>
                                <button onclick="baixar('${doc.id}')" class="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-bold border-none">RECEBI</button>
                            </div>
                        </div>`;
                    }
                });
                document.getElementById('t-pendente').innerText = "R$ " + pend.toFixed(2);
                document.getElementById('t-recebido').innerText = "R$ " + rec.toFixed(2);
                document.getElementById('barra').style.width = (rec/(pend+rec)*100) + "%";
            });

            // Orçamentos
            db.collection("orcamentos").where("uid", "==", uid).onSnapshot(snap => {
                const container = document.getElementById('listaOrcamentos');
                container.innerHTML = '';
                snap.forEach(doc => {
                    const o = doc.data();
                    container.innerHTML += `
                    <div class="card border-l-4 border-yellow-500">
                        <div class="flex justify-between mb-2"><b>${o.nome}</b><b>R$ ${o.valor.toFixed(2)}</b></div>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="enviarOrc('${o.whatsapp}', '${o.valor}', '${o.detalhes}')" class="bg-green-500 text-white py-2 rounded-lg font-bold border-none text-[10px]">ENVIAR ZAP</button>
                            <button onclick="fecharOrc('${doc.id}')" class="bg-indigo-600 text-white py-2 rounded-lg font-bold border-none text-[10px]">FECHAR VENDA</button>
                        </div>
                    </div>`;
                });
            });
        }

        window.cobrar = (tel, val, nome) => {
            const msg = `Olá *${nome}*, tudo bem? Passando para lembrar da sua pendência na *${configLoja.loja}* no valor de *R$ ${val}*.\n\n📍 Chave Pix: *${configLoja.pix}*.\nAgradecemos a preferência!`;
            window.open(`https://wa.me/55${tel.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`);
        };

        window.enviarOrc = (tel, val, det) => {
            const msg = `Olá! Segue o orçamento da *${configLoja.loja}*:\n\n📝 *Serviço:* ${det}\n💰 *Total:* R$ ${val}\n\nAguardamos sua aprovação!`;
            window.open(`https://wa.me/55${tel.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}`);
        };

        window.baixar = (id) => db.collection("vendas").doc(id).update({pago: true});
        
        window.fecharOrc = async (id) => {
            const doc = await db.collection("orcamentos").doc(id).get();
            await db.collection("vendas").add({...doc.data(), pago: false, data: new Date().toISOString().split('T')[0]});
            await db.collection("orcamentos").doc(id).delete();
            abrir('dashboard');
        };

        document.getElementById('btnSaveConf').onclick = async () => {
            const novaConf = { loja: document.getElementById('c-loja').value.toUpperCase(), pix: document.getElementById('c-pix').value };
            await db.collection("configuracoes").doc(auth.currentUser.uid).set(novaConf);
            location.reload();
        };
    </script>
</body>
</html>
