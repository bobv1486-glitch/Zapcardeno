<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZapCaderno Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #000000; color: #ffffff; margin: 0; padding: 0; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* BARRA DE NAVEGAÇÃO */
        .nav-bar { position: fixed; bottom: 15px; left: 15px; right: 15px; height: 70px; background: #1a1a1a; border-radius: 25px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.8); z-index: 1000; }
        .btn-plus { background: #4f46e5; color: white; width: 60px; height: 60px; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin-top: -40px; border: none; font-size: 24px; }
        .nav-btn { color: #555; font-size: 22px; background: none; border: none; }
        .nav-btn.active { color: #818cf8; }

        /* CARDS E INPUTS */
        .card { background: #161616; border-radius: 20px; padding: 18px; margin-bottom: 12px; border: 1px solid #262626; }
        input, textarea { background: #222 !important; border: 1px solid #333 !important; border-radius: 12px !important; padding: 14px !important; width: 100%; margin-bottom: 10px; color: #fff !important; font-size: 16px; outline: none; }
        
        /* FORÇAR APARIÇÃO DO CALENDÁRIO */
        input[type="date"] {
            min-height: 50px;
            appearance: none;
            -webkit-appearance: none;
            color-scheme: dark;
            position: relative;
        }
        input[type="date"]::-webkit-calendar-picker-indicator {
            background: transparent;
            bottom: 0;
            color: transparent;
            cursor: pointer;
            height: auto;
            left: 0;
            position: absolute;
            right: 0;
            top: 0;
            width: auto;
        }

        #telaLogin { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 25px; }
    </style>
</head>
<body class="pb-32">

    <div id="telaLogin">
        <h2 class="text-2xl font-bold mb-6 text-indigo-500">ZAPCADERNO</h2>
        <input type="email" id="logEmail" placeholder="Seu E-mail">
        <input type="password" id="logSenha" placeholder="Sua Senha">
        <button id="btnEntrar" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold border-none">ACESSAR MINHA LOJA</button>
    </div>

    <header class="p-6 flex justify-between items-center">
        <div>
            <h1 id="headerNome" class="text-lg font-bold text-indigo-400">ZAPCADERNO</h1>
            <p id="headerPix" class="text-[10px] text-gray-500 uppercase tracking-tighter">PIX: ---</p>
        </div>
        <i class="fas fa-sync text-gray-700" onclick="location.reload()"></i>
    </header>

    <main class="p-4">
        <div id="dashboard" class="tab-content active">
            <div class="card border-l-4 border-indigo-500">
                <p class="text-[10px] text-gray-400 font-bold mb-1">TOTAL A RECEBER</p>
                <p id="totalReceber" class="text-3xl font-bold">R$ 0,00</p>
            </div>
            <div id="listaDividas" class="mt-4"></div>
        </div>

        <div id="orcamentos" class="tab-content">
            <div class="card mb-6">
                <h3 class="text-indigo-400 text-xs font-bold mb-4 uppercase">Novo Orçamento</h3>
                <input type="text" id="propNome" placeholder="Nome do Cliente">
                <input type="text" id="propWhatsapp" placeholder="WhatsApp">
                <textarea id="propDetalhes" placeholder="Descrição dos serviços..." rows="2"></textarea>
                <div class="grid grid-cols-2 gap-2">
                    <input type="number" id="propMat" placeholder="Material R$">
                    <input type="number" id="propMao" placeholder="Mão de Obra R$">
                </div>
                <button id="btnGerarOrcamento" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold border-none uppercase text-xs">Salvar Orçamento</button>
            </div>
            <div id="listaOrcamentos"></div>
        </div>

        <div id="novo" class="tab-content">
            <div class="card">
                <h3 class="text-indigo-400 text-xs font-bold mb-4 uppercase text-center">Registrar Nova Cobrança</h3>
                <input type="text" id="vendaNome" placeholder="Nome do Cliente">
                <input type="text" id="vendaWhatsapp" placeholder="WhatsApp">
                <input type="text" id="vendaProduto" placeholder="O que ele comprou?">
                <input type="number" id="vendaValor" placeholder="Valor total R$">
                
                <div class="mb-4">
                    <label class="text-[10px] text-gray-500 font-bold uppercase ml-1">Previsão de Pagamento:</label>
                    <input type="date" id="vendaDataPagar">
                </div>
                
                <button id="btnSalvarVendaRapida" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold border-none uppercase text-xs">Confirmar Venda</button>
            </div>
        </div>

        <div id="config" class="tab-content">
            <div class="card">
                <input type="text" id="confNome" placeholder="Nome da Empresa">
                <input type="text" id="confPix" placeholder="Sua Chave PIX">
                <button id="btnSalvarConfig" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold border-none uppercase text-xs">Salvar Configurações</button>
            </div>
        </div>
    </main>

    <nav class="nav-bar">
        <button id="tabDash" class="nav-btn active"><i class="fas fa-home"></i></button>
        <button id="tabOrc" class="nav-btn"><i class="fas fa-file-invoice-dollar"></i></button>
        <button id="tabNovo" class="btn-plus"><i class="fas fa-plus"></i></button>
        <button id="tabConf" class="nav-btn"><i class="fas fa-cog"></i></button>
        <button id="btnLogout" class="nav-btn"><i class="fas fa-sign-out-alt"></i></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, doc, updateDoc, setDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyASmjopW-EUIpZUsVFESFwMvpUZTMcdvMU",
            authDomain: "zapcaderno.firebaseapp.com",
            projectId: "zapcaderno",
            storageBucket: "zapcaderno.firebasestorage.app",
            messagingSenderId: "446641643061",
            appId: "1:446641643061:web:daf768922b53614f229b7c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let configGlobal = { nome: "ZAPCADERNO", pix: "" };

        // Troca de Abas
        window.openTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if(id === 'dashboard') document.getElementById('tabDash').classList.add('active');
            if(id === 'orcamentos') document.getElementById('tabOrc').classList.add('active');
            if(id === 'config') document.getElementById('tabConf').classList.add('active');
        };

        document.getElementById('tabDash').onclick = () => openTab('dashboard');
        document.getElementById('tabOrc').onclick = () => openTab('orcamentos');
        document.getElementById('tabNovo').onclick = () => openTab('novo');
        document.getElementById('tabConf').onclick = () => openTab('config');
        document.getElementById('btnLogout').onclick = () => signOut(auth);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('telaLogin').style.display = 'none';
                const snap = await getDoc(doc(db, "configuracoes", user.uid));
                if (snap.exists()) {
                    configGlobal = snap.data();
                    document.getElementById('headerNome').innerText = configGlobal.nome;
                    document.getElementById('headerPix').innerText = "PIX: " + configGlobal.pix;
                }
                escutarDados(user.uid);
            } else {
                document.getElementById('telaLogin').style.display = 'flex';
            }
        });

        document.getElementById('btnEntrar').onclick = () => {
            const e = document.getElementById('logEmail').value;
            const s = document.getElementById('logSenha').value;
            signInWithEmailAndPassword(auth, e, s).catch(err => alert("Acesso Negado!"));
        };

        // Salvar Cobrança (Aba +)
        document.getElementById('btnSalvarVendaRapida').onclick = async () => {
            const btn = document.getElementById('btnSalvarVendaRapida');
            btn.disabled = true; btn.innerText = "GRAVANDO...";
            try {
                await addDoc(collection(db, "vendas"), {
                    uid: auth.currentUser.uid,
                    nome: document.getElementById('vendaNome').value,
                    whatsapp: document.getElementById('vendaWhatsapp').value.replace(/\D/g, ''),
                    produto: document.getElementById('vendaProduto').value,
                    valor: parseFloat(document.getElementById('vendaValor').value) || 0,
                    dataPagar: document.getElementById('vendaDataPagar').value, // SALVA A DATA AQUI
                    pago: false,
                    criadoEm: new Date()
                });
                alert("Venda Registrada!");
                openTab('dashboard');
            } catch (e) { alert("Erro de conexão!"); }
            btn.disabled = false; btn.innerText = "CONFIRMAR VENDA";
        };

        // Escutar Mudanças no Banco
        function escutarDados(uid) {
            onSnapshot(query(collection(db, "vendas"), where("uid", "==", uid)), (snap) => {
                let total = 0;
                const div = document.getElementById('listaDividas');
                div.innerHTML = '';
                snap.forEach(s => {
                    const d = s.data();
                    if(!d.pago) {
                        total += d.valor;
                        div.innerHTML += `
                            <div class="card flex justify-between items-center">
                                <div>
                                    <b class="text-sm">${d.nome}</b>
                                    <p class="text-[10px] text-red-500 font-bold">PAGAR EM: ${d.dataPagar ? d.dataPagar.split('-').reverse().join('/') : '--'}</p>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="window.cobrar('${d.whatsapp}', '${d.valor}')" class="bg-green-600 p-3 rounded-xl border-none text-white"><i class="fab fa-whatsapp"></i></button>
                                    <button onclick="window.receber('${s.id}')" class="bg-indigo-600 text-white px-3 py-2 rounded-xl text-[10px] font-bold border-none">PAGO</button>
                                </div>
                            </div>`;
                    }
                });
                document.getElementById('totalReceber').innerText = `R$ ${total.toFixed(2)}`;
            });

            onSnapshot(query(collection(db, "orcamentos"), where("uid", "==", uid)), (snap) => {
                const div = document.getElementById('listaOrcamentos');
                div.innerHTML = '';
                snap.forEach(s => {
                    const o = s.data();
                    div.innerHTML += `
                        <div class="card">
                            <div class="flex justify-between items-center mb-4">
                                <b>${o.nome}</b>
                                <b class="text-indigo-400">R$ ${o.valor.toFixed(2)}</b>
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <button onclick="window.envZap('${o.whatsapp}', '${o.valor}', '${o.detalhes}')" class="bg-green-600 text-white py-3 rounded-xl font-bold uppercase text-[9px] border-none">WhatsApp</button>
                                <button onclick="window.fechar('${s.id}')" class="bg-indigo-600 text-white py-3 rounded-xl font-bold uppercase text-[9px] border-none">Virar Venda</button>
                            </div>
                        </div>`;
                });
            });
        }

        // Funções Globais
        window.cobrar = (n, v) => window.open(`https://wa.me/55${n}?text=Olá! Segue o lembrete de pagamento: R$ ${v}. PIX: ${configGlobal.pix}`);
        window.receber = async (id) => { if(confirm("Confirmar recebimento?")) await updateDoc(doc(db, "vendas", id), { pago: true }); };
        window.envZap = (n, v, d) => window.open(`https://wa.me/55${n}?text=*ORÇAMENTO*%0A*Serviço:* ${d}%0A*Total:* R$ ${v}`);
        
        window.fechar = async (id) => {
            const s = await getDoc(doc(db, "orcamentos", id));
            if (s.exists()) {
                await addDoc(collection(db, "vendas"), { ...s.data(), pago: false, criadoEm: new Date() });
                await deleteDoc(doc(db, "orcamentos", id));
                openTab('dashboard');
            }
        };

        document.getElementById('btnGerarOrcamento').onclick = async () => {
            const v = (parseFloat(document.getElementById('propMat').value) || 0) + (parseFloat(document.getElementById('propMao').value) || 0);
            await addDoc(collection(db, "orcamentos"), {
                uid: auth.currentUser.uid,
                nome: document.getElementById('propNome').value,
                whatsapp: document.getElementById('propWhatsapp').value.replace(/\D/g, ''),
                detalhes: document.getElementById('propDetalhes').value,
                valor: v
            });
            alert("Salvo!"); openTab('orcamentos');
        };

        document.getElementById('btnSalvarConfig').onclick = async () => {
            await setDoc(doc(db, "configuracoes", auth.currentUser.uid), { nome: document.getElementById('confNome').value, pix: document.getElementById('confPix').value });
            alert("Atualizado!"); location.reload();
        };
    </script>
</body>
</html>
