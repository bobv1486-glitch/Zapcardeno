<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZapCaderno Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; }
        .input-estilo { background: #161616; border: 1px solid #333; border-radius: 12px; padding: 15px; width: 100%; color: white; margin-bottom: 10px; }
        #telaLogin { position: fixed; inset: 0; background: #0a0a0a; z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .btn-acao { background: #4f46e5; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; border: none; color: white; }
    </style>
</head>
<body>

    <div id="telaLogin">
        <h1 style="color:#4f46e5; font-size: 30px; font-weight: 900; font-style: italic;">ZAPCADERNO</h1>
        <p style="color: #666; margin-bottom: 30px;">Login Profissional</p>
        
        <input type="email" id="email" class="input-estilo" placeholder="E-mail">
        <input type="password" id="senha" class="input-estilo" placeholder="Senha">
        
        <button id="btnEntrar" class="btn-acao">ENTRAR AGORA</button>
        <p id="erro" style="color: red; display: none; margin-top: 10px;">Erro ao acessar!</p>
    </div>

    <div id="app" style="display:none; padding: 20px;">
        <h2 id="msgBemVindo">Bem-vindo!</h2>
        <div style="background: #161616; padding: 20px; border-radius: 20px; margin-top: 20px;">
            <p style="color: #4f46e5; font-size: 12px;">PENDENTE</p>
            <h3 id="total" style="font-size: 30px;">R$ 0,00</h3>
        </div>
        <button onclick="auth.signOut()" style="margin-top: 40px; color: #444;">Sair da conta</button>
    </div>

    <script>
        // Configuração direta
        const firebaseConfig = {
            apiKey: "AIzaSyASmjopW-EUIpZUsVFESFwMvpUZTMcdvMU",
            authDomain: "zapcaderno.firebaseapp.com",
            projectId: "zapcaderno",
            storageBucket: "zapcaderno.firebasestorage.app",
            messagingSenderId: "446641643061",
            appId: "1:446641643061:web:daf768922b53614f229b7c"
        };

        // Inicializa
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Botão de Login
        document.getElementById('btnEntrar').onclick = function() {
            const e = document.getElementById('email').value;
            const s = document.getElementById('senha').value;
            
            this.innerText = "CARREGANDO...";
            
            auth.signInWithEmailAndPassword(e, s)
                .catch(err => {
                    alert("Erro: " + err.message);
                    this.innerText = "ENTRAR AGORA";
                    document.getElementById('erro').style.display = 'block';
                });
        };

        // Monitor de Login
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('telaLogin').style.display = 'none';
                document.getElementById('app').style.display = 'block';
                document.getElementById('msgBemVindo').innerText = "Olá, " + user.email;
                
                // Carrega saldo rápido
                db.collection("vendas").where("uid", "==", user.uid).onSnapshot(snap => {
                    let t = 0;
                    snap.forEach(doc => { if(!doc.data().pago) t += doc.data().valor; });
                    document.getElementById('total').innerText = "R$ " + t.toLocaleString('pt-BR');
                });
            } else {
                document.getElementById('telaLogin').style.display = 'flex';
                document.getElementById('app').style.display = 'none';
            }
        });
    </script>
</body>
</html>
