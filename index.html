<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZapCaderno Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: #ffffff; margin: 0; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        #telaLogin { position: fixed; inset: 0; background: #121212; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .nav-bar { position: fixed; bottom: 15px; left: 15px; right: 15px; height: 70px; background: #1a1a1a; border-radius: 25px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 100; }

        .btn-plus { background: #5851db; color: white; width: 60px; height: 60px; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin-top: -40px; box-shadow: 0 8px 20px rgba(88, 81, 219, 0.4); border: none; }
        
        .card { background: #1a1a1a; border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid #222; }
        
        input, textarea { background: #242424 !important; border: 1px solid #333 !important; border-radius: 12px !important; padding: 15px !important; width: 100%; margin-bottom: 12px; color: #fff !important; outline: none; }
        
        .nav-btn { color: #666; font-size: 24px; background: none; border: none; }
        .nav-btn.active { color: #a5a1f5; }
        
        .btn-categoria { background: #242424; border: 1px solid #333; padding: 15px; border-radius: 15px; width: 100%; color: #aaa; font-weight: bold; }
    </style>
</head>
<body class="pb-32">

    <div id="telaLogin">
        <h1 class="text-3xl font-bold mb-6 text-indigo-500">ZapCaderno</h1>
        <input type="email" id="logEmail" placeholder="E-mail">
        <input type="password" id="logSenha" placeholder="Senha">
        <button id="btnEntrar" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold">ENTRAR</button>
    </div>

    <header class="p-6">
        <div class="flex justify-between items-center">
            <div>
                <h1 id="headerNome" class="text-xl font-bold uppercase tracking-tight">CARREGANDO...</h1>
                <p id="headerPix" class="text-[10px] text-gray-500 font-mono">PIX: ---</p>
            </div>
            <button onclick="document.body.classList.toggle('dark-mode')" class="text-xl"><i class="fas fa-moon"></i></button>
        </div>
    </header>

    <main class="p-4">
        <div id="dashboard" class="tab-content active">
            <div class="card mb-4">
                <p class="text-xs text-gray-400 uppercase font-bold mb-1">Total a Receber</p>
                <p id="totalReceber" class="text-4xl font-bold text-white">R$ 0,00</p>
            </div>
            <div id="listaDividas"></div>
        </div>

        <div id="orcamentos" class="tab-content">
            <h2 class="font-bold mb-4 uppercase text-xs tracking-widest text-indigo-400">Orçamentos Pendentes</h2>
            <div id="listaOrcamentos"></div>
        </div>

        <div id="escolhaAcao" class="tab-content">
            <div class="card text-center">
                <h2 class="font-bold mb-6 text-indigo-400">O QUE DESEJA FAZER?</h2>
                <div class="grid grid-cols-1 gap-4">
                    <button onclick="window.abrirFormulario('obra')" class="btn-categoria"><i class="fas fa-hammer mr-2"></i> GERAR PROPOSTA PROFISSIONAL</button>
                    <button onclick="window.abrirFormulario('venda')" class="btn-categoria"><i class="fas fa-bolt mr-2"></i> REGISTRO DE VENDA RÁPIDA</button>
                </div>
            </div>
        </div>

        <div id="formularioProposta" class="tab-content">
            <div class="card">
                <h2 class="font-bold mb-4 text-indigo-400">PREENCHA OS DADOS</h2>
                <input type="text" id="propNome" placeholder="Nome do Cliente">
                <input type="text" id="propWhatsapp" placeholder="WhatsApp (DDD+Número)">
                
                <h2 class="font-bold mb-2 text-gray-400 text-xs">DETALHES DO TRABALHO</h2>
                <textarea id="propDetalhes" placeholder="Ex: Cimento, Areia, Pintura da sala..." rows="3"></textarea>
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] text-gray-500 font-bold uppercase">Preço Materiais</label>
                        <input type="number" id="propMat" value="0">
                    </div>
                    <div>
                        <label class="text-[10px] text-gray-500 font-bold uppercase">Mão de Obra</label>
                        <input type="number" id="propMao" value="0">
                    </div>
                </div>
                
                <button id="btnGerarOrcamento" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold shadow-lg mb-3">GERAR PROPOSTA DE ORÇAMENTO</button>
                <button onclick="openTab('dashboard')" class="w-full bg-gray-800 text-gray-400 py-3 rounded-xl font-bold text-xs uppercase">Cancelar</button>
            </div>
        </div>

        <div id="config" class="tab-content">
            <div class="card">
                <h2 class="font-bold mb-4 uppercase text-xs">Meus Dados</h2>
                <input type="text" id="confNome" placeholder="Nome da Empresa">
                <input type="text" id="confPix" placeholder="Sua Chave PIX">
                <button id="btnSalvarConfig" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold uppercase text-xs">Salvar Alterações</button>
            </div>
        </div>
    </main>

    <nav class="nav-bar">
        <button id="tabDash" class="nav-btn active"><i class="fas fa-home"></i></button>
        <button id="tabOrc" class="nav-btn"><i class="fas fa-file-invoice-dollar"></i></button>
        <button id="tabNovo" class="btn-plus"><i class="fas fa-plus"></i></button>
        <button id="tabConf" class="nav-btn"><i class="fas fa-cog"></i></button>
        <button id="btnLogout" class="nav-btn"><i class="fas fa-sign-out-alt"></i></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, doc, updateDoc, setDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyASmjopW-EUIpZUsVFESFwMvpUZTMcdvMU",
            authDomain: "zapcaderno.firebaseapp.com",
            projectId: "zapcaderno",
            storageBucket: "zapcaderno.firebasestorage.app",
            messagingSenderId: "446641643061",
            appId: "1:446641643061:web:daf768922b53614f229b7c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // CONTROLE DE TELAS
        const openTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if(id === 'dashboard') document.getElementById('tabDash').classList.add('active');
            if(id === 'orcamentos') document.getElementById('tabOrc').classList.add('active');
            if(id === 'config') document.getElementById('tabConf').classList.add('active');
        };

        window.abrirFormulario = (tipo) => {
            if(tipo === 'obra') openTab('formularioProposta');
            else { /* Resetar campos para venda rápida se quiser */ openTab('formularioProposta'); }
        };

        document.getElementById('tabDash').onclick = () => openTab('dashboard');
        document.getElementById('tabOrc').onclick = () => openTab('orcamentos');
        document.getElementById('tabNovo').onclick = () => openTab('escolhaAcao');
        document.getElementById('tabConf').onclick = () => openTab('config');
        document.getElementById('btnLogout').onclick = () => signOut(auth);

        // AUTH
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('telaLogin').style.display = 'none';
                const snap = await getDoc(doc(db, "configuracoes", user.uid));
                if (snap.exists()) {
                    document.getElementById('headerNome').innerText = snap.data().nome;
                    document.getElementById('headerPix').innerText = "PIX: " + snap.data().pix;
                }
                initData(user.uid);
            } else {
                document.getElementById('telaLogin').style.display = 'flex';
            }
        });

        document.getElementById('btnEntrar').onclick = () => {
            signInWithEmailAndPassword(auth, document.getElementById('logEmail').value, document.getElementById('logSenha').value);
        };

        // SALVAR ORÇAMENTO/PROPOSTA
        document.getElementById('btnGerarOrcamento').onclick = async () => {
            const mat = parseFloat(document.getElementById('propMat').value) || 0;
            const mao = parseFloat(document.getElementById('propMao').value) || 0;
            const total = mat + mao;

            await addDoc(collection(db, "orcamentos"), {
                uid: auth.currentUser.uid,
                nome: document.getElementById('propNome').value,
                whatsapp: document.getElementById('propWhatsapp').value,
                detalhes: document.getElementById('propDetalhes').value,
                materiais: mat,
                maodeobra: mao,
                valor: total,
                pago: false,
                data: new Date().toLocaleDateString('pt-BR')
            });
            alert("Orçamento Gerado!");
            openTab('orcamentos');
        };

        // CARREGAR DADOS
        function initData(uid) {
            // Vendas
            onSnapshot(query(collection(db, "vendas"), where("uid", "==", uid)), (snap) => {
                let total = 0;
                const div = document.getElementById('listaDividas');
                div.innerHTML = '';
                snap.forEach(s => {
                    const d = s.data();
                    if(!d.pago) {
                        total += d.valor;
                        div.innerHTML += `
                            <div class="card flex justify-between items-center">
                                <div><b>${d.nome}</b><p class="text-xs text-gray-500">${d.produto || 'Venda'}</p></div>
                                <div class="flex gap-2">
                                    <button onclick="window.cobrar('${d.whatsapp}', '${d.valor}')" class="bg-green-600 p-2 rounded-lg border-none text-white"><i class="fab fa-whatsapp"></i></button>
                                    <button onclick="window.receber('${s.id}')" class="bg-indigo-600 text-white px-3 py-2 rounded-lg text-xs font-bold uppercase">Recebi</button>
                                </div>
                            </div>`;
                    }
                });
                document.getElementById('totalReceber').innerText = `R$ ${total.toFixed(2)}`;
            });

            // Orçamentos
            onSnapshot(query(collection(db, "orcamentos"), where("uid", "==", uid)), (snap) => {
                const div = document.getElementById('listaOrcamentos');
                div.innerHTML = '';
                snap.forEach(s => {
                    const o = s.data();
                    div.innerHTML += `
                        <div class="card">
                            <div class="flex justify-between items-start mb-2">
                                <div><b class="text-white">${o.nome}</b><p class="text-[10px] text-gray-500">${o.data}</p></div>
                                <b class="text-indigo-400">R$ ${o.valor.toFixed(2)}</b>
                            </div>
                            <p class="text-xs text-gray-400 italic mb-3">"${o.detalhes}"</p>
                            <div class="flex gap-2">
                                <button onclick="window.enviarProposta('${o.whatsapp}', '${o.valor}', '${o.detalhes}')" class="flex-1 bg-gray-700 text-white py-2 rounded-lg text-[10px] font-bold uppercase">Enviar PDF/Zap</button>
                                <button onclick="window.fecharOrcamento('${s.id}')" class="flex-1 bg-indigo-600 text-white py-2 rounded-lg text-[10px] font-bold uppercase">FECHOU!</button>
                            </div>
                        </div>`;
                });
            });
        }

        // FUNÇÕES GLOBAIS
        window.fecharOrcamento = async (id) => {
            const snap = await getDoc(doc(db, "orcamentos", id));
            if(snap.exists()) {
                const d = snap.data();
                await addDoc(collection(db, "vendas"), {
                    uid: d.uid, nome: d.nome, whatsapp: d.whatsapp, valor: d.valor, produto: d.detalhes, pago: false, data: d.data
                });
                await deleteDoc(doc(db, "orcamentos", id));
                openTab('dashboard');
            }
        };

        window.cobrar = (num, val) => window.open(`https://wa.me/${num}?text=Olá! Segue lembrete de cobrança: R$ ${val}`);
        window.receber = async (id) => { if(confirm("Recebeu?")) await updateDoc(doc(db, "vendas", id), { pago: true }); };

    </script>
</body>
</html>
