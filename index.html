<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZapCaderno Ultra Pro</title>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* Cores e Variáveis */
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; padding: 0; transition: 0.3s; -webkit-tap-highlight-color: transparent; }
        .dark-mode { background-color: #0f172a; color: #f1f5f9; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Telas de Overlay */
        #telaBemVindo, #bloqueioPagamento {
            position: fixed; inset: 0; background: white; z-index: 99999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 30px; text-align: center;
        }
        #bloqueioPagamento { display: none; background: #1e1b4b; color: white; }

        /* Navegação */
        .nav-bar {
            position: fixed; bottom: 20px; left: 15px; right: 15px; height: 75px;
            background: white; border-radius: 25px; display: flex; 
            justify-content: space-around; align-items: center; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 100;
        }
        .dark-mode .nav-bar { background: #1e293b; border: 1px solid #334155; }

        .btn-plus {
            background: #4f46e5; color: white; width: 55px; height: 55px;
            border-radius: 18px; display: flex; align-items: center; justify-content: center;
            margin-top: -45px; box-shadow: 0 8px 20px rgba(79, 70, 229, 0.4); border: none;
        }
        
        /* Cards */
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid rgba(0,0,0,0.05); }
        .dark-mode .card { background: #1e293b; border-color: #334155; }

        .progress-bar { height: 10px; border-radius: 5px; background: #e2e8f0; overflow: hidden; margin: 10px 0; }
        .progress-fill { height: 100%; background: #4f46e5; width: 0%; transition: 0.8s ease-in-out; }

        input { border: 1px solid #e2e8f0; }
        .dark-mode input { background: #0f172a !important; color: white !important; border-color: #334155; }
        
        button:active { transform: scale(0.95); }
    </style>
</head>
<body class="pb-32">

    <div id="telaBemVindo">
        <div class="w-24 h-24 bg-indigo-100 rounded-3xl flex items-center justify-center mb-6">
            <i class="fas fa-wallet text-4xl text-indigo-600"></i>
        </div>
        <h1 class="text-3xl font-black text-gray-800 mb-2">ZapCaderno Pro</h1>
        <p class="text-gray-500 mb-10 px-6">Sua gestão financeira na palma da mão.</p>
        <button onclick="fecharBemVindo()" class="w-full max-w-xs bg-indigo-600 text-white font-bold py-5 rounded-2xl shadow-xl">COMEÇAR AGORA</button>
    </div>

    <div id="bloqueioPagamento">
        <i class="fas fa-lock text-5xl text-yellow-400 mb-6"></i>
        <h2 class="text-2xl font-bold mb-2">Assinatura Expirada</h2>
        <p class="text-indigo-200 text-sm mb-8 px-8">Para continuar usando, realize o pagamento mensal.</p>
        <a href="https://mpago.la/2CGD9Ar" target="_blank" class="block w-full max-w-xs bg-indigo-500 text-white font-bold py-4 rounded-xl mb-4 text-center no-underline">PAGAR R$ 14,99</a>
        <input type="text" id="chaveAtivacao" placeholder="SENHA DO MÊS" class="w-full max-w-xs p-4 rounded-xl text-center mb-3 uppercase font-bold text-gray-900 border-none outline-none">
        <button onclick="verificarChave()" class="w-full max-w-xs bg-white bg-opacity-10 text-white py-3 rounded-xl font-bold">ATIVAR ACESSO</button>
    </div>

    <header class="bg-indigo-600 text-white p-6 pb-12 rounded-b-[40px] shadow-lg">
        <div class="flex justify-between items-center mb-2">
            <div>
                <h1 id="nomeLojaExibicao" class="text-xl font-bold tracking-tight uppercase">Minha Loja</h1>
                <span id="statusBadge" class="text-[9px] bg-black bg-opacity-20 px-2 py-0.5 rounded-full font-bold uppercase">Sincronizado</span>
            </div>
            <button onclick="toggleDarkMode()" class="w-10 h-10 bg-white bg-opacity-10 rounded-full flex items-center justify-center border-none text-white">
                <i class="fas fa-moon"></i>
            </button>
        </div>
    </header>

    <main class="p-4 -mt-8">
        <section id="dashboard" class="tab-content active">
            <div class="card">
                <div class="flex justify-between items-end mb-2">
                    <div>
                        <p class="text-[10px] font-bold text-indigo-500 uppercase">Total a Receber</p>
                        <p id="totalReceber" class="text-3xl font-black">R$ 0,00</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] font-bold text-green-500 uppercase">Recebido</p>
                        <p id="totalHistorico" class="text-lg font-bold">R$ 0,00</p>
                    </div>
                </div>
                <div class="progress-bar"><div id="progressoVendas" class="progress-fill"></div></div>
                <div class="flex justify-between text-[9px] font-bold opacity-50">
                    <span>PROGRESSO DE RECEBIMENTO</span>
                    <span id="percentualTxt">0%</span>
                </div>
            </div>

            <div class="flex gap-2 mb-4">
                <input type="text" id="buscaCliente" placeholder="🔍 Buscar cliente..." oninput="renderDashboard()" class="flex-1 p-4 bg-white rounded-2xl shadow-sm outline-none text-sm border-none">
                <button onclick="gerarRelatorio()" class="bg-white p-4 rounded-2xl shadow-sm text-indigo-600 border-none"><i class="fas fa-print"></i></button>
            </div>
            
            <div id="listaDividas" class="space-y-4"></div>
        </section>

        <section id="novo" class="tab-content">
            <div class="card">
                <h2 class="text-lg font-bold mb-6">Nova Venda Fiada</h2>
                <form id="formFiado" class="space-y-4">
                    <input type="text" id="nome" placeholder="Nome do Cliente" required class="w-full p-4 rounded-xl outline-none">
                    <input type="tel" id="whatsapp" placeholder="WhatsApp (DDD+Número)" required class="w-full p-4 rounded-xl outline-none">
                    <input type="text" id="produto" placeholder="O que ele comprou?" required class="w-full p-4 rounded-xl outline-none">
                    <input type="text" id="valor" placeholder="R$ 0,00" required class="w-full p-4 rounded-xl outline-none font-bold text-indigo-600 text-xl">
                    <input type="date" id="data" required class="w-full p-4 rounded-xl outline-none">
                    <button type="submit" class="w-full bg-indigo-600 text-white font-bold py-5 rounded-2xl shadow-lg border-none mt-4">SALVAR NO CADERNO</button>
                </form>
            </div>
        </section>

        <section id="clientes" class="tab-content">
            <h2 class="text-xs font-bold opacity-50 uppercase mb-4 px-2">Histórico por Cliente</h2>
            <div id="listaFichasClientes" class="space-y-3"></div>
        </section>

        <section id="config" class="tab-content">
            <div class="card space-y-6">
                <div>
                    <label class="text-[10px] font-bold opacity-50 uppercase ml-2">Dados do Negócio</label>
                    <input type="text" id="cfgLoja" placeholder="Nome da Loja" class="w-full p-4 rounded-xl mt-1 outline-none">
                    <input type="text" id="cfgPix" placeholder="Chave PIX para Cobrança" class="w-full p-4 rounded-xl mt-2 outline-none">
                    <button onclick="salvarConfig()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold mt-4 border-none">ATUALIZAR DADOS</button>
                </div>
                <div class="pt-6 border-t border-gray-100">
                    <label class="text-[10px] font-bold opacity-50 uppercase ml-2">Segurança de Dados</label>
                    <div class="grid grid-cols-2 gap-2 mt-2">
                        <button onclick="exportarBackup()" class="bg-gray-100 dark:bg-gray-800 p-4 rounded-xl text-xs font-bold border-none">EXPORTAR</button>
                        <button onclick="document.getElementById('fileInput').click()" class="bg-gray-100 dark:bg-gray-800 p-4 rounded-xl text-xs font-bold border-none">IMPORTAR</button>
                    </div>
                    <input type="file" id="fileInput" class="hidden" accept=".json" onchange="importarBackup(event)">
                </div>
            </div>
        </section>
    </main>

    <nav class="nav-bar">
        <button onclick="showTab('dashboard')" class="bg-transparent text-indigo-600 nav-btn border-none"><i class="fas fa-home text-xl"></i></button>
        <button onclick="showTab('clientes')" class="bg-transparent text-gray-400 nav-btn border-none"><i class="fas fa-users text-xl"></i></button>
        <button onclick="showTab('novo')" class="btn-plus border-none"><i class="fas fa-plus text-xl"></i></button>
        <button onclick="showTab('config')" class="bg-transparent text-gray-400 nav-btn border-none"><i class="fas fa-cog text-xl"></i></button>
    </nav>

    <script>
        let dividas = JSON.parse(localStorage.getItem('zap_dividas')) || [];
        let historico = JSON.parse(localStorage.getItem('zap_historico')) || [];
        let config = JSON.parse(localStorage.getItem('zap_config')) || { loja: "MINHA LOJA", pix: "" };

        function inicializarApp() {
            if (localStorage.getItem('zap_primeira_vez') === 'false') document.getElementById('telaBemVindo').style.display = 'none';
            if (localStorage.getItem('zap_dark') === 'true') document.body.classList.add('dark-mode');
            
            document.getElementById('cfgLoja').value = config.loja;
            document.getElementById('cfgPix').value = config.pix;
            document.getElementById('data').valueAsDate = new Date();
            verificarAssinatura();
            renderDashboard();
        }

        function toggleDarkMode() {
            const isDark = document.body.classList.toggle('dark-mode');
            localStorage.setItem('zap_dark', isDark);
        }

        function fecharBemVindo() {
            localStorage.setItem('zap_primeira_vez', 'false');
            document.getElementById('telaBemVindo').style.display = 'none';
        }

        function showTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            document.querySelectorAll('.nav-btn').forEach(btn => btn.style.color = "#94a3b8");
            event.currentTarget.style.color = "#4f46e5";
            
            if(id === 'dashboard') renderDashboard();
            if(id === 'clientes') renderFichasClientes();
        }

        function renderDashboard() {
            const container = document.getElementById('listaDividas');
            const busca = document.getElementById('buscaCliente').value.toLowerCase();
            let total = 0;
            container.innerHTML = '';

            dividas.filter(d => d.nome.toLowerCase().includes(busca)).forEach(d => {
                total += d.valor;
                container.innerHTML += `
                <div class="card border-l-4 border-indigo-500">
                    <div class="flex justify-between items-start">
                        <div>
                            <b class="text-lg">${d.nome}</b>
                            <p class="text-[10px] font-bold opacity-40 uppercase">${d.produto}</p>
                        </div>
                        <span class="text-xl font-black text-indigo-500">R$ ${d.valor.toFixed(2).replace('.',',')}</span>
                    </div>
                    <div class="flex gap-2 mt-4">
                        <button onclick='cobrar(${JSON.stringify(d)})' class="flex-1 bg-green-500 text-white py-4 rounded-xl text-[10px] font-bold border-none shadow-sm">COBRAR ZAP</button>
                        <button onclick="darBaixa(${d.id})" class="flex-1 bg-indigo-600 text-white py-4 rounded-xl text-[10px] font-bold border-none shadow-sm">RECEBI</button>
                    </div>
                </div>`;
            });

            const recebido = historico.reduce((a,b) => a + b.valor, 0);
            document.getElementById('totalReceber').innerText = `R$ ${total.toFixed(2).replace('.',',')}`;
            document.getElementById('totalHistorico').innerText = `R$ ${recebido.toFixed(2).replace('.',',')}`;
            document.getElementById('nomeLojaExibicao').innerText = config.loja;

            const meta = total + recebido;
            const perc = meta > 0 ? (recebido / meta) * 100 : 0;
            document.getElementById('progressoVendas').style.width = perc + "%";
            document.getElementById('percentualTxt').innerText = Math.round(perc) + "%";
        }

        function renderFichasClientes() {
            const container = document.getElementById('listaFichasClientes');
            const nomes = Array.from(new Set([...dividas, ...historico].map(i => i.nome)));
            container.innerHTML = nomes.map(nome => {
                const devedor = dividas.filter(i => i.nome === nome).reduce((a,b) => a + b.valor, 0);
                return `<div class="card flex justify-between items-center py-4">
                    <span class="font-bold">${nome}</span>
                    <b class="${devedor > 0 ? 'text-red-500' : 'text-green-500'}">R$ ${devedor.toFixed(2).replace('.',',')}</b>
                </div>`;
            }).join('') || '<p class="text-center opacity-40 py-10">Nenhum registro ainda.</p>';
        }

        function cobrar(d) {
            const msg = `Olá *${d.nome}*, lembrete da loja *${config.loja}*.\nValor em aberto: *R$ ${d.valor.toFixed(2).replace('.',',')}*.\n\nChave Pix para pagamento: ${config.pix}`;
            window.open(`https://wa.me/55${d.whatsapp.replace(/\D/g, '')}?text=${encodeURIComponent(msg)}`);
        }

        function darBaixa(id) {
            if(!confirm("Confirmar recebimento deste valor?")) return;
            const item = dividas.find(d => d.id === id);
            historico.push(item);
            dividas = dividas.filter(d => d.id !== id);
            localStorage.setItem('zap_dividas', JSON.stringify(dividas));
            localStorage.setItem('zap_historico', JSON.stringify(historico));
            renderDashboard();
        }

        function gerarRelatorio() {
            let texto = `📋 RELATÓRIO DE COBRANÇA - ${config.loja}\n\n`;
            dividas.forEach(d => texto += `• ${d.nome}: R$ ${d.valor.toFixed(2)} (${d.produto})\n`);
            if(dividas.length === 0) texto = "Nenhuma dívida pendente.";
            alert(texto);
        }

        function verificarAssinatura() {
            const agora = new Date();
            const mesAno = (agora.getMonth() + 1).toString().padStart(2, '0') + agora.getFullYear().toString().slice(-2);
            if (localStorage.getItem('zap_chave_mes') === "ZAP" + mesAno) {
                const b = document.getElementById('statusBadge');
                b.innerText = "ASSINATURA ATIVA"; b.classList.replace('bg-black', 'bg-green-500');
                return;
            }
            let dI = localStorage.getItem('zap_data_instala');
            if (!dI) { dI = agora.getTime(); localStorage.setItem('zap_data_instala', dI); }
            if (agora.getTime() - parseInt(dI) > (15 * 24 * 60 * 60 * 1000)) document.getElementById('bloqueioPagamento').style.display = 'flex';
        }

        function verificarChave() {
            const input = document.getElementById('chaveAtivacao').value.toUpperCase().trim();
            const mesAno = (new Date().getMonth() + 1).toString().padStart(2, '0') + new Date().getFullYear().toString().slice(-2);
            if (input === "ZAP" + mesAno) { localStorage.setItem('zap_chave_mes', input); location.reload(); }
            else alert("Senha de ativação incorreta para este mês.");
        }

        function salvarConfig() {
            config.loja = document.getElementById('cfgLoja').value.toUpperCase();
            config.pix = document.getElementById('cfgPix').value;
            localStorage.setItem('zap_config', JSON.stringify(config));
            alert("Ajustes salvos com sucesso!"); location.reload();
        }

        function exportarBackup() {
            const b = new Blob([JSON.stringify({dividas, historico, config})], {type: 'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = 'backup_zapcaderno.json'; a.click();
        }

        function importarBackup(e) {
            const reader = new FileReader();
            reader.onload = (f) => {
                const d = JSON.parse(f.target.result);
                localStorage.setItem('zap_dividas', JSON.stringify(d.dividas));
                localStorage.setItem('zap_historico', JSON.stringify(d.historico));
                localStorage.setItem('zap_config', JSON.stringify(d.config));
                location.reload();
            };
            reader.readAsText(e.target.files[0]);
        }

        document.getElementById('formFiado').addEventListener('submit', (e) => {
            e.preventDefault();
            const v = document.getElementById('valor').value.replace('R$ ', '').replace(/\./g, '').replace(',', '.');
            dividas.push({
                id: Date.now(),
                nome: document.getElementById('nome').value,
                whatsapp: document.getElementById('whatsapp').value,
                produto: document.getElementById('produto').value,
                valor: parseFloat(v) || 0,
                data: document.getElementById('data').value
            });
            localStorage.setItem('zap_dividas', JSON.stringify(dividas));
            alert("Venda registrada!");
            showTab('dashboard');
        });

        document.getElementById('valor').addEventListener('input', (e) => {
            let v = e.target.value.replace(/\D/g, '');
            v = (v / 100).toFixed(2).replace('.', ',');
            e.target.value = v ? 'R$ ' + v : '';
        });

        window.onload = inicializarApp;
    </script>
</body>
</html>
