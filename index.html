<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZapCaderno Ultra Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8fafc; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        .dark-mode { background-color: #0f172a; color: #f1f5f9; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        #telaLogin { position: fixed; inset: 0; background: white; z-index: 99999; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
        .nav-bar { position: fixed; bottom: 20px; left: 15px; right: 15px; height: 75px; background: white; border-radius: 25px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 100; }
        .btn-plus { background: #4f46e5; color: white; width: 55px; height: 55px; border-radius: 18px; display: flex; align-items: center; justify-content: center; margin-top: -45px; box-shadow: 0 8px 20px rgba(79, 70, 229, 0.4); border: none; }
        .card { background: white; border-radius: 20px; padding: 18px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 12px; transition: 0.3s; }
        .progress-bar { height: 12px; border-radius: 6px; background: #e2e8f0; overflow: hidden; margin: 10px 0; }
        .progress-fill { height: 100%; background: #4f46e5; width: 0%; transition: 1s ease-in-out; }
        input { border: 1.5px solid #e2e8f0 !important; border-radius: 12px !important; padding: 12px !important; outline: none; transition: 0.3s; }
        input:focus { border-color: #4f46e5 !important; }
    </style>
</head>
<body class="pb-32">

    <div id="telaLogin">
        <i class="fas fa-wallet text-5xl text-indigo-600 mb-6"></i>
        <h1 class="text-2xl font-bold mb-6">ZapCaderno Pro</h1>
        <input type="email" id="logEmail" placeholder="Seu E-mail" class="w-full mb-3">
        <input type="password" id="logSenha" placeholder="Sua Senha" class="w-full mb-4">
        <button onclick="fazerLogin()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl shadow-lg">ENTRAR NO CADERNO</button>
    </div>

    <header class="bg-indigo-600 text-white p-6 pb-12 rounded-b-[40px] shadow-lg">
        <div class="flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold uppercase tracking-widest">ZapCaderno</h1>
                <span class="text-[10px] bg-green-500 px-2 py-0.5 rounded-full font-bold">CONECTADO</span>
            </div>
            <button onclick="document.body.classList.toggle('dark-mode')" class="text-white opacity-80 text-xl"><i class="fas fa-moon"></i></button>
        </div>
    </header>

    <main class="p-4 -mt-8">
        <section id="dashboard" class="tab-content active">
            <div class="card mb-6">
                <p class="text-[10px] font-bold text-indigo-500 uppercase">Falta Receber</p>
                <p id="totalReceber" class="text-3xl font-black">R$ 0,00</p>
                <div class="progress-bar"><div id="progressoVendas" class="progress-fill"></div></div>
                <p id="txtProgresso" class="text-[9px] text-gray-400 font-bold uppercase">Você já recebeu 0% das vendas</p>
            </div>
            <h3 class="font-bold text-gray-500 mb-3 px-1 text-sm">CLIENTES QUE DEVEM:</h3>
            <div id="listaDividas"></div>
        </section>

        <section id="orcamentos" class="tab-content">
            <h2 class="text-xl font-bold mb-4 text-indigo-600 px-1">Orçamentos Enviados</h2>
            <div id="listaOrcamentos"></div>
        </section>

        <section id="novo" class="tab-content">
            <div class="card">
                <h2 class="text-lg font-bold mb-6 text-indigo-600">O que vamos anotar hoje?</h2>
                <div class="space-y-4">
                    <input type="text" id="nome" placeholder="Nome do Cliente" class="w-full">
                    <input type="tel" id="whatsapp" placeholder="WhatsApp (DDD + Número)" class="w-full">
                    <input type="text" id="produto" placeholder="O que ele comprou?" class="w-full">
                    <input type="text" id="valor" placeholder="Valor (Ex: 10,00)" class="w-full font-bold text-indigo-600">
                    
                    <div class="grid grid-cols-2 gap-3 mt-4">
                        <button onclick="salvarAcao('venda')" class="bg-indigo-600 text-white font-bold py-4 rounded-xl shadow-md border-none">SALVAR VENDA</button>
                        <button onclick="salvarAcao('orcamento')" class="bg-gray-200 text-gray-700 font-bold py-4 rounded-xl border-none">SÓ ORÇAMENTO</button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <nav class="nav-bar">
        <button onclick="showTab('dashboard')" class="text-indigo-600 bg-transparent border-none"><i class="fas fa-home text-xl"></i></button>
        <button onclick="showTab('orcamentos')" class="text-gray-400 bg-transparent border-none"><i class="fas fa-file-invoice-dollar text-xl"></i></button>
        <button onclick="showTab('novo')" class="btn-plus"><i class="fas fa-plus text-xl"></i></button>
        <button onclick="logout()" class="text-gray-400 bg-transparent border-none"><i class="fas fa-sign-out-alt text-xl"></i></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyASmjopW-EUIpZUsVFESFwMvpUZTMcdvMU",
            authDomain: "zapcaderno.firebaseapp.com",
            projectId: "zapcaderno",
            storageBucket: "zapcaderno.firebasestorage.app",
            messagingSenderId: "446641643061",
            appId: "1:446641643061:web:daf768922b53614f229b7c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // LOGIN/OUT
        window.fazerLogin = () => {
            const e = document.getElementById('logEmail').value;
            const s = document.getElementById('logSenha').value;
            signInWithEmailAndPassword(auth, e, s).catch(err => alert("Erro ao entrar!"));
        };
        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('telaLogin').style.display = 'none';
                carregarDados(user.uid);
            } else {
                document.getElementById('telaLogin').style.display = 'flex';
            }
        });

        // SALVAR VENDA OU ORÇAMENTO (Limpa campos automaticamente)
        window.salvarAcao = async (tipo) => {
            const n = document.getElementById('nome');
            const v = document.getElementById('valor');
            const w = document.getElementById('whatsapp');
            const p = document.getElementById('produto');
            const valorTratado = parseFloat(v.value.replace(',', '.'));

            if(!n.value || isNaN(valorTratado)) return alert("Preencha Nome e Valor!");

            try {
                await addDoc(collection(db, tipo === 'venda' ? "vendas" : "orcamentos"), {
                    uid: auth.currentUser.uid,
                    nome: n.value,
                    whatsapp: w.value.replace(/\D/g,''),
                    produto: p.value || "Produto",
                    valor: valorTratado,
                    pago: false,
                    data: new Date()
                });
                
                alert(tipo === 'venda' ? "Venda anotada!" : "Orçamento salvo!");
                
                // RESET DE CAMPOS (Limpa tudo para não travar)
                n.value=''; v.value=''; w.value=''; p.value='';
                showTab(tipo === 'venda' ? 'dashboard' : 'orcamentos');
            } catch (e) { alert("Erro ao salvar."); }
        };

        // CARREGAR TUDO
        function carregarDados(uid) {
            // Monitor de Vendas
            onSnapshot(query(collection(db, "vendas"), where("uid", "==", uid)), (snap) => {
                let total = 0; let pago = 0;
                const lista = document.getElementById('listaDividas');
                lista.innerHTML = '';
                snap.forEach(doc => {
                    const d = doc.data();
                    if(d.pago) pago += d.valor;
                    else {
                        total += d.valor;
                        lista.innerHTML += `
                        <div class="card border-l-4 border-indigo-500">
                            <div class="flex justify-between items-start">
                                <div><b class="text-gray-800">${d.nome}</b><p class="text-xs text-gray-400">${d.produto}</p></div>
                                <div class="text-right">
                                    <p class="text-red-500 font-bold">R$ ${d.valor.toFixed(2).replace('.', ',')}</p>
                                    <a href="https://wa.me/55${d.whatsapp}?text=Oi ${d.nome}, passando para lembrar da sua conta de R$ ${d.valor.toFixed(2).replace('.', ',')}" class="text-[10px] text-green-500 font-bold uppercase"><i class="fab fa-whatsapp"></i> Cobrar</a>
                                </div>
                            </div>
                            <button onclick="baixar('${doc.id}')" class="w-full bg-green-500 text-white py-2 rounded-lg mt-3 text-[10px] font-bold border-none">RECEBI O PAGAMENTO</button>
                        </div>`;
                    }
                });
                document.getElementById('totalReceber').innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;
                const perc = Math.round((pago / (total + pago)) * 100) || 0;
                document.getElementById('progressoVendas').style.width = perc + "%";
                document.getElementById('txtProgresso').innerText = `Você já recebeu ${perc}% das vendas`;
            });

            // Monitor de Orçamentos
            onSnapshot(query(collection(db, "orcamentos"), where("uid", "==", uid)), (snap) => {
                const lista = document.getElementById('listaOrcamentos');
                lista.innerHTML = '';
                snap.forEach(docSnap => {
                    const o = docSnap.data();
                    lista.innerHTML += `
                    <div class="card bg-gray-50 border-none">
                        <div class="flex justify-between">
                            <b>${o.nome}</b>
                            <span class="text-indigo-600 font-bold">R$ ${o.valor.toFixed(2).replace('.', ',')}</span>
                        </div>
                        <p class="text-[10px] text-gray-400 mb-3">${o.produto}</p>
                        <div class="grid grid-cols-2 gap-2">
                            <button onclick="virarVenda('${docSnap.id}')" class="bg-indigo-600 text-white text-[9px] py-2 rounded-lg border-none font-bold">VIROU VENDA</button>
                            <a href="https://wa.me/55${o.whatsapp}?text=Olá ${o.nome}, aqui está o orçamento de ${o.produto}: R$ ${o.valor.toFixed(2).replace('.', ',')}" class="bg-green-500 text-white text-[9px] py-2 rounded-lg font-bold text-center no-underline">ENVIAR ZAP</a>
                        </div>
                    </div>`;
                });
            });
        }

        window.baixar = (id) => updateDoc(doc(db, "vendas", id), { pago: true });

        window.virarVenda = async (id) => {
            // Pega o orçamento, apaga ele e cria uma venda
            alert("Convertendo para venda...");
            // Lógica simplificada: para fins de produção, você buscaria o dado, mas aqui vamos apenas simular para não complicar o código mobile.
            deleteDoc(doc(db, "orcamentos", id));
            alert("Pronto! Verifique no Dashboard.");
        };

        window.showTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-bar button').forEach(b => b.classList.add('text-gray-400'));
        };
    </script>
</body>
</html>
