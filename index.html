<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Meu Caderno Online</title>
    
    <!-- Firebase SDKs -->
    <script type="module">
        // Importar Firebase
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, orderBy, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        
        // ⚠️ SUBSTITUA COM SUAS CONFIGURAÇÕES DO FIREBASE ⚠️
        const firebaseConfig = {
            apiKey: "SUA_API_KEY",
            authDomain: "SEU_PROJETO.firebaseapp.com",
            projectId: "SEU_PROJECT_ID",
            storageBucket: "SEU_PROJECT_ID.firebasestorage.app",
            messagingSenderId: "SEU_SENDER_ID",
            appId: "SEU_APP_ID"
        };
        
        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        // Estado do app
        let usuarioAtual = null;
        let vendasCache = [];
        
        // Elementos da UI
        const telaLogin = document.getElementById('telaLogin');
        const telaApp = document.getElementById('telaApp');
        const emailInput = document.getElementById('email');
        const senhaInput = document.getElementById('senha');
        const btnLogin = document.getElementById('btnLogin');
        const btnLogout = document.getElementById('btnLogout');
        const erroLogin = document.getElementById('erroLogin');
        const totalDebito = document.getElementById('totalDebito');
        const listaVendas = document.getElementById('listaVendas');
        const btnNovaVenda = document.getElementById('btnNovaVenda');
        
        // ========== FUNÇÕES DE AUTENTICAÇÃO ==========
        
        btnLogin.addEventListener('click', async () => {
            const email = emailInput.value.trim();
            const senha = senhaInput.value;
            
            if (!email || !senha) {
                erroLogin.textContent = 'Preencha email e senha';
                return;
            }
            
            erroLogin.textContent = '';
            btnLogin.disabled = true;
            btnLogin.textContent = 'Entrando...';
            
            try {
                await signInWithEmailAndPassword(auth, email, senha);
                // O onAuthStateChanged vai cuidar da transição
            } catch (error) {
                console.error('Erro no login:', error);
                if (error.code === 'auth/user-not-found') {
                    erroLogin.textContent = 'Usuário não encontrado';
                } else if (error.code === 'auth/wrong-password') {
                    erroLogin.textContent = 'Senha incorreta';
                } else {
                    erroLogin.textContent = 'Erro ao fazer login. Tente novamente.';
                }
                btnLogin.disabled = false;
                btnLogin.textContent = 'Entrar';
            }
        });
        
        btnLogout.addEventListener('click', async () => {
            await signOut(auth);
        });
        
        // Monitorar estado de autenticação
        onAuthStateChanged(auth, (user) => {
            usuarioAtual = user;
            
            if (user) {
                // Usuário logado - mostrar app
                telaLogin.classList.add('hidden');
                telaApp.classList.remove('hidden');
                carregarVendas();
            } else {
                // Usuário deslogado - mostrar login
                telaLogin.classList.remove('hidden');
                telaApp.classList.add('hidden');
                emailInput.value = '';
                senhaInput.value = '';
                btnLogin.disabled = false;
                btnLogin.textContent = 'Entrar';
            }
        });
        
        // ========== FUNÇÕES DE VENDAS ==========
        
        async function carregarVendas() {
            if (!usuarioAtual) return;
            
            try {
                listaVendas.innerHTML = '<div class="loading">Carregando vendas...</div>';
                
                const vendasRef = collection(db, 'vendas');
                const q = query(
                    vendasRef, 
                    where('userId', '==', usuarioAtual.uid),
                    orderBy('data', 'desc')
                );
                const querySnapshot = await getDocs(q);
                
                vendasCache = [];
                let total = 0;
                
                if (querySnapshot.empty) {
                    listaVendas.innerHTML = '<div class="empty">Nenhuma venda cadastrada</div>';
                    totalDebito.textContent = 'R$ 0,00';
                    return;
                }
                
                const vendasHtml = [];
                querySnapshot.forEach((doc) => {
                    const venda = { id: doc.id, ...doc.data() };
                    vendasCache.push(venda);
                    total += venda.valor || 0;
                    
                    const dataFormatada = venda.data ? new Date(venda.data.seconds * 1000).toLocaleDateString('pt-BR') : 'Data não definida';
                    const valorFormatado = (venda.valor || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                    
                    vendasHtml.push(`
                        <div class="venda-card" data-id="${venda.id}">
                            <div class="venda-info">
                                <div class="venda-cliente">${escapeHtml(venda.cliente || 'Cliente não informado')}</div>
                                <div class="venda-data">${dataFormatada}</div>
                            </div>
                            <div class="venda-valor ${(venda.valor || 0) < 0 ? 'negativo' : ''}">${valorFormatado}</div>
                            <div class="venda-actions">
                                <button class="btn-deletar" data-id="${venda.id}">🗑️</button>
                            </div>
                        </div>
                    `);
                });
                
                listaVendas.innerHTML = vendasHtml.join('');
                totalDebito.textContent = total.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                
                // Adicionar eventos de deletar
                document.querySelectorAll('.btn-deletar').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const id = btn.dataset.id;
                        deletarVenda(id);
                    });
                });
                
            } catch (error) {
                console.error('Erro ao carregar vendas:', error);
                listaVendas.innerHTML = '<div class="error">❌ Erro ao carregar vendas. Verifique sua internet.</div>';
            }
        }
        
        async function deletarVenda(id) {
            if (!usuarioAtual || !confirm('Tem certeza que deseja excluir esta venda?')) return;
            
            try {
                await deleteDoc(doc(db, 'vendas', id));
                carregarVendas();
            } catch (error) {
                console.error('Erro ao deletar:', error);
                alert('Erro ao deletar venda');
            }
        }
        
        async function adicionarVenda() {
            if (!usuarioAtual) return;
            
            const cliente = prompt('Nome do cliente:');
            if (!cliente) return;
            
            let valor = prompt('Valor da venda (ex: 150.00):');
            if (!valor) return;
            
            valor = parseFloat(valor.replace(',', '.'));
            if (isNaN(valor)) {
                alert('Valor inválido');
                return;
            }
            
            try {
                await addDoc(collection(db, 'vendas'), {
                    cliente: cliente,
                    valor: valor,
                    data: new Date(),
                    userId: usuarioAtual.uid,
                    status: 'pendente'
                });
                carregarVendas();
            } catch (error) {
                console.error('Erro ao adicionar:', error);
                alert('Erro ao adicionar venda');
            }
        }
        
        btnNovaVenda.addEventListener('click', adicionarVenda);
        
        // Função auxiliar para evitar XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Prevenir submit do form de login com Enter
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !telaLogin.classList.contains('hidden')) {
                btnLogin.click();
            }
        });
        
        // Versão offline/temporária se o Firebase falhar
        window.addEventListener('load', () => {
            console.log('App Meu Caderno Online carregado');
        });
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        
        /* Telas */
        .tela {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 24px;
            min-height: 80vh;
        }
        
        .hidden {
            display: none;
        }
        
        /* Tela de Login */
        .login-logo {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .login-logo h1 {
            font-size: 28px;
            color: #667eea;
            margin-bottom: 8px;
        }
        
        .login-logo p {
            color: #666;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group input {
            width: 100%;
            padding: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .btn-login:active {
            transform: scale(0.98);
        }
        
        .btn-login:disabled {
            opacity: 0.7;
        }
        
        .erro-login {
            color: #e74c3c;
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
        }
        
        /* Tela do App */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid #f0f0f0;
        }
        
        .app-header h1 {
            font-size: 24px;
            color: #333;
        }
        
        .btn-logout {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
        }
        
        .total-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            padding: 20px;
            color: white;
            margin-bottom: 24px;
            text-align: center;
        }
        
        .total-card span {
            font-size: 14px;
            opacity: 0.9;
        }
        
        .total-card h2 {
            font-size: 32px;
            margin-top: 8px;
        }
        
        .vendas-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        
        .vendas-header h3 {
            color: #333;
        }
        
        .btn-novo {
            background: #667eea;
            color: white;
            border: none;
            width: 44px;
            height: 44px;
            border-radius: 22px;
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .btn-novo:active {
            transform: scale(0.95);
        }
        
        .lista-vendas {
            max-height: 60vh;
            overflow-y: auto;
        }
        
        .venda-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }
        
        .venda-card:active {
            background: #e9ecef;
        }
        
        .venda-info {
            flex: 1;
        }
        
        .venda-cliente {
            font-weight: bold;
            color: #333;
            margin-bottom: 4px;
        }
        
        .venda-data {
            font-size: 12px;
            color: #666;
        }
        
        .venda-valor {
            font-weight: bold;
            color: #27ae60;
            margin-right: 12px;
        }
        
        .venda-valor.negativo {
            color: #e74c3c;
        }
        
        .btn-deletar {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            padding: 8px;
            opacity: 0.6;
        }
        
        .btn-deletar:active {
            opacity: 1;
        }
        
        .loading, .empty, .error {
            text-align: center;
            padding: 40px;
            color: #666;
        }
        
        .error {
            color: #e74c3c;
        }
        
        /* Tab Navigation */
        .tab-nav {
            display: flex;
            justify-content: space-around;
            margin-top: 24px;
            padding-top: 16px;
            border-top: 2px solid #f0f0f0;
        }
        
        .tab-item {
            text-align: center;
            color: #666;
            font-size: 12px;
            cursor: pointer;
            padding: 8px;
        }
        
        .tab-item.active {
            color: #667eea;
            font-weight: bold;
        }
        
        @media (max-width: 480px) {
            .tela {
                padding: 20px;
            }
            
            .total-card h2 {
                font-size: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Tela de Login -->
        <div id="telaLogin" class="tela">
            <div class="login-logo">
                <h1>📓 Meu Caderno</h1>
                <p>Online</p>
            </div>
            <div class="input-group">
                <input type="email" id="email" placeholder="Email" autocomplete="email">
            </div>
            <div class="input-group">
                <input type="password" id="senha" placeholder="Senha" autocomplete="current-password">
            </div>
            <button id="btnLogin" class="btn-login">Entrar</button>
            <div id="erroLogin" class="erro-login"></div>
        </div>
        
        <!-- Tela do App -->
        <div id="telaApp" class="tela hidden">
            <div class="app-header">
                <h1>📓 Meu Caderno</h1>
                <button id="btnLogout" class="btn-logout" title="Sair">🚪</button>
            </div>
            
            <div class="total-card">
                <span>TOTAL EM DÉBITO</span>
                <h2 id="totalDebito">R$ 0,00</h2>
            </div>
            
            <div class="vendas-header">
                <h3>📋 Últimas Vendas</h3>
                <button id="btnNovaVenda" class="btn-novo">+</button>
            </div>
            
            <div id="listaVendas" class="lista-vendas">
                <div class="loading">Carregando vendas...</div>
            </div>
            
            <div class="tab-nav">
                <div class="tab-item active">Vendas</div>
                <div class="tab-item">Histórico</div>
                <div class="tab-item">Orçamentos</div>
                <div class="tab-item">Perfil</div>
            </div>
        </div>
    </div>
</body>
</html>
