<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZapCaderno Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { color-scheme: dark; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #0a0a0a; color: #ffffff; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        
        /* Telas de Estado */
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        #telaLogin { position: fixed; inset: 0; background: #0a0a0a; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
        #carregandoInicial { position: fixed; inset: 0; background: #0a0a0a; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* UI do App */
        .nav-bar { position: fixed; bottom: 20px; left: 15px; right: 15px; height: 75px; background: #161616; border-radius: 30px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 15px 35px rgba(0,0,0,0.9); z-index: 1000; border: 1px solid #222; }
        .btn-plus { background: #4f46e5; color: white; width: 65px; height: 65px; border-radius: 22px; display: flex; align-items: center; justify-content: center; margin-top: -45px; border: 4px solid #0a0a0a; font-size: 26px; box-shadow: 0 10px 20px rgba(79, 70, 229, 0.4); }
        .nav-btn { color: #444; font-size: 24px; background: none; border: none; cursor: pointer; transition: 0.3s; }
        .nav-btn.active { color: #818cf8; }
        .card { background: #161616; border-radius: 24px; padding: 22px; margin-bottom: 15px; border: 1px solid #222; }
        input, textarea { background: #1f1f1f !important; border: 1px solid #333 !important; border-radius: 14px !important; padding: 16px !important; width: 100%; margin-bottom: 12px; color: #fff !important; font-size: 16px; outline: none; }
    </style>
</head>
<body class="pb-36">

    <div id="carregandoInicial">
        <div class="h-12 w-12 animate-spin rounded-full border-4 border-indigo-600 border-t-transparent"></div>
        <p class="mt-4 text-[10px] font-bold text-gray-500 uppercase tracking-widest">Iniciando ZapCaderno...</p>
    </div>

    <div id="telaLogin">
        <div class="text-center mb-8">
            <h2 class="text-4xl font-black text-indigo-500 italic tracking-tighter">ZAPCADERNO</h2>
            <p class="text-gray-500 text-sm">Controle sua oficina/negócio</p>
        </div>
        <input type="email" id="logEmail" placeholder="Seu e-mail">
        <input type="password" id="logSenha" placeholder="Sua senha">
        <button id="btnEntrar" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-bold shadow-xl active:scale-95 transition">ENTRAR NO APP</button>
        <p id="erroLogin" class="text-red-500 text-xs mt-4 hidden">E-mail ou senha incorretos!</p>
    </div>

    <header class="p-6 flex justify-between items-center">
        <div>
            <h1 id="headerNome" class="text-xl font-bold italic uppercase tracking-tight">ZAPCADERNO</h1>
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <p id="headerPix" class="text-[9px] text-gray-500 font-mono uppercase tracking-widest">Acesso Ativo</p>
            </div>
        </div>
        <button onclick="location.reload()" class="text-gray-500"><i class="fas fa-sync-alt"></i></button>
    </header>

    <main class="p-4">
        <div id="dashboard" class="tab-content active">
            <div class="card bg-gradient-to-br from-indigo-900/20 to-black border-indigo-900/30">
                <p class="text-[10px] text-indigo-400 font-bold uppercase mb-1 tracking-widest">Saldo a Receber</p>
                <p id="totalReceber" class="text-4xl font-bold text-white">R$ 0,00</p>
            </div>
            <div id="listaDividas" class="space-y-3 mt-6"></div>
        </div>

        <div id="novo" class="tab-content">
            <div class="card">
                <h3 class="text-indigo-400 text-xs font-bold mb-4 uppercase italic">Registrar Cobrança</h3>
                <input type="text" id="vendaNome" placeholder="Nome do Cliente">
                <input type="text" id="vendaWhatsapp" placeholder="WhatsApp (DDD+Número)">
                <input type="number" id="vendaValor" placeholder="Valor R$">
                <label class="text-[10px] text-gray-500 font-bold uppercase ml-1">Data do Vencimento:</label>
                <input type="date" id="vendaDataPagar">
                <button id="btnSalvarVenda" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold mt-2 shadow-lg">SALVAR NO SISTEMA</button>
            </div>
        </div>
    </main>

    <nav class="nav-bar">
        <button id="tabDash" class="nav-btn active"><i class="fas fa-wallet"></i></button>
        <button id="tabNovo" class="btn-plus"><i class="fas fa-plus"></i></button>
        <button id="btnLogout" class="nav-btn"><i class="fas fa-sign-out-alt"></i></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyASmjopW-EUIpZUsVFESFwMvpUZTMcdvMU",
            authDomain: "zapcaderno.firebaseapp.com",
            projectId: "zapcaderno",
            storageBucket: "zapcaderno.firebasestorage.app",
            messagingSenderId: "446641643061",
            appId: "1:446641643061:web:daf768922b53614f229b7c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- CONTROLE DE NAVEGAÇÃO ---
        function mudarAba(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'dashboard') document.getElementById('tabDash').classList.add('active');
            window.scrollTo(0,0);
        }
        document.getElementById('tabDash').onclick = () => mudarAba('dashboard');
        document.getElementById('tabNovo').onclick = () => mudarAba('novo');
        document.getElementById('btnLogout').onclick = () => { if(confirm("Sair?")) signOut(auth); };

        // --- AUTENTICAÇÃO ---
        onAuthStateChanged(auth, (user) => {
            document.getElementById('carregandoInicial').style.display = 'none';
            if (user) {
                document.getElementById('telaLogin').style.display = 'none';
                vincularDados(user.uid);
            } else {
                document.getElementById('telaLogin').style.display = 'flex';
            }
        });

        document.getElementById('btnEntrar').onclick = () => {
            const email = document.getElementById('logEmail').value;
            const senha = document.getElementById('logSenha').value;
            const btn = document.getElementById('btnEntrar');
            
            if(!email || !senha) return alert("Preencha tudo!");

            btn.innerText = "VERIFICANDO...";
            btn.disabled = true;

            signInWithEmailAndPassword(auth, email, senha)
                .catch(err => {
                    btn.innerText = "ENTRAR NO APP";
                    btn.disabled = false;
                    document.getElementById('erroLogin').classList.remove('hidden');
                    console.error(err);
                });
        };

        // --- LÓGICA DO APP ---
        function vincularDados(uid) {
            const q = query(collection(db, "vendas"), where("uid", "==", uid));
            onSnapshot(q, (snap) => {
                let total = 0;
                const container = document.getElementById('listaDividas');
                container.innerHTML = '';
                
                snap.forEach(docSnap => {
                    const d = docSnap.data();
                    if (!d.pago) {
                        total += (d.valor || 0);
                        const dataFormat = d.dataPagar ? d.dataPagar.split('-').reverse().join('/') : '--/--';
                        container.innerHTML += `
                            <div class="card flex justify-between items-center border-l-4 border-indigo-600">
                                <div class="max-w-[60%]">
                                    <b class="block truncate">${d.nome}</b>
                                    <span class="text-[10px] text-gray-500">Vence: ${dataFormat}</span>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="window.cobranca('${d.whatsapp}', '${d.valor}')" class="bg-green-600 p-3 rounded-xl text-white border-none"><i class="fab fa-whatsapp"></i></button>
                                    <button onclick="window.marcarPago('${docSnap.id}')" class="bg-indigo-600 text-white px-3 py-2 rounded-xl text-[10px] font-bold uppercase border-none">OK</button>
                                </div>
                            </div>`;
                    }
                });
                document.getElementById('totalReceber').innerText = `R$ ${total.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            });
        }

        window.cobranca = (tel, val) => {
            const msg = `Olá! Segue lembrete de cobrança no valor de R$ ${val}. Podemos agilizar o pagamento?`;
            window.open(`https://wa.me/55${tel.replace(/\D/g, '')}?text=${msg}`);
        };

        window.marcarPago = async (id) => {
            if(confirm("Confirmar recebimento?")) await updateDoc(doc(db, "vendas", id), { pago: true });
        };

        document.getElementById('btnSalvarVenda').onclick = async () => {
            const n = document.getElementById('vendaNome').value;
            const v = parseFloat(document.getElementById('vendaValor').value);
            const d = document.getElementById('vendaDataPagar').value;
            
            if(!n || !v || !d) return alert("Preencha todos os campos!");

            try {
                await addDoc(collection(db, "vendas"), {
                    uid: auth.currentUser.uid,
                    nome: n,
                    whatsapp: document.getElementById('vendaWhatsapp').value,
                    valor: v,
                    dataPagar: d,
                    pago: false,
                    timestamp: new Date()
                });
                alert("Venda registrada!");
                mudarAba('dashboard');
                // Limpa campos
                document.getElementById('vendaNome').value = '';
                document.getElementById('vendaValor').value = '';
            } catch (e) { alert("Erro ao salvar."); }
        };
    </script>
</body>
</html>
