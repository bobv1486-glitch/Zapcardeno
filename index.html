<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAPCADERNO PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #tela-carregamento, #tela-liberada, #tela-bloqueio { display: none; }
        .flex-active { display: flex !important; }
        .block-active { display: block !important; }
        .hide { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 font-sans antialiased text-gray-900">

    <div id="tela-carregamento" class="h-screen flex flex-col items-center justify-center bg-white">
        <div class="h-12 w-12 animate-spin rounded-full border-4 border-blue-600 border-t-transparent"></div>
        <p class="mt-4 text-[10px] font-black text-gray-400 uppercase tracking-widest">Sincronizando Banco de Dados</p>
    </div>

    <div id="tela-bloqueio" class="min-h-screen flex flex-col items-center justify-center p-6 bg-slate-100">
        <div class="w-full max-w-sm bg-white rounded-[3rem] shadow-2xl overflow-hidden border border-white">
            <div class="bg-blue-600 p-12 text-center">
                <h1 class="text-4xl font-black text-white italic tracking-tighter">Zapcaderno</h1>
                <p class="text-blue-100 text-[10px] mt-2 font-bold uppercase tracking-[0.2em] opacity-70">Acesso Expirado</p>
            </div>
            <div class="p-10 text-center">
                <div class="mb-8">
                    <p class="text-red-500 text-[10px] font-black uppercase tracking-widest mb-2">Seus 15 dias acabaram</p>
                    <span class="text-6xl font-black text-gray-900">R$ 14,99</span>
                </div>
                <a href="https://link.mercadopago.com.br/zapcaderno" target="_blank" 
                   class="block w-full bg-blue-600 text-white font-black py-5 rounded-2xl shadow-xl mb-6 text-lg active:scale-95 transition">
                    LIBERAR AGORA
                </a>
                <button onclick="validarAcesso()" class="text-[10px] text-gray-400 hover:text-blue-600 font-black underline uppercase tracking-tighter">
                    Já paguei? Verificar agora
                </button>
            </div>
        </div>
    </div>

    <div id="tela-liberada" class="min-h-screen flex flex-col">
        <header class="bg-white border-b px-6 py-5 flex justify-between items-center sticky top-0 z-20">
            <h1 class="text-2xl font-black text-blue-600 italic tracking-tighter">ZAPCADERNO</h1>
            <div class="flex items-center px-3 py-1 rounded-full bg-blue-50 border border-blue-100">
                <span id="dot-status" class="h-2 w-2 rounded-full mr-2 animate-pulse"></span>
                <span id="badge-status" class="text-[10px] font-black uppercase tracking-tighter"></span>
            </div>
        </header>

        <main class="p-6 flex-1 max-w-2xl mx-auto w-full space-y-6">
            
            <div class="bg-white rounded-[2.5rem] p-8 shadow-xl border border-gray-100">
                <div class="flex justify-between items-center mb-4">
                    <span class="text-[10px] font-black text-blue-500 uppercase tracking-widest">Editor de Notas</span>
                    <span id="contador" class="text-[10px] font-bold text-gray-400 uppercase">0 Caracteres</span>
                </div>
                
                <input type="text" id="titulo-nota" placeholder="Título da Nota..." class="w-full mb-4 text-xl font-bold border-none outline-none placeholder:text-gray-300">
                
                <textarea id="texto-nota" oninput="atualizarContador()" class="w-full h-64 p-0 bg-transparent border-none outline-none text-gray-700 text-lg leading-relaxed resize-none" placeholder="Comece a escrever..."></textarea>
                
                <div class="grid grid-cols-2 gap-3 mt-6">
                    <button onclick="salvarNota()" class="bg-blue-600 text-white py-4 rounded-2xl font-black text-xs shadow-lg shadow-blue-100 active:scale-95 transition">
                        SALVAR NOTA
                    </button>
