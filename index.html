<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZapCaderno Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { color-scheme: dark; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #0a0a0a; color: #ffffff; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        /* Telas */
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        #tela-bloqueio, #tela-login, #tela-carregando {
            position: fixed; inset: 0; background: #0a0a0a; z-index: 9999;
            display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center;
        }
        
        /* Loading inicial sempre ativo no começo */
        #tela-carregamento { display: flex; z-index: 10001; }

        .nav-bar { position: fixed; bottom: 20px; left: 15px; right: 15px; height: 75px; background: #161616; border-radius: 30px; display: flex; justify-content: space-around; align-items: center; z-index: 1000; border: 1px solid #222; }
        .btn-plus { background: #4f46e5; color: white; width: 60px; height: 60px; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin-top: -40px; border: 4px solid #0a0a0a; font-size: 24px; }
        .card { background: #161616; border-radius: 24px; padding: 20px; margin-bottom: 15px; border: 1px solid #222; }
        input, textarea { background: #1f1f1f !important; border: 1px solid #333 !important; border-radius: 12px !important; padding: 14px !important; width: 100%; margin-bottom: 10px; color: #fff !important; outline: none; }
    </style>
</head>
<body class="pb-36">

    <div id="tela-carregamento">
        <div class="h-10 w-10 animate-spin rounded-full border-4 border-indigo-600 border-t-transparent"></div>
        <p class="mt-4 text-[10px] font-bold text-gray-500 uppercase tracking-widest">Sincronizando Sistema</p>
    </div>

    <div id="tela-bloqueio">
        <i class="fas fa-lock text-indigo-500 text-5xl mb-6"></i>
        <h2 class="text-3xl font-black italic mb-2">ACESSO EXPIRADO</h2>
        <p class="text-gray-500 text-sm mb-8">Seu período de 15 dias acabou.<br>Assine para continuar usando.</p>
        <div class="text-5xl font-black mb-8 text-white">R$ 14,99</div>
        <a href="https://link.mercadopago.com.br/zapcaderno" target="_blank" class="w-full bg-indigo-600 py-5 rounded-2xl font-bold block mb-4">LIBERAR AGORA</a>
        <button onclick="location.reload()" class="text-xs text-gray-600 underline uppercase">Já paguei? Verificar</button>
    </div>

    <div id="tela-login">
        <div class="mb-10">
            <h2 class="text-4xl font-black text-indigo-500 italic tracking-tighter">ZAPCADERNO</h2>
            <p class="text-gray-500 text-sm mt-1">Acesse sua conta profissional</p>
        </div>
        <input type="email" id="email" placeholder="E-mail" value="bobv1486@gmail.com">
        <input type="password" id="senha" placeholder="Senha">
        <button id="btn-entrar" class="w-full bg-indigo-600 py-5 rounded-2xl font-bold shadow-2xl active:scale-95 transition">ENTRAR</button>
    </div>

    <header class="p-6 flex justify-between items-start">
        <div>
            <h1 id="h-nome" class="text-xl font-bold italic uppercase tracking-tighter">ZAPCADERNO</h1>
            <div class="flex items-center gap-2 mt-1">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <span id="badge-acesso" class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Acesso Ativo</span>
            </div>
        </div>
        <button onclick="location.reload()" class="bg-gray-900 p-3 rounded-full text-gray-500"><i class="fas fa-sync-alt"></i></button>
    </header>

    <main class="p-4">
        <div id="dashboard" class="tab-content active">
            <div class="card bg-gradient-to-br from-indigo-900/30 to-black">
                <p class="text-[10px] text-indigo-400 font-bold uppercase mb-1 tracking-widest">Total a Receber</p>
                <p id="total-receber" class="text-4xl font-bold">R$ 0,00</p>
            </div>
            <div id="lista-vendas" class="space-y-3 mt-6"></div>
        </div>

        <div id="novo" class="tab-content">
            <div class="card">
                <h3 class="text-indigo-400 text-xs font-bold mb-4 uppercase italic">Nova Cobrança</h3>
                <input type="text" id="v-nome" placeholder="Nome do Cliente">
                <input type="number" id="v-valor" placeholder="Valor R$">
                <input type="date" id="v-data">
                <button id="btn-save-v" class="w-full bg-indigo-600 py-4 rounded-xl font-bold mt-2">CONFIRMAR</button>
            </div>
        </div>
    </main>

    <nav class="nav-bar">
        <button onclick="openTab('dashboard')" class="nav-btn active"><i class="fas fa-wallet"></i></button>
        <button onclick="openTab('novo')" class="btn-plus"><i class="fas fa-plus"></i></button>
        <button onclick="alert('Configurações em breve')" class="nav-btn"><i class="fas fa-cog"></i></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyASmjopW-EUIpZUsVFESFwMvpUZTMcdvMU",
            authDomain: "zapcaderno.firebaseapp.com",
            projectId: "zapcaderno",
            storageBucket: "zapcaderno.firebasestorage.app",
            messagingSenderId: "446641643061",
            appId: "1:446641643061:web:daf768922b53614f229b7c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const API_SHEETDB = 'https://sheetdb.io/api/v1/2f431iyij8cgi';

        // --- SISTEMA DE ACESSO ---
        async function verificarLicenca() {
            // Check 15 dias primeiro (Local)
            let start = localStorage.getItem('z_start_v3');
            if (!start) {
                start = new Date().toISOString();
                localStorage.setItem('z_start_v3', start);
            }
            const diasUso = Math.floor((new Date() - new Date(start)) / (1000*60*60*24));

            // Check Pagamento (API)
            let pago = false;
            try {
                const res = await fetch(API_SHEETDB);
                const dados = await res.json();
                pago = dados.some(i => String(i.status).toLowerCase() === 'approved');
            } catch (e) { console.log("Erro API, mantendo teste"); }

            document.getElementById('tela-carregamento').style.display = 'none';

            if (pago) {
                document.getElementById('badge-acesso').innerText = "VITALÍCIO ATIVO";
                return true;
            } else if (diasUso <= 15) {
                document.getElementById('badge-acesso').innerText = `TESTE: ${15-diasUso} DIAS`;
                return true;
            } else {
                document.getElementById('tela-bloqueio').style.display = 'flex';
                return false;
            }
        }

        onAuthStateChanged(auth, async (user) => {
            const ok = await verificarLicenca();
            if (ok) {
                if (user) {
                    document.getElementById('tela-login').style.display = 'none';
                    initApp(user.uid);
                } else {
                    document.getElementById('tela-login').style.display = 'flex';
                }
            }
        });

        // --- INTERAÇÕES ---
        window.openTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };

        document.getElementById('btn-entrar').onclick = () => {
            const e = document.getElementById('email').value;
            const s = document.getElementById('senha').value;
            signInWithEmailAndPassword(auth, e, s).catch(() => alert("E-mail ou Senha inválidos!"));
        };

        function initApp(uid) {
            onSnapshot(query(collection(db, "vendas"), where("uid", "==", uid)), (snap) => {
                let t = 0;
                const list = document.getElementById('lista-vendas');
                list.innerHTML = '';
                snap.forEach(s => {
                    const d = s.data();
                    if(!d.pago) {
                        t += d.valor;
                        list.innerHTML += `<div class="card flex justify-between items-center border-l-4 border-indigo-600">
                            <div><b>${d.nome}</b><br><span class="text-[10px] text-gray-500">${d.data}</span></div>
                            <button onclick="window.marcar('${s.id}')" class="bg-indigo-600 px-4 py-2 rounded-xl text-[10px] font-bold">RECEBI</button>
                        </div>`;
                    }
                });
                document.getElementById('total-receber').innerText = `R$ ${t.toLocaleString('pt-BR')}`;
            });
        }

        window.marcar = async (id) => {
            if(confirm("Confirmar recebimento?")) await updateDoc(doc(db, "vendas", id), { pago: true });
        };

        document.getElementById('btn-save-v').onclick = async () => {
            const n = document.getElementById('v-nome').value;
            const v = parseFloat(document.getElementById('v-valor').value);
            const d = document.getElementById('v-data').value;
            if(!n || !v || !d) return alert("Preencha tudo!");
            
            await addDoc(collection(db, "vendas"), { uid: auth.currentUser.uid, nome: n, valor: v, data: d, pago: false });
            alert("Venda registrada!");
            openTab('dashboard');
        };
    </script>
</body>
</html>
