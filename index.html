<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZapCaderno Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: #ffffff; margin: 0; overflow-x: hidden; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        #telaLogin { position: fixed; inset: 0; background: #121212; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .nav-bar { position: fixed; bottom: 15px; left: 15px; right: 15px; height: 70px; background: #1a1a1a; border-radius: 25px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 100; }

        .btn-plus { background: #4f46e5; color: white; width: 60px; height: 60px; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin-top: -40px; box-shadow: 0 8px 20px rgba(79, 70, 229, 0.4); border: none; }
        
        .card { background: #1a1a1a; border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid #222; }
        
        input, textarea { background: #242424 !important; border: 1px solid #333 !important; border-radius: 12px !important; padding: 12px !important; width: 100%; margin-bottom: 12px; color: #fff !important; outline: none; font-size: 16px; }
        
        /* Ajuste crucial para o campo de data no Android/iOS */
        input[type="date"] { min-height: 45px; display: block; color-scheme: dark; }

        .nav-btn { color: #666; font-size: 24px; background: none; border: none; }
        .nav-btn.active { color: #a5a1f5; }
        
        button:disabled { opacity: 0.5; }
    </style>
</head>
<body class="pb-32">

    <div id="telaLogin">
        <h1 class="text-3xl font-bold mb-6 text-indigo-500">ZAPCADERNO</h1>
        <input type="email" id="logEmail" placeholder="E-mail">
        <input type="password" id="logSenha" placeholder="Senha">
        <button id="btnEntrar" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold border-none">ENTRAR</button>
    </div>

    <header class="p-6">
        <div class="flex justify-between items-center">
            <div>
                <h1 id="headerNome" class="text-xl font-bold uppercase tracking-widest text-indigo-400 text-sm">ZAPCADERNO</h1>
                <p id="headerPix" class="text-[10px] text-gray-500 font-mono">PIX: ---</p>
            </div>
            <button onclick="location.reload()" class="bg-transparent border-none text-gray-600"><i class="fas fa-redo-alt"></i></button>
        </div>
    </header>

    <main class="p-4">
        <div id="dashboard" class="tab-content active">
            <div class="card mb-4 border-l-4 border-indigo-500">
                <p class="text-[10px] text-gray-400 uppercase font-bold mb-1">Total a Receber</p>
                <p id="totalReceber" class="text-4xl font-bold text-white">R$ 0,00</p>
            </div>
            <div id="listaDividas"></div>
        </div>

        <div id="orcamentos" class="tab-content">
            <div class="card mb-8">
                <h2 class="font-bold mb-4 text-indigo-400 uppercase text-[10px]">Nova Proposta</h2>
                <input type="text" id="propNome" placeholder="Nome do Cliente">
                <input type="text" id="propWhatsapp" placeholder="WhatsApp">
                <textarea id="propDetalhes" placeholder="Descrição do Trabalho..." rows="3"></textarea>
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="propMat" placeholder="Materiais R$">
                    <input type="number" id="propMao" placeholder="Mão de Obra R$">
                </div>
                <button id="btnGerarOrcamento" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold uppercase text-xs border-none">Salvar Orçamento</button>
            </div>
            <div id="listaOrcamentos"></div>
        </div>

        <div id="novo" class="tab-content">
            <div class="card">
                <h2 class="font-bold mb-4 text-indigo-400 uppercase text-xs tracking-widest text-center">Registrar Venda</h2>
                <input type="text" id="vendaNome" placeholder="Nome do Cliente">
                <input type="text" id="vendaWhatsapp" placeholder="WhatsApp">
                <input type="text" id="vendaProduto" placeholder="Produto/Serviço">
                <input type="number" id="vendaValor" placeholder="Valor R$">
                
                <label class="text-[10px] text-gray-500 font-bold uppercase ml-1 block mb-1">Data que ele vai pagar:</label>
                <input type="date" id="vendaDataPagar">
                
                <button id="btnSalvarVendaRapida" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold uppercase text-xs border-none">Registrar Cobrança</button>
            </div>
        </div>

        <div id="config" class="tab-content">
            <div class="card">
                <input type="text" id="confNome" placeholder="Nome da Empresa">
                <input type="text" id="confPix" placeholder="Chave PIX">
                <button id="btnSalvarConfig" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold uppercase text-xs border-none">Salvar</button>
            </div>
        </div>
    </main>

    <nav class="nav-bar">
        <button id="tabDash" class="nav-btn active"><i class="fas fa-home"></i></button>
        <button id="tabOrc" class="nav-btn"><i class="fas fa-file-invoice-dollar"></i></button>
        <button id="tabNovo" class="btn-plus"><i class="fas fa-plus"></i></button>
        <button id="tabConf" class="nav-btn"><i class="fas fa-cog"></i></button>
        <button id="btnLogout" class="nav-btn"><i class="fas fa-sign-out-alt"></i></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, doc, updateDoc, setDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyASmjopW-EUIpZUsVFESFwMvpUZTMcdvMU",
            authDomain: "zapcaderno.firebaseapp.com",
            projectId: "zapcaderno",
            storageBucket: "zapcaderno.firebasestorage.app",
            messagingSenderId: "446641643061",
            appId: "1:446641643061:web:daf768922b53614f229b7c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let dadosEmpresa = { nome: "ZAPCADERNO", pix: "" };

        const openTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if(id === 'dashboard') document.getElementById('tabDash').classList.add('active');
            if(id === 'orcamentos') document.getElementById('tabOrc').classList.add('active');
            if(id === 'config') document.getElementById('tabConf').classList.add('active');
        };

        document.getElementById('tabDash').onclick = () => openTab('dashboard');
        document.getElementById('tabOrc').onclick = () => openTab('orcamentos');
        document.getElementById('tabNovo').onclick = () => openTab('novo');
        document.getElementById('tabConf').onclick = () => openTab('config');
        document.getElementById('btnLogout').onclick = () => signOut(auth);

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('telaLogin').style.display = 'none';
                const snap = await getDoc(doc(db, "configuracoes", user.uid));
                if (snap.exists()) {
                    dadosEmpresa = snap.data();
                    document.getElementById('headerNome').innerText = dadosEmpresa.nome;
                    document.getElementById('headerPix').innerText = "PIX: " + dadosEmpresa.pix;
                }
                initData(user.uid);
            } else {
                document.getElementById('telaLogin').style.display = 'flex';
            }
        });

        document.getElementById('btnEntrar').onclick = () => {
            signInWithEmailAndPassword(auth, document.getElementById('logEmail').value, document.getElementById('logSenha').value);
        };

        // SALVAR VENDA COM DATA (EVITA TRAVAMENTO)
        document.getElementById('btnSalvarVendaRapida').onclick = async () => {
            const btn = document.getElementById('btnSalvarVendaRapida');
            btn.disabled = true;
            try {
                await addDoc(collection(db, "vendas"), {
                    uid: auth.currentUser.uid,
                    nome: document.getElementById('vendaNome').value,
                    whatsapp: document.getElementById('vendaWhatsapp').value.replace(/\D/g, ''),
                    produto: document.getElementById('vendaProduto').value,
                    valor: parseFloat(document.getElementById('vendaValor').value) || 0,
                    dataPagar: document.getElementById('vendaDataPagar').value,
                    pago: false,
                    dataCriacao: new Date()
                });
                alert("Salvo!");
                openTab('dashboard');
            } catch (e) { alert("Erro ao salvar!"); }
            btn.disabled = false;
        };

        document.getElementById('btnGerarOrcamento').onclick = async () => {
            const mat = parseFloat(document.getElementById('propMat').value) || 0;
            const mao = parseFloat(document.getElementById('propMao').value) || 0;
            await addDoc(collection(db, "orcamentos"), {
                uid: auth.currentUser.uid,
                nome: document.getElementById('propNome').value,
                whatsapp: document.getElementById('propWhatsapp').value.replace(/\D/g, ''),
                detalhes: document.getElementById('propDetalhes').value,
                valor: mat + mao,
                data: new Date().toLocaleDateString('pt-BR')
            });
            alert("Orçamento Gravado!");
            openTab('orcamentos');
        };

        function initData(uid) {
            onSnapshot(query(collection(db, "vendas"), where("uid", "==", uid)), (snap) => {
                let total = 0;
                const div = document.getElementById('listaDividas');
                div.innerHTML = '';
                snap.forEach(s => {
                    const d = s.data();
                    if(!d.pago) {
                        total += d.valor;
                        div.innerHTML += `
                            <div class="card flex justify-between items-center">
                                <div><b>${d.nome}</b><p class="text-[9px] text-red-400">Pagar em: ${d.dataPagar || '--'}</p></div>
                                <div class="flex gap-2">
                                    <button onclick="window.cobrar('${d.whatsapp}', '${d.valor}')" class="bg-green-600 p-3 rounded-xl border-none text-white"><i class="fab fa-whatsapp"></i></button>
                                    <button onclick="window.receber('${s.id}')" class="bg-indigo-600 text-white px-3 py-2 rounded-xl text-[10px] font-bold border-none uppercase">PAGO</button>
                                </div>
                            </div>`;
                    }
                });
                document.getElementById('totalReceber').innerText = `R$ ${total.toFixed(2)}`;
            });

            onSnapshot(query(collection(db, "orcamentos"), where("uid", "==", uid)), (snap) => {
                const div = document.getElementById('listaOrcamentos');
                div.innerHTML = '';
                snap.forEach(s => {
                    const o = s.data();
                    div.innerHTML += `
                        <div class="card">
                            <div class="flex justify-between items-center mb-3">
                                <b>${o.nome}</b>
                                <b class="text-indigo-400">R$ ${o.valor.toFixed(2)}</b>
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <button onclick="window.enviarWhatsApp('${o.whatsapp}', '${o.valor}', '${o.detalhes}')" class="bg-green-600 text-white py-3 rounded-xl font-bold uppercase text-[9px] border-none">WhatsApp</button>
                                <button onclick="window.virarVenda('${s.id}')" class="bg-indigo-600 text-white py-3 rounded-xl font-bold uppercase text-[9px] border-none">Fechado</button>
                            </div>
                        </div>`;
                });
            });
        }

        window.enviarWhatsApp = (num, val, det) => {
            const msg = `*${dadosEmpresa.nome.toUpperCase()}*%0A*Serviço:* ${det}%0A*Valor:* R$ ${val}%0A*PIX:* ${dadosEmpresa.pix}`;
            window.open(`https://wa.me/55${num}?text=${msg}`);
        };

        window.virarVenda = async (id) => {
            const snap = await getDoc(doc(db, "orcamentos", id));
            if (snap.exists()) {
                await addDoc(collection(db, "vendas"), { ...snap.data(), pago: false, dataCriacao: new Date() });
                await deleteDoc(doc(db, "orcamentos", id));
                openTab('dashboard');
            }
        };

        window.cobrar = (num, val) => window.open(`https://wa.me/55${num}?text=Olá! Segue lembrete de R$ ${val}.`);
        window.receber = async (id) => { if(confirm("Confirmar?")) await updateDoc(doc(db, "vendas", id), { pago: true }); };
        document.getElementById('btnSalvarConfig').onclick = async () => {
            await setDoc(doc(db, "configuracoes", auth.currentUser.uid), { nome: document.getElementById('confNome').value, pix: document.getElementById('confPix').value });
            alert("Salvo!");
        };
    </script>
</body>
</html>
