<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZapCaderno Ultra Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8fafc; color: #1e293b; -webkit-tap-highlight-color: transparent; }
        .dark-mode { background-color: #0f172a; color: #f1f5f9; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        #telaLogin { position: fixed; inset: 0; background: white; z-index: 99999; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
        .nav-bar { position: fixed; bottom: 20px; left: 15px; right: 15px; height: 75px; background: white; border-radius: 25px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 100; }
        .btn-plus { background: #4f46e5; color: white; width: 55px; height: 55px; border-radius: 18px; display: flex; align-items: center; justify-content: center; margin-top: -45px; box-shadow: 0 8px 20px rgba(79, 70, 229, 0.4); border: none; }
        
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; border: 1px solid #edf2f7; }
        .dark-mode .card { background: #1e293b; border-color: #334155; }
        
        .btn-cobrar { background-color: #22c55e; color: white; font-weight: bold; padding: 12px; border-radius: 12px; text-align: center; display: flex; align-items: center; justify-content: center; gap: 8px; border: none; }
        .btn-recebi { background-color: #4f46e5; color: white; font-weight: bold; padding: 12px; border-radius: 12px; text-align: center; border: none; text-transform: uppercase; }
        
        .progress-bar { height: 12px; border-radius: 6px; background: #e2e8f0; overflow: hidden; margin: 10px 0; }
        .progress-fill { height: 100%; background: #4f46e5; width: 0%; transition: 1s ease-in-out; }
        
        input { border: 1.5px solid #e2e8f0 !important; border-radius: 12px !important; padding: 12px !important; outline: none; width: 100%; margin-bottom: 10px; color: #1e293b; }
        .dark-mode input { background: #0f172a; border-color: #334155 !important; color: white; }
    </style>
</head>
<body class="pb-32">

    <div id="telaLogin">
        <i class="fas fa-wallet text-5xl text-indigo-600 mb-6"></i>
        <h1 class="text-2xl font-bold mb-6">ZapCaderno Pro</h1>
        <input type="email" id="logEmail" placeholder="E-mail">
        <input type="password" id="logSenha" placeholder="Senha">
        <button onclick="fazerLogin()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl">ENTRAR</button>
    </div>

    <header class="bg-indigo-600 text-white p-6 pb-12 rounded-b-[40px] shadow-lg">
        <div class="flex justify-between items-start">
            <div>
                <h1 id="headerNomeEmpresa" class="text-xl font-bold uppercase tracking-widest">NOME DA SUA EMPRESA</h1>
                <p id="headerPix" class="text-xs opacity-90 mt-1"><i class="fas fa-key text-[10px]"></i> PIX: 000.000.000-00</p>
                <span class="text-[10px] bg-green-500 px-2 py-0.5 rounded-full font-bold inline-block mt-2">SISTEMA ATIVO</span>
            </div>
            <button onclick="document.body.classList.toggle('dark-mode')" class="text-white opacity-80 text-xl"><i class="fas fa-moon"></i></button>
        </div>
    </header>

    <main class="p-4 -mt-8">
        <section id="dashboard" class="tab-content active">
            <div class="card mb-6">
                <p class="text-[10px] font-bold text-indigo-500 uppercase">Total a Receber</p>
                <p id="totalReceber" class="text-3xl font-black">R$ 0,00</p>
                <div class="progress-bar"><div id="progressoVendas" class="progress-fill"></div></div>
                <p id="txtProgresso" class="text-[9px] text-gray-400 font-bold uppercase text-center">Calculando...</p>
            </div>
            <div id="listaDividas" class="space-y-4"></div>
        </section>

        <section id="orcamentos" class="tab-content">
            <h2 class="text-xl font-bold mb-4 text-indigo-600">Orçamentos Pendentes</h2>
            <div id="listaOrcamentos"></div>
        </section>

        <section id="config" class="tab-content">
            <div class="card">
                <h2 class="text-lg font-bold mb-6 text-indigo-600">Dados da Minha Empresa</h2>
                <label class="text-xs font-bold text-gray-400 ml-1">Nome da Loja/Empresa:</label>
                <input type="text" id="confNome" placeholder="Ex: Loja da Carla">
                
                <label class="text-xs font-bold text-gray-400 ml-1">Sua Chave PIX:</label>
                <input type="text" id="confPix" placeholder="CPF, Celular ou E-mail">
                
                <button onclick="salvarConfig()" class="w-full bg-green-500 text-white font-bold py-4 rounded-xl mt-4 border-none shadow-lg uppercase">Salvar Configurações</button>
            </div>
        </section>

        <section id="novo" class="tab-content">
            <div class="card">
                <h2 class="text-lg font-bold mb-6 text-indigo-600">O que vamos anotar hoje?</h2>
                <input type="text" id="nome" placeholder="Nome do Cliente">
                <input type="tel" id="whatsapp" placeholder="WhatsApp (DDD + Número)">
                <input type="text" id="produto" placeholder="O que ele comprou/orçou?">
                <input type="text" id="valor" placeholder="Valor (Ex: 10,00)" class="font-bold text-indigo-600">
                
                <div class="grid grid-cols-2 gap-3 mt-4">
                    <button onclick="salvarAcao('venda')" class="bg-indigo-600 text-white font-bold py-4 rounded-xl shadow-md border-none uppercase text-xs">Salvar Venda</button>
                    <button onclick="salvarAcao('orcamento')" class="bg-gray-200 text-gray-700 font-bold py-4 rounded-xl border-none uppercase text-xs">Orçamento</button>
                </div>
            </div>
        </section>
    </main>

    <nav class="nav-bar">
        <button onclick="showTab('dashboard')" class="text-indigo-600 bg-transparent border-none"><i class="fas fa-home text-2xl"></i></button>
        <button onclick="showTab('orcamentos')" class="text-gray-400 bg-transparent border-none"><i class="fas fa-file-invoice-dollar text-2xl"></i></button>
        <button onclick="showTab('novo')" class="btn-plus"><i class="fas fa-plus text-2xl"></i></button>
        <button onclick="showTab('config')" class="text-gray-400 bg-transparent border-none"><i class="fas fa-cog text-2xl"></i></button>
        <button onclick="logout()" class="text-gray-400 bg-transparent border-none"><i class="fas fa-sign-out-alt text-2xl"></i></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.
