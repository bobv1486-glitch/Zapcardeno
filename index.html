<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZapCaderno Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: white; margin: 0; padding-bottom: 110px; overflow-x: hidden; }
        .tab-content { display: none; padding: 20px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: var(--card); border-radius: 20px; padding: 18px; border: 1px solid #334155; margin-bottom: 12px; }
        .nav-bar { position: fixed; bottom: 15px; left: 15px; right: 15px; height: 75px; background: #1e293b; border-radius: 25px; display: flex; justify-content: space-around; align-items: center; border: 1px solid #334155; z-index: 1000; }
        .btn-plus { background: var(--primary); color: white; width: 55px; height: 55px; border-radius: 18px; display: flex; align-items: center; justify-content: center; margin-top: -45px; border: none; }
        input, textarea { background: #0f172a; border: 1px solid #334155; width: 100%; padding: 14px; border-radius: 14px; margin-bottom: 10px; color: white; font-size: 16px; }
        #overlay { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 class="text-3xl font-black mb-6 italic text-indigo-400">ZAPCADERNO</h1>
        <input type="email" id="l-email" placeholder="E-mail">
        <input type="password" id="l-senha" placeholder="Senha">
        <button id="btnEntrar" class="w-full bg-indigo-600 py-4 rounded-xl font-bold mb-3">ENTRAR</button>
        <button id="btnCadastrar" class="text-indigo-400 text-sm font-bold bg-transparent border-none">CRIAR NOVA CONTA</button>
    </div>

    <header class="bg-indigo-600 p-6 pb-16 rounded-b-[40px] flex justify-between items-center">
        <div>
            <h1 id="header-loja" class="text-xl font-bold uppercase">MEU CADERNO</h1>
            <p class="text-[10px] opacity-60 uppercase font-bold tracking-widest"><i class="fas fa-circle text-green-400"></i> Online</p>
        </div>
        <button onclick="abrir('config')" class="bg-white bg-opacity-10 w-10 h-10 rounded-full border-none text-white"><i class="fas fa-cog"></i></button>
    </header>

    <main class="-mt-10">
        <section id="dashboard" class="tab-content active">
            <div class="card bg-gradient-to-br from-indigo-900 to-black border-none p-6 mb-6">
                <span class="text-[10px] font-bold opacity-50 uppercase">Total Fiado</span>
                <h2 id="total-txt" class="text-4xl font-black">R$ 0,00</h2>
            </div>
            <div id="lista-vendas" class="space-y-3"></div>
        </section>

        <section id="historico" class="tab-content">
            <h2 class="text-lg font-bold mb-4">Pagamentos Recebidos</h2>
            <div id="lista-pagos" class="space-y-3 opacity-60"></div>
        </section>

        <section id="novo" class="tab-content">
            <div class="card">
                <h2 class="text-lg font-bold mb-6 text-center text-indigo-400 uppercase">Novo Registro</h2>
                <input type="text" id="v-nome" placeholder="Nome do Cliente">
                <input type="tel" id="v-whats" placeholder="WhatsApp">
                <input type="text" id="v-item" placeholder="O que vendeu?">
                <input type="number" id="v-valor" placeholder="Valor R$">
                <button id="btnSalvar" class="w-full bg-indigo-600 py-4 rounded-xl font-bold mt-2">SALVAR AGORA</button>
            </div>
        </section>

        <section id="orcamentos" class="tab-content">
            <div class="card">
                <h2 class="text-lg font-bold mb-4 uppercase">Orçamentos</h2>
                <input type="text" id="o-nome" placeholder="Cliente">
                <input type="tel" id="o-whats" placeholder="WhatsApp">
                <textarea id="o-desc" rows="3" placeholder="Descrição do serviço..."></textarea>
                <input type="number" id="o-total" placeholder="Total R$">
                <button id="btnSalvarOrc" class="w-full bg-indigo-60
