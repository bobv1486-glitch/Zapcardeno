<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZapCaderno</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: #ffffff; margin: 0; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        #telaLogin { position: fixed; inset: 0; background: #121212; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .nav-bar { position: fixed; bottom: 15px; left: 15px; right: 15px; height: 70px; background: #1a1a1a; border-radius: 25px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 100; }

        .btn-plus { background: #5851db; color: white; width: 60px; height: 60px; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin-top: -40px; box-shadow: 0 8px 20px rgba(88, 81, 219, 0.4); border: none; }
        
        .card { background: #1a1a1a; border-radius: 20px; padding: 20px; margin-bottom: 15px; }
        
        input, textarea { background: #242424 !important; border: 1px solid #333 !important; border-radius: 12px !important; padding: 15px !important; width: 100%; margin-bottom: 12px; color: #fff !important; }
        
        .nav-btn { color: #666; font-size: 24px; background: none; border: none; }
        .nav-btn.active { color: #a5a1f5; }

        /* MODAL DE ORÇAMENTO PROFISSIONAL (Aba Orçamentos) */
        #modalOrc { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; display: none; overflow-y: auto; padding: 15px; }
        .folha-papel { background: white; width: 100%; border-radius: 8px; padding: 30px; color: #1a1a1a; }
    </style>
</head>
<body class="pb-32">

    <div id="modalOrc">
        <div class="folha-papel">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-serif italic text-gray-800">Proposta de <br><b>Orçamento</b></h2>
                <div class="text-right">
                    <p id="vData" class="text-[10px] text-gray-400">00/00/0000</p>
                    <p id="vEmpresa" class="text-xs font-bold text-indigo-600">MINHA LOJA</p>
                </div>
            </div>
            <div class="border-t-4 border-indigo-600 pt-4 mb-6">
                <p class="text-[10px] font-bold text-gray-400 uppercase">Cliente:</p>
                <h3 id="vCliente" class="text-lg font-bold">---</h3>
            </div>
            <div class="mb-8">
                <h4 class="text-xs font-bold text-indigo-600 mb-2 uppercase">Escopo do Trabalho</h4>
                <p id="vDetalhes" class="text-sm text-gray-600 leading-relaxed italic">---</p>
            </div>
            <div class="bg-indigo-50 p-4 rounded-lg mb-8">
                <div class="flex justify-between font-bold text-indigo-900 text-lg">
                    <span>TOTAL ESTIMADO:</span><span id="vTotal">R$ 0,00</span>
                </div>
            </div>
            <button id="btnZapPro" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold mb-4 uppercase shadow-lg">Enviar WhatsApp</button>
            <button onclick="document.getElementById('modalOrc').style.display='none'" class="w-full text-gray-400 font-bold text-xs uppercase">Voltar</button>
        </div>
    </div>

    <div id="telaLogin">
        <h1 class="text-3xl font-bold mb-6 text-indigo-500">ZapCaderno</h1>
        <input type="email" id="logEmail" placeholder="E-mail">
        <input type="password" id="logSenha" placeholder="Senha">
        <button id="btnEntrar" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold border-none">ENTRAR</button>
    </div>

    <header class="p-6">
        <h1 id="headerNome" class="text-xl font-bold uppercase tracking-tight">MINHA LOJA</h1>
        <p id="headerPix" class="text-[10px] text-gray-500 font-mono">PIX: Carregando...</p>
    </header>

    <main class="p-4">
        <div id="dashboard" class="tab-content active">
            <div class="card mb-4">
                <p class="text-xs text-gray-400 uppercase font-bold mb-1">Total a Receber</p>
                <p id="totalReceber" class="text-4xl font-bold">R$ 0,00</p>
            </div>
            <div id="listaDividas"></div>
        </div>

        <div id="orcamentos" class="tab-content">
            <h2 class="text-gray-400 text-xs font-bold uppercase mb-4 ml-2">Meus Orçamentos</h2>
            <div id="listaOrcamentos"></div>
        </div>

        <div id="novo" class="tab-content">
            <div class="card shadow-2xl">
                <h2 class="font-bold mb-4 text-indigo-400 uppercase text-xs">Novo Registro</h2>
                <input type="text" id="nome" placeholder="Nome do Cliente">
                <input type="text" id="whatsapp" placeholder="WhatsApp">
                <input type="text" id="produto" placeholder="Produto ou Serviço">
                <input type="text" id="valor" placeholder="Valor Total R$">
                
                <div class="grid grid-cols-2 gap-3 mt-2">
                    <button id="btnVenda" class="bg-indigo-600 text-white py-4 rounded-xl font-bold text-xs uppercase">Venda Rápida</button>
                    <button id="btnOrc" class="bg-gray-700 text-white py-4 rounded-xl font-bold text-xs uppercase">Orçamento</button>
                </div>
            </div>
        </div>

        <div id="config" class="tab-content">
            <div class="card">
                <input type="text" id="confNome" placeholder="Nome da Empresa">
                <input type="text" id="confPix" placeholder="Chave PIX">
                <button id="btnSalvarConfig" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold uppercase text-xs">Salvar</button>
            </div>
        </div>
    </main>
