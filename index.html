<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>ZapCaderno - Completo</title>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, orderBy, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        
        // CONFIGURAÇÃO DO FIREBASE - ZAPCADERNO01
        const firebaseConfig = {
            apiKey: "AIzaSyB4qzJ4rft8V_jDIMuXsPp2CguNo7RAH_0",
            authDomain: "zapcaderno01.firebaseapp.com",
            projectId: "zapcaderno01",
            storageBucket: "zapcaderno01.firebasestorage.app",
            messagingSenderId: "853039336870",
            appId: "1:853039336870:web:d710e8f8f006cd40d3d367"
        };
        
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        let usuarioAtual = null;
        let abaAtual = 'vendas';
        
        // Elementos das telas
        const telaLogin = document.getElementById('telaLogin');
        const telaCadastro = document.getElementById('telaCadastro');
        const telaApp = document.getElementById('telaApp');
        
        // Login
        const loginEmail = document.getElementById('loginEmail');
        const loginSenha = document.getElementById('loginSenha');
        const btnLogin = document.getElementById('btnLogin');
        const erroLogin = document.getElementById('erroLogin');
        const linkCadastro = document.getElementById('linkCadastro');
        
        // Cadastro
        const cadastroEmail = document.getElementById('cadastroEmail');
        const cadastroSenha = document.getElementById('cadastroSenha');
        const cadastroConfirmar = document.getElementById('cadastroConfirmar');
        const btnCadastrar = document.getElementById('btnCadastrar');
        const erroCadastro = document.getElementById('erroCadastro');
        const linkLogin = document.getElementById('linkLogin');
        
        // App
        const btnLogout = document.getElementById('btnLogout');
        const totalDebito = document.getElementById('totalDebito');
        const nomeUsuario = document.getElementById('nomeUsuario');
        const conteudoPrincipal = document.getElementById('conteudoPrincipal');
        
        // Abas
        const tabVendas = document.getElementById('tabVendas');
        const tabHistorico = document.getElementById('tabHistorico');
        const tabOrcamentos = document.getElementById('tabOrcamentos');
        const tabPerfil = document.getElementById('tabPerfil');
        
        function mostrarTela(tela) {
            telaLogin.classList.add('hidden');
            telaCadastro.classList.add('hidden');
            telaApp.classList.add('hidden');
            if (tela === 'login') telaLogin.classList.remove('hidden');
            if (tela === 'cadastro') telaCadastro.classList.remove('hidden');
            if (tela === 'app') telaApp.classList.remove('hidden');
        }
        
        function ativarAba(aba) {
            abaAtual = aba;
            document.querySelectorAll('.tab-item').forEach(tab => tab.classList.remove('active'));
            if (aba === 'vendas') tabVendas.classList.add('active');
            if (aba === 'historico') tabHistorico.classList.add('active');
            if (aba === 'orcamentos') tabOrcamentos.classList.add('active');
            if (aba === 'perfil') tabPerfil.classList.add('active');
            carregarConteudoAba();
        }
        
        async function carregarConteudoAba() {
            if (!usuarioAtual) return;
            
            if (abaAtual === 'vendas') {
                await carregarVendas();
            } else if (abaAtual === 'historico') {
                await carregarHistorico();
            } else if (abaAtual === 'orcamentos') {
                await carregarOrcamentos();
            } else if (abaAtual === 'perfil') {
                await carregarPerfil();
            }
        }
        
        async function carregarVendas() {
            try {
                conteudoPrincipal.innerHTML = '<div class="loading">📱 Carregando vendas...</div>';
                
                const vendasRef = collection(db, 'vendas');
                const q = query(vendasRef, where('userId', '==', usuarioAtual.uid), orderBy('data', 'desc'));
                const querySnapshot = await getDocs(q);
                
                let total = 0;
                if (querySnapshot.empty) {
                    conteudoPrincipal.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">📭</div>
                            <div class="empty-text">Nenhuma venda cadastrada</div>
                            <button class="btn-empty" id="btnPrimeiraVenda">+ Adicionar primeira venda</button>
                        </div>
                    `;
                    totalDebito.textContent = 'R$ 0,00';
                    document.getElementById('btnPrimeiraVenda')?.addEventListener('click', adicionarVenda);
                    return;
                }
                
                let vendasHtml = '<div class="vendas-lista">';
                querySnapshot.forEach((doc) => {
                    const venda = doc.data();
                    total += venda.valor || 0;
                    const dataVenda = venda.data ? new Date(venda.data.seconds * 1000).toLocaleDateString('pt-BR') : 'Sem data';
                    vendasHtml += `
                        <div class="venda-card">
                            <div class="venda-card-left">
                                <div class="venda-cliente">👤 ${escapeHtml(venda.cliente || 'Cliente')}</div>
                                <div class="venda-data">📅 ${dataVenda}</div>
                            </div>
                            <div class="venda-card-right">
                                <div class="venda-valor">💰 R$ ${(venda.valor || 0).toFixed(2)}</div>
                                <button class="btn-deletar" data-id="${doc.id}">🗑️</button>
                            </div>
                        </div>
                    `;
                });
                vendasHtml += '</div>';
                vendasHtml += `<button class="btn-flutuante" id="btnNovaVenda">+ Nova Venda</button>`;
                
                conteudoPrincipal.innerHTML = vendasHtml;
                totalDebito.textContent = `R$ ${total.toFixed(2)}`;
                
                document.querySelectorAll('.btn-deletar').forEach(btn => {
                    btn.onclick = () => deletarVenda(btn.dataset.id);
                });
                document.getElementById('btnNovaVenda')?.addEventListener('click', adicionarVenda);
                
            } catch (error) {
                console.error('Erro:', error);
                conteudoPrincipal.innerHTML = '<div class="error">❌ Erro ao carregar vendas. Verifique sua internet.</div>';
            }
        }
        
        async function carregarHistorico() {
            try {
                conteudoPrincipal.innerHTML = '<div class="loading">📜 Carregando histórico...</div>';
                
                const historicoRef = collection(db, 'historico');
                const q = query(historicoRef, where('userId', '==', usuarioAtual.uid), orderBy('data', 'desc'));
                const querySnapshot = await getDocs(q);
                
                if (querySnapshot.empty) {
                    conteudoPrincipal.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">📜</div>
                            <div class="empty-text">Nenhum registro no histórico</div>
                            <div class="empty-sub">Suas atividades aparecerão aqui</div>
                        </div>
                    `;
                    return;
                }
                
                let historicoHtml = '<div class="historico-lista">';
                querySnapshot.forEach((doc) => {
                    const item = doc.data();
                    const dataItem = item.data ? new Date(item.data.seconds * 1000).toLocaleDateString('pt-BR') : 'Sem data';
                    historicoHtml += `
                        <div class="historico-item">
                            <div class="historico-icon">${item.tipo === 'venda' ? '💰' : '📝'}</div>
                            <div class="historico-info">
                                <div class="historico-desc">${escapeHtml(item.descricao || 'Atividade')}</div>
                                <div class="historico-data">${dataItem}</div>
                            </div>
                        </div>
                    `;
                });
                historicoHtml += '</div>';
                conteudoPrincipal.innerHTML = historicoHtml;
                
            } catch (error) {
                conteudoPrincipal.innerHTML = '<div class="error">❌ Erro ao carregar histórico</div>';
            }
        }
        
        async function carregarOrcamentos() {
            try {
                conteudoPrincipal.innerHTML = '<div class="loading">📊 Carregando orçamentos...</div>';
                
                const orcamentosRef = collection(db, 'orcamentos');
                const q = query(orcamentosRef, where('userId', '==', usuarioAtual.uid), orderBy('data', 'desc'));
                const querySnapshot = await getDocs(q);
                
                if (querySnapshot.empty) {
                    conteudoPrincipal.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">📊</div>
                            <div class="empty-text">Nenhum orçamento criado</div>
                            <button class="btn-empty" id="btnNovoOrcamento">+ Criar orçamento</button>
                        </div>
                    `;
                    document.getElementById('btnNovoOrcamento')?.addEventListener('click', criarOrcamento);
                    return;
                }
                
                let orcamentosHtml = '<div class="orcamentos-lista">';
                querySnapshot.forEach((doc) => {
                    const orc = doc.data();
                    const dataOrc = orc.data ? new Date(orc.data.seconds * 1000).toLocaleDateString('pt-BR') : 'Sem data';
                    orcamentosHtml += `
                        <div class="orcamento-card">
                            <div class="orcamento-cliente">👤 ${escapeHtml(orc.cliente || 'Cliente')}</div>
                            <div class="orcamento-detalhes">
                                <span>💰 R$ ${(orc.valor || 0).toFixed(2)}</span>
                                <span class="orcamento-status ${orc.status || 'pendente'}">${orc.status || 'Pendente'}</span>
                            </div>
                            <div class="orcamento-data">📅 ${dataOrc}</div>
                            <div class="orcamento-actions">
                                <button class="btn-aprovar" data-id="${doc.id}">✅ Aprovar</button>
                                <button class="btn-recusar" data-id="${doc.id}">❌ Recusar</button>
                                <button class="btn-deletar-orc" data-id="${doc.id}">🗑️</button>
                            </div>
                        </div>
                    `;
                });
                orcamentosHtml += '</div>';
                orcamentosHtml += `<button class="btn-flutuante" id="btnNovoOrcamento">+ Novo Orçamento</button>`;
                
                conteudoPrincipal.innerHTML = orcamentosHtml;
                
                document.querySelectorAll('.btn-aprovar').forEach(btn => {
                    btn.onclick = () => aprovarOrcamento(btn.dataset.id);
                });
                document.querySelectorAll('.btn-recusar').forEach(btn => {
                    btn.onclick = () => recusarOrcamento(btn.dataset.id);
                });
                document.querySelectorAll('.btn-deletar-orc').forEach(btn => {
                    btn.onclick = () => deletarOrcamento(btn.dataset.id);
                });
                document.getElementById('btnNovoOrcamento')?.addEventListener('click', criarOrcamento);
                
            } catch (error) {
                conteudoPrincipal.innerHTML = '<div class="error">❌ Erro ao carregar orçamentos</div>';
            }
        }
        
        async function carregarPerfil() {
            const user = auth.currentUser;
            conteudoPrincipal.innerHTML = `
                <div class="perfil-container">
                    <div class="perfil-avatar">👤</div>
                    <div class="perfil-info">
                        <div class="perfil-email">📧 ${user?.email || 'Email não cadastrado'}</div>
                        <div class="perfil-id">🆔 ID: ${user?.uid?.substring(0, 15)}...</div>
                        <div class="perfil-criado">📅 Criado em: ${new Date(user?.metadata?.creationTime).toLocaleDateString('pt-BR')}</div>
                    </div>
                    <div class="perfil-stats">
                        <div class="stat-card">
                            <div class="stat-valor" id="totalVendas">-</div>
                            <div class="stat-label">Total em Vendas</div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-valor" id="totalOrcamentos">-</div>
                            <div class="stat-label">Orçamentos</div>
                        </div>
                    </div>
                    <button class="btn-atualizar" id="btnAtualizarDados">🔄 Atualizar Dados</button>
                </div>
            `;
            
            document.getElementById('btnAtualizarDados')?.addEventListener('click', () => {
                carregarVendas();
                carregarOrcamentos();
                alert('Dados atualizados!');
            });
            
            await carregarStatsPerfil();
        }
        
        async function carregarStatsPerfil() {
            try {
                const vendasSnapshot = await getDocs(query(collection(db, 'vendas'), where('userId', '==', usuarioAtual.uid)));
                let totalVendas = 0;
                vendasSnapshot.forEach(doc => totalVendas += doc.data().valor || 0);
                
                const orcSnapshot = await getDocs(query(collection(db, 'orcamentos'), where('userId', '==', usuarioAtual.uid)));
                
                document.getElementById('totalVendas').textContent = `R$ ${totalVendas.toFixed(2)}`;
                document.getElementById('totalOrcamentos').textContent = orcSnapshot.size;
            } catch (error) {
                console.error('Erro stats:', error);
            }
        }
        
        async function adicionarVenda() {
            const cliente = prompt('👤 Nome do cliente:');
            if (!cliente) return;
            
            let valor = prompt('💰 Valor da venda (ex: 150.00):');
            if (!valor) return;
            
            valor = parseFloat(valor.replace(',', '.'));
            if (isNaN(valor)) {
                alert('❌ Valor inválido');
                return;
            }
            
            try {
                await addDoc(collection(db, 'vendas'), {
                    cliente: cliente,
                    valor: valor,
                    data: new Date(),
                    userId: usuarioAtual.uid
                });
                
                await addDoc(collection(db, 'historico'), {
                    tipo: 'venda',
                    descricao: `Venda criada para ${cliente} no valor de R$ ${valor.toFixed(2)}`,
                    data: new Date(),
                    userId: usuarioAtual.uid
                });
                
                carregarVendas();
                alert('✅ Venda adicionada com sucesso!');
            } catch (error) {
                alert('❌ Erro ao adicionar venda');
            }
        }
        
        async function deletarVenda(id) {
            if (confirm('🗑️ Excluir esta venda permanentemente?')) {
                try {
                    await deleteDoc(doc(db, 'vendas', id));
                    carregarVendas();
                    alert('✅ Venda excluída!');
                } catch (error) {
                    alert('Erro ao excluir');
                }
            }
        }
        
        async function criarOrcamento() {
            const cliente = prompt('👤 Nome do cliente:');
            if (!cliente) return;
            
            let valor = prompt('💰 Valor do orçamento:');
            if (!valor) return;
            valor = parseFloat(valor.replace(',', '.'));
            if (isNaN(valor)) return;
            
            try {
                await addDoc(collection(db, 'orcamentos'), {
                    cliente: cliente,
                    valor: valor,
                    status: 'pendente',
                    data: new Date(),
                    userId: usuarioAtual.uid
                });
                
                carregarOrcamentos();
                alert('✅ Orçamento criado!');
            } catch (error) {
                alert('Erro ao criar orçamento');
            }
        }
        
        async function aprovarOrcamento(id) {
            if (confirm('Aprovar este orçamento e converter em venda?')) {
                try {
                    const orcDoc = await getDocs(query(collection(db, 'orcamentos'), where('userId', '==', usuarioAtual.uid)));
                    let orcamento = null;
                    orcDoc.forEach(doc => {
                        if (doc.id === id) orcamento = { id: doc.id, ...doc.data() };
                    });
                    
                    if (orcamento) {
                        await addDoc(collection(db, 'vendas'), {
                            cliente: orcamento.cliente,
                            valor: orcamento.valor,
                            data: new Date(),
                            userId: usuarioAtual.uid
                        });
                        await deleteDoc(doc(db, 'orcamentos', id));
                        carregarOrcamentos();
                        alert('✅ Orçamento convertido em venda!');
                    }
                } catch (error) {
                    alert('Erro ao aprovar');
                }
            }
        }
        
        async function recusarOrcamento(id) {
            if (confirm('Recusar este orçamento?')) {
                await deleteDoc(doc(db, 'orcamentos', id));
                carregarOrcamentos();
                alert('Orçamento recusado');
            }
        }
        
        async function deletarOrcamento(id) {
            if (confirm('Excluir orçamento?')) {
                await deleteDoc(doc(db, 'orcamentos', id));
                carregarOrcamentos();
            }
        }
        
        async function cadastrarUsuario(email, senha, confirmar) {
            if (senha !== confirmar) {
                erroCadastro.textContent = '❌ As senhas não coincidem';
                return false;
            }
            if (senha.length < 6) {
                erroCadastro.textContent = '❌ A senha deve ter pelo menos 6 caracteres';
                return false;
            }
            erroCadastro.textContent = '';
            btnCadastrar.disabled = true;
            btnCadastrar.textContent = 'Cadastrando...';
            
            try {
                await createUserWithEmailAndPassword(auth, email, senha);
                return true;
            } catch (error) {
                if (error.code === 'auth/email-already-in-use') {
                    erroCadastro.textContent = '❌ Este email já está cadastrado';
                } else if (error.code === 'auth/invalid-email') {
                    erroCadastro.textContent = '❌ Email inválido';
                } else if (error.code === 'auth/operation-not-allowed') {
                    erroCadastro.textContent = '❌ Cadastro desativado. Ative Email/Senha no Firebase.';
                } else {
                    erroCadastro.textContent = '❌ Erro: ' + error.message;
                }
                btnCadastrar.disabled = false;
                btnCadastrar.textContent = 'Cadastrar';
                return false;
            }
        }
        
        async function fazerLogin(email, senha) {
            erroLogin.textContent = '';
            btnLogin.disabled = true;
            btnLogin.textContent = 'Entrando...';
            
            try {
                await signInWithEmailAndPassword(auth, email, senha);
                return true;
            } catch (error) {
                if (error.code === 'auth/user-not-found') {
                    erroLogin.textContent = '❌ Usuário não encontrado. Cadastre-se primeiro.';
                } else if (error.code === 'auth/wrong-password') {
                    erroLogin.textContent = '❌ Senha incorreta';
                } else {
                    erroLogin.textContent = '❌ Erro: ' + error.message;
                }
                btnLogin.disabled = false;
                btnLogin.textContent = 'Entrar';
                return false;
            }
        }
        
        async function fazerLogout() {
            await signOut(auth);
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Eventos
        btnLogin.onclick = () => fazerLogin(loginEmail.value.trim(), loginSenha.value);
        btnCadastrar.onclick = () => cadastrarUsuario(cadastroEmail.value.trim(), cadastroSenha.value, cadastroConfirmar.value);
        btnLogout.onclick = fazerLogout;
        linkCadastro.onclick = (e) => { e.preventDefault(); mostrarTela('cadastro'); };
        linkLogin.onclick = (e) { e.preventDefault(); mostrarTela('login'); };
        
        tabVendas.onclick = () => ativarAba('vendas');
        tabHistorico.onclick = () => ativarAba('historico');
        tabOrcamentos.onclick = () => ativarAba('orcamentos');
        tabPerfil.onclick = () => ativarAba('perfil');
        
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !telaLogin.classList.contains('hidden')) {
                btnLogin.click();
            }
        });
        
        onAuthStateChanged(auth, (user) => {
            usuarioAtual = user;
            if (user) {
                mostrarTela('app');
                nomeUsuario.textContent = user.email?.split('@')[0] || 'Usuário';
                ativarAba('vendas');
            } else {
                mostrarTela('login');
                loginEmail.value = '';
                loginSenha.value = '';
                btnLogin.disabled = false;
                btnLogin.textContent = 'Entrar';
            }
        });
    </script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container { max-width: 500px; margin: 0 auto; }
        
        .tela {
            background: white;
            border-radius: 24px;
            padding: 24px;
            min-height: 85vh;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .hidden { display: none; }
        
        h1 {
            text-align: center;
            font-size: 28px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }
        
        .subtitulo { text-align: center; color: #666; margin-bottom: 32px; }
        
        .input-group { margin-bottom: 20px; }
        .input-group input {
            width: 100%;
            padding: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
        }
        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        button:active { transform: scale(0.98); }
        button:disabled { opacity: 0.7; }
        
        .erro { color: #e74c3c; text-align: center; margin-top: 16px; font-size: 14px; }
        .link { text-align: center; margin-top: 24px; }
        .link a { color: #667eea; text-decoration: none; font-weight: bold; }
        
        /* App Header */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 2px solid #f0f0f0;
        }
        .app-header h1 { margin: 0; font-size: 22px; }
        .btn-sair {
            width: auto;
            padding: 8px 16px;
            font-size: 14px;
            background: #e74c3c;
        }
        
        /* Total Card */
        .total-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 16px;
            padding: 20px;
            color: white;
            text-align: center;
            margin-bottom: 20px;
        }
        .total-card span { font-size: 14px; opacity: 0.9; }
        .total-card h2 { font-size: 32px; margin-top: 8px; }
        
        /* Tabs */
        .tab-nav {
            display: flex;
            justify-content: space-around;
            background: #f8f9fa;
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 20px;
        }
        .tab-item {
            flex: 1;
            text-align: center;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            color: #666;
        }
        .tab-item.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        /* Vendas */
        .vendas-lista { max-height: 50vh; overflow-y: auto; }
        .venda-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .venda-cliente { font-weight: bold; margin-bottom: 4px; }
        .venda-data { font-size: 11px; color: #666; }
        .venda-valor { font-weight: bold; color: #27ae60; }
        .btn-deletar {
            width: auto;
            background: none;
            color: #e74c3c;
            font-size: 20px;
            padding: 8px;
        }
        
        /* Orçamentos */
        .orcamento-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }
