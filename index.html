<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZapCaderno Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { color-scheme: dark; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #0a0a0a; color: #ffffff; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* Navegação */
        .nav-bar { position: fixed; bottom: 20px; left: 15px; right: 15px; height: 75px; background: #161616; border-radius: 30px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 15px 35px rgba(0,0,0,0.9); z-index: 1000; border: 1px solid #222; }
        .btn-plus { background: #4f46e5; color: white; width: 65px; height: 65px; border-radius: 22px; display: flex; align-items: center; justify-content: center; margin-top: -45px; border: 4px solid #0a0a0a; font-size: 26px; box-shadow: 0 10px 20px rgba(79, 70, 229, 0.4); }
        .nav-btn { color: #444; font-size: 24px; background: none; border: none; transition: 0.3s; cursor: pointer; }
        .nav-btn.active { color: #818cf8; }

        .card { background: #161616; border-radius: 24px; padding: 22px; margin-bottom: 15px; border: 1px solid #222; }
        input, textarea { background: #1f1f1f !important; border: 1px solid #333 !important; border-radius: 14px !important; padding: 16px !important; width: 100%; margin-bottom: 12px; color: #fff !important; font-size: 16px; outline: none; }
        
        #telaLogin { position: fixed; inset: 0; background: #0a0a0a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
        .btn-loading { opacity: 0.7; pointer-events: none; }
    </style>
</head>
<body class="pb-36">

    <div id="telaLogin">
        <div class="text-center mb-8">
            <h2 class="text-4xl font-black text-indigo-500 tracking-tighter italic">ZAPCADERNO</h2>
            <p class="text-gray-500 text-sm">Sua caderneta profissional</p>
        </div>
        <input type="email" id="logEmail" placeholder="E-mail" autocomplete="email">
        <input type="password" id="logSenha" placeholder="Senha">
        <button id="btnEntrar" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-bold border-none shadow-xl">ENTRAR</button>
    </div>

    <header class="p-6 flex justify-between items-start">
        <div>
            <h1 id="headerNome" class="text-xl font-bold text-white uppercase italic tracking-tight">ZAPCADERNO</h1>
            <div class="flex items-center gap-2 mt-1">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <p id="headerPix" class="text-[10px] text-gray-500 font-mono">PIX: ---</p>
            </div>
        </div>
        <button onclick="location.reload()" class="bg-gray-900 p-3 rounded-full text-gray-400 border-none"><i class="fas fa-redo-alt"></i></button>
    </header>

    <main class="p-4">
        <div id="dashboard" class="tab-content active">
            <div class="card bg-gradient-to-br from-gray-900 to-black">
                <p class="text-[11px] text-indigo-400 font-bold uppercase mb-1">Total a Receber</p>
                <p id="totalReceber" class="text-4xl font-bold text-white">R$ 0,00</p>
            </div>
            <div id="listaDividas" class="space-y-3 mt-6"></div>
        </div>

        <div id="orcamentos" class="tab-content">
            <div class="card">
                <h3 class="text-indigo-400 text-xs font-bold mb-4 uppercase">Nova Proposta</h3>
                <input type="text" id="propNome" placeholder="Cliente">
                <input type="text" id="propWhatsapp" placeholder="WhatsApp">
                <textarea id="propDetalhes" placeholder="Descrição do serviço" rows="2"></textarea>
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="propMat" placeholder="Material R$">
                    <input type="number" id="propMao" placeholder="Mão de Obra R$">
                </div>
                <button id="btnGerarOrcamento" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold">SALVAR</button>
            </div>
            <div id="listaOrcamentos"></div>
        </div>

        <div id="novo" class="tab-content">
            <div class="card">
                <h3 class="text-indigo-400 text-xs font-bold mb-4 uppercase text-center">Registrar Venda</h3>
                <input type="text" id="vendaNome" placeholder="Nome do Cliente">
                <input type="text" id="vendaWhatsapp" placeholder="WhatsApp">
                <input type="text" id="vendaProduto" placeholder="Produto/Serviço">
                <input type="number" id="vendaValor" placeholder="Valor R$">
                <label class="text-[10px] text-gray-500 font-bold uppercase ml-1">Data do Pagamento:</label>
                <input type="date" id="vendaDataPagar">
                <button id="btnSalvarVendaRapida" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold mt-2">CONFIRMAR</button>
            </div>
        </div>

        <div id="config" class="tab-content">
            <div class="card">
                <h3 class="text-xs font-bold mb-4 uppercase">Perfil</h3>
                <input type="text" id="confNome" placeholder="Nome da Empresa">
                <input type="text" id="confPix" placeholder="Chave PIX">
                <button id="btnSalvarConfig" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold">SALVAR</button>
            </div>
        </div>
    </main>

    <nav class="nav-bar">
        <button id="tabDash" class="nav-btn active"><i class="fas fa-wallet"></i></button>
        <button id="tabOrc" class="nav-btn"><i class="fas fa-file-signature"></i></button>
        <button id="tabNovo" class="btn-plus"><i class="fas fa-plus"></i></button>
        <button id="tabConf" class="nav-btn"><i class="fas fa-store"></i></button>
        <button id="btnLogout" class="nav-btn"><i class="fas fa-door-open"></i></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, doc, updateDoc, setDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyASmjopW-EUIpZUsVFESFwMvpUZTMcdvMU",
            authDomain: "zapcaderno.firebaseapp.com",
            projectId: "zapcaderno",
            storageBucket: "zapcaderno.firebasestorage.app",
            messagingSenderId: "446641643061",
            appId: "1:446641643061:web:daf768922b53614f229b7c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let userConfig = { nome: "ZAPCADERNO", pix: "" };

        // Navegação
        const openTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            const map = { dashboard: 'tabDash', orcamentos: 'tabOrc', config: 'tabConf', novo: 'tabNovo' };
            if(map[id]) document.getElementById(map[id]).classList.add('active');
        };

        document.getElementById('tabDash').onclick = () => openTab('dashboard');
        document.getElementById('tabOrc').onclick = () => openTab('orcamentos');
        document.getElementById('tabNovo').onclick = () => openTab('novo');
        document.getElementById('tabConf').onclick = () => openTab('config');
        document.getElementById('btnLogout').onclick = () => { if(confirm("Deseja sair?")) signOut(auth); };

        // Autenticação
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('telaLogin').style.display = 'none';
                const docRef = doc(db, "configuracoes", user.uid);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    userConfig = docSnap.data();
                    document.getElementById('headerNome').innerText = userConfig.nome;
                    document.getElementById('headerPix').innerText = `PIX: ${userConfig.pix}`;
                }
                initApp(user.uid);
            } else {
                document.getElementById('telaLogin').style.display = 'flex';
            }
        });

        document.getElementById('btnEntrar').onclick = () => {
            const btn = document.getElementById('btnEntrar');
            btn.innerText = "ENTRANDO...";
            btn.classList.add('btn-loading');
            signInWithEmailAndPassword(auth, document.getElementById('logEmail').value, document.getElementById('logSenha').value)
                .catch(() => {
                    alert("Dados incorretos!");
                    btn.innerText = "ENTRAR";
                    btn.classList.remove('btn-loading');
                });
        };

        function initApp(uid) {
            // Vendas (Dívidas)
            onSnapshot(query(collection(db, "vendas"), where("uid", "==", uid)), (snap) => {
                let total = 0;
                const container = document.getElementById('listaDividas');
                container.innerHTML = '';
                snap.forEach(docSnap => {
                    const d = docSnap.data();
                    if (!d.pago) {
                        total += d.valor;
                        const dataBr = d.dataPagar.split('-').reverse().join('/');
                        container.innerHTML += `
                            <div class="card flex justify-between items-center border-l-4 border-indigo-600">
                                <div class="max-w-[55%]">
                                    <b class="block truncate">${d.nome}</b>
                                    <span class="text-[10px] text-red-400 font-bold uppercase">Vence: ${dataBr}</span>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="window.fazerCobranca('${d.whatsapp}', '${d.valor}')" class="bg-green-600 p-3 rounded-xl border-none text-white"><i class="fab fa-whatsapp"></i></button>
                                    <button onclick="window.marcarPago('${docSnap.id}')" class="bg-indigo-600 text-white px-3 py-2 rounded-xl text-[10px] font-bold border-none uppercase">PAGO</button>
                                </div>
                            </div>`;
                    }
                });
                document.getElementById('totalReceber').innerText = `R$ ${total.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            });

            // Orçamentos
            onSnapshot(query(collection(db, "orcamentos"), where("uid", "==", uid)), (snap) => {
                const container = document.getElementById('listaOrcamentos');
                container.innerHTML = '';
                snap.forEach(docSnap => {
                    const o = docSnap.data();
                    container.innerHTML += `
                        <div class="card">
                            <div class="flex justify-between mb-3">
                                <b class="truncate">${o.nome}</b>
                                <span class="text-indigo-400 font-bold">R$ ${o.valor.toFixed(2)}</span>
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <button onclick="window.enviarZap('${o.whatsapp}', '${o.valor}', '${o.detalhes}')" class="bg-green-600 text-white py-3 rounded-xl text-[9px] font-bold uppercase border-none">ENVIAR</button>
                                <button onclick="window.fecharVenda('${docSnap.id}')" class="bg-indigo-600 text-white py-3 rounded-xl text-[9px] font-bold uppercase border-none">FECHAR</button>
                            </div>
                        </div>`;
                });
            });
        }

        // Global functions for buttons
        window.fazerCobranca = (tel, val) => {
            const msg = `Olá! Segue lembrete de pagamento: R$ ${val}.%0AChave PIX: ${userConfig.pix}`;
            window.open(`https://wa.me/55${tel.replace(/\D/g, '')}?text=${msg}`);
        };

        window.marcarPago = async (id) => {
            if(confirm("Dinheiro recebido?")) await updateDoc(doc(db, "vendas", id), { pago: true });
        };

        window.enviarZap = (tel, val, det) => {
            const msg = `*ORÇAMENTO - ${userConfig.nome}*%0A---%0A*Serviço:* ${det}%0A*Total:* R$ ${val}`;
            window.open(`https://wa.me/55${tel.replace(/\D/g, '')}?text=${msg}`);
        };

        window.fecharVenda = async (id) => {
            const s = await getDoc(doc(db, "orcamentos", id));
            if (s.exists()) {
                await addDoc(collection(db, "vendas"), {
                    ...s.data(),
                    pago: false,
                    dataPagar: new Date().toISOString().split('T')[0],
                    timestamp: new Date()
                });
                await deleteDoc(doc(db, "orcamentos", id));
                openTab('dashboard');
            }
        };

        // Salvar Nova Venda
        document.getElementById('btnSalvarVendaRapida').onclick = async () => {
            const data = document.getElementById('vendaDataPagar').value;
            if(!data) return alert("Selecione a data!");
            
            await addDoc(collection(db, "vendas"), {
                uid: auth.currentUser.uid,
                nome: document.getElementById('vendaNome').value || "Cliente",
                whatsapp: document.getElementById('vendaWhatsapp').value,
                produto: document.getElementById('vendaProduto').value,
                valor: parseFloat(document.getElementById('vendaValor').value) || 0,
                dataPagar: data,
                pago: false,
                timestamp: new Date()
            });
            alert("Salvo!");
            openTab('dashboard');
        };

        document.getElementById('btnGerarOrcamento').onclick = async () => {
            const total = (parseFloat(document.getElementById('propMat').value) || 0) + (parseFloat(document.getElementById('propMao').value) || 0);
            await addDoc(collection(db, "orcamentos"), {
                uid: auth.currentUser.uid,
                nome: document.getElementById('propNome').value,
                whatsapp: document.getElementById('propWhatsapp').value,
                detalhes: document.getElementById('propDetalhes').value,
                valor: total
            });
            alert("Orçamento Gravado!");
            openTab('orcamentos');
        };

        document.getElementById('btnSalvarConfig').onclick = async () => {
            await setDoc(doc(db, "configuracoes", auth.currentUser.uid), {
                nome: document.getElementById('confNome').value,
                pix: document.getElementById('confPix').value
            });
            alert("Perfil Atualizado!");
            location.reload();
        };
    </script>
</body>
</html>
