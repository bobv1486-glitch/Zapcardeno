<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZapCaderno Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; -webkit-tap-highlight-color: transparent; }
        .dark-mode { background-color: #0f172a; color: #f1f5f9; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        #telaLogin { position: fixed; inset: 0; background: white; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .nav-bar { position: fixed; bottom: 20px; left: 15px; right: 15px; height: 70px; background: white; border-radius: 20px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 100; }
        .dark-mode .nav-bar { background: #1e293b; }

        .btn-plus { background: #4f46e5; color: white; width: 55px; height: 55px; border-radius: 15px; display: flex; align-items: center; justify-content: center; margin-top: -40px; box-shadow: 0 5px 15px rgba(79, 70, 229, 0.4); border: none; }
        
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 10px; border: 1px solid #e2e8f0; }
        .dark-mode .card { background: #1e293b; border-color: #334155; }
        
        input, textarea { border: 1px solid #cbd5e1 !important; border-radius: 10px !important; padding: 12px !important; width: 100%; margin-bottom: 10px; background: #fff; color: #000; }
        .dark-mode input, .dark-mode textarea { background: #0f172a; color: #fff; border-color: #475569 !important; }
        
        .nav-btn { color: #94a3b8; font-size: 24px; background: none; border: none; }
        .nav-btn.active { color: #4f46e5; }

        /* Estilo da Folha de Orçamento (Inspirado na imagem do Canva) */
        #modalView { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 10000; display: none; overflow-y: auto; padding: 15px; }
        .folha { background: white; width: 100%; border-radius: 5px; padding: 25px; color: #333; }
        .linha-divisora { border-bottom: 2px solid #4f46e5; margin: 15px 0; }
    </style>
</head>
<body class="pb-32">

    <div id="modalView">
        <div class="folha">
            <div class="flex justify-between items-start">
                <div>
                    <p id="vData" class="text-[10px] text-gray-400">Data: --/--/----</p>
                    <h2 class="text-2xl font-serif font-light">Proposta de <br><b>Orçamento</b></h2>
                </div>
                <div class="text-right">
                    <p class="text-[10px] font-bold text-indigo-600 uppercase">Emitido por:</p>
                    <p id="vEmpresa" class="text-xs font-bold">MINHA LOJA</p>
                </div>
            </div>

            <div class="linha-divisora"></div>

            <div class="mb-6">
                <p class="text-[10px] font-bold text-gray-400 uppercase">Cliente:</p>
                <p id="vCliente" class="text-lg font-bold">---</p>
            </div>

            <div class="mb-6">
                <h4 class="text-xs font-bold text-indigo-600 mb-2 uppercase tracking-widest">Escopo do Trabalho</h4>
                <p id="vDesc" class="text-sm text-gray-600 leading-relaxed italic">"Obrigado pelo interesse em nossos serviços..."</p>
            </div>

            <div class="bg-gray-100 p-4 rounded-lg">
                <div class="flex justify-between font-bold text-indigo-800 text-lg">
                    <span>VALOR TOTAL:</span>
                    <span id="vTotal">R$ 0,00</span>
                </div>
            </div>

            <div class="mt-8">
                <button id="btnZapFinal" class="w-full bg-green-500 text-white py-3 rounded-lg font-bold mb-3 uppercase text-sm">Enviar para o Cliente</button>
                <button onclick="document.getElementById('modalView').style.display='none'" class="w-full text-gray-400 text-xs font-bold">VOLTAR</button>
            </div>
        </div>
    </div>

    <div id="telaLogin">
        <h1 class="text-2xl font-bold mb-4 text-indigo-600">ZapCaderno</h1>
        <input type="email" id="logEmail" placeholder="E-mail">
        <input type="password" id="logSenha" placeholder="Senha">
        <button id="btnEntrar" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold border-none">ENTRAR</button>
    </div>

    <header class="bg-indigo-600 text-white p-6 pb-12 rounded-b-[30px]">
        <div class="flex justify-between items-center">
            <div>
                <h1 id="headerNome" class="text-lg font-bold uppercase">MINHA LOJA</h1>
                <p id="headerPix" class="text-[10px] opacity-70">PIX: Carregando...</p>
            </div>
            <button onclick="document.body.classList.toggle('dark-mode')" class="text-white bg-transparent border-none text-xl"><i class="fas fa-moon"></i></button>
        </div>
    </header>

    <main class="p-4 -mt-8">
        <div id="dashboard" class="tab-content active">
            <div class="card mb-4 shadow-lg">
                <p class="text-[10px] font-bold text-gray-400 uppercase">A Receber</p>
                <p id="totalReceber" class="text-3xl font-bold text-indigo-600">R$ 0,00</p>
            </div>
            <div id="listaDividas"></div>
        </div>

        <div id="orcamentos" class="tab-content">
            <h2 class="font-bold text-indigo-600 mb-4 px-2 uppercase text-xs">Orçamentos Profissionais</h2>
            <div id="listaOrcamentos"></div>
        </div>

        <div id="novo" class="tab-content">
            <div class="card shadow-xl">
                <h2 class="font-bold mb-4">Novo Registro</h2>
                <input type="text" id="nome" placeholder="Nome do Cliente">
                <input type="text" id="whatsapp" placeholder="WhatsApp (DDD+Número)">
                <textarea id="produto" rows="3" placeholder="O que ele comprou ou qual o serviço?"></textarea>
                <input type="text" id="valor" placeholder="Valor Total R$">
                
                <div class="grid grid-cols-2 gap-2 mt-2">
                    <button id="btnVenda" class="bg-indigo-600 text-white py-4 rounded-lg border-none font-bold uppercase text-xs">É VENDA</button>
                    <button id="btnOrc" class="bg-gray-400 text-white py-4 rounded-lg border-none font-bold uppercase text-xs">É ORÇAMENTO</button>
                </div>
            </div>
        </div>

        <div id="config" class="tab-content">
            <div class="card">
                <h2 class="font-bold mb-4">Minha Empresa</h2>
                <input type="text" id="confNome" placeholder="Nome da Empresa">
                <input type="text" id="confPix" placeholder="Seu PIX">
                <button id="btnSalvarConfig" class="w-full bg-green-500 text-white py-3 rounded-lg border-none font-bold uppercase">Salvar</button>
            </div>
        </div>
    </main>

    <nav class="nav-bar">
        <button id="tabDash" class="nav-btn active"><i class="fas fa-home"></i></button>
        <button id="tabOrc" class="nav-btn"><i class="fas fa-file-invoice"></i></button>
        <button id="tabNovo" class="btn-plus"><i class="fas fa-plus"></i></button>
        <button id="tabConf" class="nav-btn"><i class="fas fa-cog"></i></button>
        <button id="btnLogout" class="nav-btn"><i class="fas fa-sign-out-alt"></i></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, doc, updateDoc, deleteDoc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyASmjopW-EUIpZUsVFESFwMvpUZTMcdvMU",
            authDomain: "zapcaderno.firebaseapp.com",
            projectId: "zapcaderno",
            storageBucket: "zapcaderno.firebasestorage.app",
            messagingSenderId: "446641643061",
            appId: "1:446641643061:web:daf768922b53614f229b7c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let empresa = { nome: "ZAPCADERNO", pix: "Não configurado" };

        const openTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if(id === 'dashboard') document.getElementById('tabDash').classList.add('active');
            if(id === 'orcamentos') document.getElementById('tabOrc').classList.add('active');
            if(id === 'config') document.getElementById('tabConf').classList.add('active');
        };

        document.getElementById('tabDash').onclick = () => openTab('dashboard');
        document.getElementById('tabOrc').onclick = () => openTab('orcamentos');
        document.getElementById('tabNovo').onclick = () => openTab('novo');
        document.getElementById('tabConf').onclick = () => openTab('config');
        document.getElementById('btnLogout').onclick = () => signOut(auth);

        document.getElementById('btnEntrar').onclick = () => {
            signInWithEmailAndPassword(auth, document.getElementById('logEmail').value, document.getElementById('logSenha').value).catch(() => alert("Erro no login"));
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('telaLogin').style.display = 'none';
                const snap = await getDoc(doc(db, "configuracoes", user.uid));
                if (snap
