<script>
function carregarDados(uid) {
    db.collection("vendas").where("uid", "==", uid).onSnapshot(snap => {
        let pend = 0;
        const container = document.getElementById('listaVendas');
        container.innerHTML = '';
        
        snap.forEach(doc => {
            const d = doc.data();
            if(!d.pago) {
                pend += d.valor;
                // Formata o valor para R$ 0,00
                const valorFormatado = d.valor.toLocaleString('pt-br', {style: 'currency', currency: 'BRL'});
                const nomeCliente = d.nome || "Cliente sem nome";

                container.innerHTML += `
                <div class="card shadow-sm border-l-4 border-indigo-500">
                    <div class="flex justify-between items-start">
                        <div>
                            <b class="text-lg">${nomeCliente}</b>
                            <p class="text-xs opacity-50 uppercase">${d.item || 'Venda'}</p>
                        </div>
                        <b class="text-indigo-600">${valorFormatado}</b>
                    </div>
                    <div class="flex gap-2 mt-4">
                        <button onclick="cobrar('${d.whatsapp}', ${d.valor}, '${nomeCliente}')" 
                                class="flex-1 bg-green-500 text-white p-3 rounded-xl font-bold border-none flex items-center justify-center gap-2">
                            <i class="fab fa-whatsapp text-xl"></i> COBRAR
                        </button>
                        <button onclick="baixar('${doc.id}')" 
                                class="flex-1 bg-gray-100 text-gray-600 p-3 rounded-xl font-bold border-none">
                            RECEBI
                        </button>
                    </div>
                </div>`;
            }
        });
        document.getElementById('t-pendente').innerText = pend.toLocaleString('pt-br', {style: 'currency', currency: 'BRL'});
    });

    // Carregar Orçamentos também
    db.collection("orcamentos").where("uid", "==", uid).onSnapshot(snap => {
        const container = document.getElementById('listaOrcamentos');
        if(!container) return; 
        container.innerHTML = '';
        snap.forEach(doc => {
            const o = doc.data();
            container.innerHTML += `
            <div class="card border-l-4 border-yellow-500">
                <div class="flex justify-between mb-2">
                    <b>${o.nome}</b>
                    <b class="text-yellow-600">R$ ${o.valor.toFixed(2)}</b>
                </div>
                <button onclick="enviarOrc('${o.whatsapp}', '${o.valor}', '${o.detalhes}')" 
                        class="w-full bg-green-500 text-white py-2 rounded-lg font-bold border-none flex items-center justify-center gap-2">
                    <i class="fab fa-whatsapp"></i> ENVIAR PROPOSTA
                </button>
            </div>`;
        });
    });
}

// Função para marcar como pago
window.baixar = (id) => {
    if(confirm("Confirmar recebimento?")) {
        db.collection("vendas").doc(id).update({pago: true});
    }
};
</script>
