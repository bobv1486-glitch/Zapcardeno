<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zapcaderno - Teste Grátis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #tela-carregamento, #tela-liberada, #tela-bloqueio { display: none; }
        .flex-active { display: flex !important; }
        .block-active { display: block !important; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <div id="tela-carregamento" class="h-screen flex flex-col items-center justify-center bg-white">
        <div class="h-10 w-10 animate-spin rounded-full border-4 border-blue-600 border-t-transparent"></div>
    </div>

    <div id="tela-bloqueio" class="min-h-screen flex flex-col items-center justify-center p-6">
        <div class="w-full max-w-sm bg-white rounded-[2.5rem] shadow-2xl overflow-hidden">
            <div class="bg-red-500 p-8 text-center text-white">
                <h1 class="text-2xl font-black italic">PERÍODO EXPIRADO</h1>
                <p class="text-xs opacity-80 uppercase font-bold mt-1">Seus 15 dias de teste acabaram</p>
            </div>
            <div class="p-10 text-center">
                <p class="text-gray-500 text-sm mb-6">Para continuar usando o Zapcaderno e salvar suas notas, ative o acesso vitalício.</p>
                <div class="mb-8">
                    <span class="text-5xl font-black text-gray-900">R$ 14,99</span>
                </div>
                <a href="https://link.mercadopago.com.br/zapcaderno" target="_blank" 
                   class="block w-full bg-blue-600 text-white font-black py-5 rounded-2xl shadow-xl mb-4 text-center">
                    LIBERAR AGORA
                </a>
                <button onclick="validarTudo()" class="text-[10px] text-gray-400 underline uppercase font-bold">Já paguei? Verificar</button>
            </div>
        </div>
    </div>

    <div id="tela-liberada" class="min-h-screen bg-gray-50 flex-col">
        <nav class="bg-white border-b px-6 py-4 flex justify-between items-center shadow-sm">
            <h1 class="text-xl font-black text-blue-600 italic">ZAPCADERNO</h1>
            <span id="badge-status" class="text-[10px] font-black px-2 py-1 rounded-md uppercase"></span>
        </nav>
        <main class="p-6 text-center">
            <div class="bg-white rounded-3xl p-6 shadow-sm border border-gray-200">
                <textarea id="nota" class="w-full h-64 p-4 bg-gray-50 border rounded-2xl outline-none" placeholder="Suas anotações premium..."></textarea>
                <button onclick="alert('Salvo!')" class="w-full mt-4 bg-blue-600 text-white py-4 rounded-xl font-bold">Salvar Nota</button>
            </div>
        </main>
    </div>

    <script>
        const API_SHEETDB = 'https://sheetdb.io/api/v1/2f431iyij8cgi';

        async function validarTudo() {
            alternarTela('tela-carregamento');

            // 1. CHECAR SE JÁ PAGOU (Prioridade máxima)
            try {
                const res = await fetch(API_SHEETDB);
                const dados = await res.json();
                const pago = dados.some(i => String(i.status).toLowerCase() === 'approved');

                if (pago) {
                    document.getElementById('badge-status').innerText = "ACESSO VITALÍCIO";
                    document.getElementById('badge-status').className = "text-[10px] font-black px-2 py-1 rounded-md uppercase bg-green-100 text-green-700";
                    alternarTela('tela-liberada');
                    return;
                }
            } catch (e) { console.log("Erro na API"); }

            // 2. LOGICA DOS 15 DIAS GRÁTIS
            let dataCriacao = localStorage.getItem('zap_data_criacao');
            const hoje = new Date();

            if (!dataCriacao) {
                // Novo usuário: marca a data de hoje
                localStorage.setItem('zap_data_criacao', hoje.toISOString());
                dataCriacao = hoje.toISOString();
            }

            const dataInicio = new Date(dataCriacao);
            const diferencaDias = Math.floor((hoje - dataInicio) / (1000 * 60 * 60 * 24));

            if (diferencaDias <= 15) {
                // Ainda está no período grátis
                const diasRestantes = 15 - diferencaDias;
                document.getElementById('badge-status').innerText = `TESTE: ${diasRestantes} DIAS RESTANTES`;
                document.getElementById('badge-status').className = "text-[10px] font-black px-2 py-1 rounded-md uppercase bg-blue-100 text-blue-700";
                alternarTela('tela-liberada');
            } else {
                // Acabou o tempo e não pagou
                alternarTela('tela-bloqueio');
            }
        }

        function alternarTela(id) {
            ['tela-carregamento', 'tela-bloqueio', 'tela-liberada'].forEach(i => {
                document.getElementById(i).style.display = (i === id) ? (i === 'tela-liberada' ? 'block' : 'flex') : 'none';
            });
        }

        window.onload = validarTudo;
    </script>
</body>
</html>
