<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minha Loja - ZapCaderno</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { color-scheme: dark; }
        body { background-color: #121214; color: #e1e1e6; font-family: sans-serif; margin: 0; padding-bottom: 90px; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Estilo idêntico ao vídeo */
        .header-status { background-color: #4f46e5; color: white; padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        
        .card-stats { background-color: #1f1f23; border-radius: 16px; padding: 20px; margin: 15px; border: 1px solid #29292e; }
        
        .progress-bar-bg { background: #29292e; height: 8px; border-radius: 4px; width: 100%; margin-top: 8px; }
        .progress-bar-fill { background: #4f46e5; height: 100%; border-radius: 4px; width: 0%; transition: 0.5s; }

        .search-container { position: relative; margin: 15px; }
        .search-input { background: #1f1f23; border: 1px solid #29292e; border-radius: 12px; width: 100%; padding: 12px 40px; color: white; outline: none; }
        .search-icon { position: absolute; left: 15px; top: 13px; color: #7c7c8a; }

        /* Navegação do vídeo */
        .nav-bottom { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: #121214; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #29292e; z-index: 100; }
        .nav-item { color: #7c7c8a; font-size: 20px; background: none; border: none; padding: 10px; }
        .nav-item.active { color: #4f46e5; }
        .btn-main-add { background: #4f46e5; width: 56px; height: 56px; border-radius: 18px; color: white; display: flex; align-items: center; justify-content: center; font-size: 24px; box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4); border: none; transform: translateY(-15px); }

        /* Inputs do Modal de Venda */
        .input-dark { background: #121214; border: 1px solid #29292e; border-radius: 8px; padding: 14px; width: 100%; color: white; margin-bottom: 12px; }
        
        #telaLogin { position: fixed; inset: 0; background: #121214; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
    </style>
</head>
<body>

    <div id="telaLogin" style="display:none;">
        <h2 class="text-2xl font-bold mb-6">ZAPCADERNO</h2>
        <input type="email" id="l-email" class="input-dark" placeholder="E-mail">
        <input type="password" id="l-senha" class="input-dark" placeholder="Senha">
        <button id="btnEntrar" class="w-full bg-indigo-600 p-4 rounded-xl font-bold">ENTRAR</button>
    </div>

    <div class="p-4 flex justify-between items-center">
        <span class="header-status">Sincronizado</span>
        <i class="fas fa-moon text-indigo-400"></i>
    </div>

    <main>
        <div id="home" class="tab-content active">
            <div class="card-stats">
                <div class="flex justify-between items-start mb-4">
                    <div>
                        <p class="text-xs text-gray-400 uppercase font-bold">Total a Receber</p>
                        <h2 id="totalReceber" class="text-3xl font-bold mt-1">R$ 0,00</h2>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] text-green-400 uppercase font-bold">Recebido</p>
                        <p id="totalPago" class="text-lg font-bold">R$ 0,00</p>
                    </div>
                </div>
                <div class="flex justify-between text-[10px] uppercase font-bold text-gray-500">
                    <span>Progresso de Recebimento</span>
                    <span id="txtPorcentagem">0%</span>
                </div>
                <div class="progress-bar-bg">
                    <div id="barPreenchimento" class="progress-bar-fill"></div>
                </div>
            </div>

            <div class="search-container">
                <i class="fas fa-search search-icon"></i>
                <input type="text" id="busca" class="search-input" placeholder="Buscar cliente...">
                <button class="absolute right-4 top-3 text-gray-500"><i class="fas fa-print"></i></button>
            </div>

            <div id="listaVendas" class="px-4 space-y-3">
                </div>
        </div>

        <div id="clientes" class="tab-content">
            <div class="p-4">
                <h3 class="text-xs font-bold text-indigo-400 uppercase mb-4">Histórico por Cliente</h3>
                <div id="listaClientes" class="text-center text-gray-600 mt-10">Nenhum registro ainda.</div>
            </div>
        </div>

        <div id="novo" class="tab-content">
            <div class="p-6">
                <h3 class="text-xl font-bold mb-6">Nova Venda Fiada</h3>
                <input type="text" id="v-nome" class="input-dark" placeholder="Nome do Cliente">
                <input type="text" id="v-whats" class="input-dark" placeholder="WhatsApp (DDD+Número)">
                <input type="text" id="v-item" class="input-dark" placeholder="O que ele comprou?">
                <input type="number" id="v-valor" class="input-dark" placeholder="R$ 0,00">
                <input type="date" id="v-data" class="input-dark" value="2026-04-22">
                <button id="btnSalvar" class="w-full bg-indigo-600 py-4 rounded-xl font-bold uppercase mt-2">Salvar no Caderno</button>
            </div>
        </div>

        <div id="config" class="tab-content">
            <div class="p-6">
                <h3 class="text-xs font-bold text-gray-500 uppercase mb-4">Dados do Negócio</h3>
                <input type="text" id="c-loja" class="input-dark" placeholder="Minha Loja">
                <input type="text" id="c-pix" class="input-dark" placeholder="Chave PIX para Cobrança">
                <button id="btnSalvarConf" class="w-full bg-indigo-600 py-4 rounded-xl font-bold mb-8">Atualizar Dados</button>
                
                <h3 class="text-xs font-bold text-gray-500 uppercase mb-4">Segurança de Dados</h3>
                <div class="grid grid-cols-2 gap-4">
                    <button class="bg-gray-800 p-4 rounded-xl font-bold">EXPORTAR</button>
                    <button class="bg-gray-800 p-4 rounded-xl font-bold">IMPORTAR</button>
                </div>
                <button onclick="firebase.auth().signOut()" class="w-full mt-10 text-red-500 text-sm uppercase font-bold">Sair do Aplicativo</button>
            </div>
        </div>
    </main>

    <nav class="nav-bottom">
        <button onclick="mudarAba('home')" class="nav-item active" id="n-home"><i class="fas fa-home"></i></button>
        <button onclick="mudarAba('clientes')" class="nav-item" id="n-clientes"><i class="fas fa-users"></i></button>
        <button onclick="mudarAba('novo')" class="btn-main-add"><i class="fas fa-plus"></i></button>
        <button onclick="mudarAba('config')" class="nav-item" id="n-config"><i class="fas fa-cog"></i></button>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyASmjopW-EUIpZUsVFESFwMvpUZTMcdvMU",
            authDomain: "zapcaderno.firebaseapp.com",
            projectId: "zapcaderno",
            storageBucket: "zapcaderno.firebasestorage.app",
            messagingSenderId: "446641643061",
            appId: "1:446641643061:web:daf768922b53614f229b7c"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // Mudar Abas
        function mudarAba(aba) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(aba).classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            if(aba !== 'novo') document.getElementById('n-'+aba).classList.add('active');
        }

        // Login
        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('telaLogin').style.display = 'none';
                carregarVendas(user.uid);
            } else {
                document.getElementById('telaLogin').style.display = 'flex';
            }
        });

        document.getElementById('btnEntrar').onclick = () => {
            auth.signInWithEmailAndPassword(document.getElementById('l-email').value, document.getElementById('l-senha').value);
        };

        function carregarVendas(uid) {
            db.collection("vendas").where("uid", "==", uid).onSnapshot(snap => {
                let pendente = 0, recebido = 0;
                const lista = document.getElementById('listaVendas');
                lista.innerHTML = '';

                snap.forEach(doc => {
                    const v = doc.data();
                    if(v.pago) recebido += v.valor;
                    else {
                        pendente += v.valor;
                        lista.innerHTML += `
                            <div class="card-stats !m-0 !p-4 flex justify-between items-center">
                                <div><b class="block">${v.cliente}</b><span class="text-xs text-gray-500">${v.data}</span></div>
                                <div class="flex gap-2">
                                    <button onclick="zap('${v.whatsapp}', '${v.valor}')" class="text-green-500 text-xl p-2"><i class="fab fa-whatsapp"></i></button>
                                    <button onclick="receber('${doc.id}')" class="bg-indigo-600 px-3 py-1 rounded-lg text-[10px] font-bold">OK</button>
                                </div>
                            </div>`;
                    }
                });

                document.getElementById('totalReceber').innerText = "R$ " + pendente.toFixed(2).replace('.',',');
                document.getElementById('totalPago').innerText = "R$ " + recebido.toFixed(2).replace('.',',');
                
                const totalGeral = pendente + recebido;
                const porc = totalGeral > 0 ? (recebido / totalGeral) * 100 : 0;
                document.getElementById('txtPorcentagem').innerText = Math.round(porc) + "%";
                document.getElementById('barPreenchimento').style.width = porc + "%";
            });
        }

        window.receber = (id) => db.collection("vendas").doc(id).update({pago: true});
        window.zap = (tel, val) => window.open(`https://wa.me/55${tel.replace(/\D/g,'')}?text=Olá, lembrete de cobrança: R$ ${val}`);

        document.getElementById('btnSalvar').onclick = async () => {
            await db.collection("vendas").add({
                uid: auth.currentUser.uid,
                cliente: document.getElementById('v-nome').value,
                whatsapp: document.getElementById('v-whats').value,
                valor: parseFloat(document.getElementById('v-valor').value),
                data: document.getElementById('v-data').value,
                pago: false
            });
            mudarAba('home');
        };
    </script>
</body>
</html>
