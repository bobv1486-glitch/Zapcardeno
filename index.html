<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZapCaderno Pro</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { color-scheme: dark; }
        body { background: #0a0a0a; color: white; font-family: sans-serif; margin: 0; padding-bottom: 100px; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* Inputs Profissionais */
        .card { background: #161616; border-radius: 24px; padding: 20px; margin-bottom: 15px; border: 1px solid #222; }
        input, textarea { background: #1f1f1f !important; border: 1px solid #333 !important; border-radius: 12px !important; padding: 15px !important; width: 100%; color: white !important; margin-bottom: 10px; outline: none; }
        
        /* Navegação Inferior */
        .nav-bar { position: fixed; bottom: 20px; left: 15px; right: 15px; height: 75px; background: #161616; border-radius: 30px; display: flex; justify-content: space-around; align-items: center; border: 1px solid #222; z-index: 100; }
        .btn-plus { background: #4f46e5; color: white; width: 60px; height: 60px; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin-top: -40px; border: 4px solid #0a0a0a; font-size: 24px; }
        .nav-btn { color: #444; font-size: 22px; background: none; border: none; }
        .nav-btn.active { color: #818cf8; }

        #telaLogin { position: fixed; inset: 0; background: #0a0a0a; z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
    </style>
</head>
<body>

    <div id="telaLogin" style="display:none;">
        <h1 class="text-3xl font-black text-indigo-500 italic mb-2">ZAPCADERNO</h1>
        <p class="text-gray-500 mb-8">Acesse sua conta</p>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="senha" placeholder="Senha">
        <button id="btnEntrar" class="w-full bg-indigo-600 p-4 rounded-2xl font-bold mt-4">ENTRAR</button>
    </div>

    <header class="p-6 flex justify-between items-center">
        <div>
            <h1 id="h-nome" class="text-xl font-bold italic uppercase">ZAPCADERNO</h1>
            <p id="h-pix" class="text-[10px] text-gray-500 font-mono">PIX NÃO CONFIGURADO</p>
        </div>
        <button onclick="location.reload()" class="text-gray-600"><i class="fas fa-sync-alt"></i></button>
    </header>

    <main class="p-4">
        <div id="dashboard" class="tab-content active">
            <div class="card bg-gradient-to-br from-indigo-900/20 to-black">
                <p class="text-[10px] text-indigo-400 font-bold uppercase mb-1">Saldo a Receber</p>
                <h2 id="total-saldo" class="text-4xl font-bold text-white">R$ 0,00</h2>
            </div>
            <div id="lista-vendas" class="mt-6 space-y-3">
                <p class="text-center text-gray-600 py-10">Nenhuma cobrança pendente.</p>
            </div>
        </div>

        <div id="orcamentos" class="tab-content">
            <div class="card">
                <h3 class="text-indigo-400 text-xs font-bold mb-4 uppercase">Nova Proposta</h3>
                <input type="text" id="o-nome" placeholder="Nome do Cliente">
                <input type="text" id="o-whats" placeholder="WhatsApp">
                <textarea id="o-detalhes" placeholder="Descrição do serviço..." rows="2"></textarea>
                <input type="number" id="o-valor" placeholder="Valor Total R$">
                <button id="btnSalvarOrc" class="w-full bg-indigo-600 py-4 rounded-xl font-bold">GRAVAR ORÇAMENTO</button>
            </div>
            <div id="lista-orcamentos" class="space-y-3"></div>
        </div>

        <div id="novo" class="tab-content">
            <div class="card">
                <h3 class="text-indigo-400 text-xs font-bold mb-4 uppercase">Registrar Venda/Dívida</h3>
                <input type="text" id="v-nome" placeholder="Cliente">
                <input type="text" id="v-whats" placeholder="WhatsApp">
                <input type="number" id="v-valor" placeholder="Valor R$">
                <label class="text-[10px] text-gray-400 ml-1">DATA DE VENCIMENTO:</label>
                <input type="date" id="v-data">
                <button id="btnSalvarVenda" class="w-full bg-indigo-600 py-4 rounded-xl font-bold">CONFIRMAR E SALVAR</button>
            </div>
        </div>

        <div id="config" class="tab-content">
            <div class="card">
                <h3 class="text-xs font-bold mb-4 uppercase">Meu Perfil</h3>
                <input type="text" id="c-empresa" placeholder="Nome da sua Empresa">
                <input type="text" id="c-pix" placeholder="Sua Chave PIX">
                <button id="btnSalvarConfig" class="w-full bg-green-600 py-4 rounded-xl font-bold">SALVAR PERFIL</button>
                <button onclick="auth.signOut()" class="w-full mt-6 text-gray-600 text-sm">Sair da Conta</button>
            </div>
        </div>
    </main>

    <nav class="nav-bar">
        <button onclick="openTab('dashboard')" id="btn-dash" class="nav-btn active"><i class="fas fa-wallet"></i></button>
        <button onclick="openTab('orcamentos')" id="btn-orc" class="nav-btn"><i class="fas fa-file-invoice-dollar"></i></button>
        <button onclick="openTab('novo')" class="btn-plus"><i class="fas fa-plus"></i></button>
        <button onclick="openTab('config')" id="btn-conf" class="nav-btn"><i class="fas fa-store"></i></button>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyASmjopW-EUIpZUsVFESFwMvpUZTMcdvMU",
            authDomain: "zapcaderno.firebaseapp.com",
            projectId: "zapcaderno",
            storageBucket: "zapcaderno.firebasestorage.app",
            messagingSenderId: "446641643061",
            appId: "1:446641643061:web:daf768922b53614f229b7c"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        let userConfig = { nome: "ZAPCADERNO", pix: "" };

        // --- NAVEGAÇÃO ---
        function openTab(id) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'dashboard') document.getElementById('btn-dash').classList.add('active');
            if(id === 'orcamentos') document.getElementById('btn-orc').classList.add('active');
            if(id === 'config') document.getElementById('btn-conf').classList.add('active');
        }

        // --- LOGIN ---
        document.getElementById('btnEntrar').onclick = () => {
            const e = document.getElementById('email').value;
            const s = document.getElementById('senha').value;
            auth.signInWithEmailAndPassword(e, s).catch(err => alert("Erro ao entrar: " + err.message));
        };

        auth.onAuthStateChanged(async (user) => {
            if (user) {
                document.getElementById('telaLogin').style.display = 'none';
                
                // Carrega Configurações
                const docConf = await db.collection("configuracoes").doc(user.uid).get();
                if(docConf.exists()) {
                    userConfig = docConf.data();
                    document.getElementById('h-nome').innerText = userConfig.nome;
                    document.getElementById('h-pix').innerText = "PIX: " + userConfig.pix;
                }
                
                carregarDados(user.uid);
            } else {
                document.getElementById('telaLogin').style.display = 'flex';
            }
        });

        function carregarDados(uid) {
            // Monitorar Vendas
            db.collection("vendas").where("uid", "==", uid).onSnapshot(snap => {
                let total = 0;
                const container = document.getElementById('lista-vendas');
                container.innerHTML = '';
                snap.forEach(doc => {
                    const d = doc.data();
                    if(!d.pago) {
                        total += d.valor;
                        container.innerHTML += `
                            <div class="card flex justify-between items-center border-l-4 border-indigo-600">
                                <div><b>${d.nome}</b><br><span class="text-[10px] text-gray-500 uppercase">${d.data}</span></div>
                                <div class="flex gap-2">
                                    <button onclick="mandarCobranca('${d.whatsapp}', '${d.valor}')" class="bg-green-600 p-3 rounded-xl text-white border-none"><i class="fab fa-whatsapp"></i></button>
                                    <button onclick="marcarPago('${doc.id}')" class="bg-indigo-600 text-white px-3 py-2 rounded-xl text-[10px] font-bold border-none">RECEBI</button>
                                </div>
                            </div>`;
                    }
                });
                document.getElementById('total-saldo').innerText = "R$ " + total.toLocaleString('pt-BR', {minimumFractionDigits: 2});
            });

            // Monitorar Orçamentos
            db.collection("orcamentos").where("uid", "==", uid).onSnapshot(snap => {
                const container = document.getElementById('lista-orcamentos');
                container.innerHTML = '';
                snap.forEach(doc => {
                    const o = doc.data();
                    container.innerHTML += `
                        <div class="card">
                            <div class="flex justify-between mb-3"><b>${o.nome}</b><span class="text-indigo-400 font-bold">R$ ${o.valor.toFixed(2)}</span></div>
                            <div class="grid grid-cols-2 gap-2">
                                <button onclick="mandarOrcamento('${o.whatsapp}', '${o.valor}', '${o.detalhes}')" class="bg-green-600 text-white py-3 rounded-xl text-[10px] font-bold border-none uppercase">ENVIAR</button>
                                <button onclick="fecharVenda('${doc.id}')" class="bg-indigo-600 text-white py-3 rounded-xl text-[10px] font-bold border-none uppercase">FECHAR</button>
                            </div>
                        </div>`;
                });
            });
        }

        // --- AÇÕES ---
        window.mandarCobranca = (tel, val) => {
            const msg = `Olá! Segue lembrete de pagamento no valor de R$ ${val}.%0AChave PIX: ${userConfig.pix}`;
            window.open(`https://wa.me/55${tel.replace(/\D/g, '')}?text=${msg}`);
        };

        window.marcarPago = (id) => { if(confirm("Confirmar recebimento?")) db.collection("vendas").doc(id).update({pago: true}); };

        window.mandarOrcamento = (tel, val, det) => {
            const msg = `*ORÇAMENTO - ${userConfig.nome}*%0A---%0A*Serviço:* ${det}%0A*Total:* R$ ${val}`;
            window.open(`https://wa.me/55${tel.replace(/\D/g, '')}?text=${msg}`);
        };

        window.fecharVenda = async (id) => {
            const doc = await db.collection("orcamentos").doc(id).get();
            const d = doc.data();
            await db.collection("vendas").add({ ...d, pago: false, data: new Date().toISOString().split('T')[0] });
            await db.collection("orcamentos").doc(id).delete();
            openTab('dashboard');
        };

        document.getElementById('btnSalvarVenda').onclick = async () => {
            const n = document.getElementById('v-nome').value;
            const v = parseFloat(document.getElementById('vendaValor').value) || parseFloat(document.getElementById('v-valor').value);
            const d = document.getElementById('v-data').value;
            if(!n || !v || !d) return alert("Preencha tudo!");
            await db.collection("vendas").add({ uid: auth.currentUser.uid, nome: n, whatsapp: document.getElementById('v-whats').value, valor: v, data: d, pago: false });
            alert("Salvo!");
            openTab('dashboard');
        };

        document.getElementById('btnSalvarOrc').onclick = async () => {
            await db.collection("orcamentos").add({ uid: auth.currentUser.uid, nome: document.getElementById('o-nome').value, whatsapp: document.getElementById('o-whats').value, detalhes: document.getElementById('o-detalhes').value, valor: parseFloat(document.getElementById('o-valor').value) });
            alert("Orçamento Gravado!");
            openTab('orcamentos');
        };

        document.getElementById('btnSalvarConfig').onclick = async () => {
            await db.collection("configuracoes").doc(auth.currentUser.uid).set({ nome: document.getElementById('c-empresa').value, pix: document.getElementById('c-pix').value });
            alert("Perfil Atualizado!");
            location.reload();
        };
    </script>
</body>
</html>
