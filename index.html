<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZapCaderno Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { color-scheme: dark; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #0a0a0a; color: #ffffff; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* Navegação inferior robusta */
        .nav-bar { position: fixed; bottom: 20px; left: 15px; right: 15px; height: 75px; background: #161616; border-radius: 30px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 15px 35px rgba(0,0,0,0.9); z-index: 1000; border: 1px solid #222; }
        .btn-plus { background: #4f46e5; color: white; width: 65px; height: 65px; border-radius: 22px; display: flex; align-items: center; justify-content: center; margin-top: -45px; border: 4px solid #0a0a0a; font-size: 26px; box-shadow: 0 10px 20px rgba(79, 70, 229, 0.4); }
        .nav-btn { color: #444; font-size: 24px; background: none; border: none; transition: 0.3s; }
        .nav-btn.active { color: #818cf8; }

        /* Estilo de Inputs */
        .card { background: #161616; border-radius: 24px; padding: 22px; margin-bottom: 15px; border: 1px solid #222; }
        input, textarea { background: #1f1f1f !important; border: 1px solid #333 !important; border-radius: 14px !important; padding: 16px !important; width: 100%; margin-bottom: 12px; color: #fff !important; font-size: 16px; outline: none; transition: 0.2s; }
        input:focus { border-color: #4f46e5 !important; }
        
        input[type="date"] {
            min-height: 55px;
            position: relative;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="%23818cf8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>');
            background-repeat: no-repeat;
            background-position: right 15px center;
            padding-right: 45px !important;
        }

        #telaLogin { position: fixed; inset: 0; background: #0a0a0a; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
    </style>
</head>
<body class="pb-36">

    <div id="telaLogin" style="display: none;">
        <div class="text-center mb-8">
            <h2 class="text-4xl font-black text-indigo-500 tracking-tighter italic">ZAPCADERNO</h2>
            <p class="text-gray-500 text-sm">Sua caderneta profissional</p>
        </div>
        <input type="email" id="logEmail" placeholder="E-mail">
        <input type="password" id="logSenha" placeholder="Senha">
        <button id="btnEntrar" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-bold border-none shadow-xl">ENTRAR</button>
    </div>

    <header class="p-6 flex justify-between items-start">
        <div>
            <h1 id="headerNome" class="text-xl font-bold text-white uppercase tracking-tight">CARREGANDO...</h1>
            <div class="flex items-center gap-2 mt-1">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <p id="headerPix" class="text-[10px] text-gray-500 font-mono">PIX: ---</p>
            </div>
        </div>
        <button onclick="location.reload()" class="bg-gray-900 p-3 rounded-full text-gray-400 border-none"><i class="fas fa-redo-alt"></i></button>
    </header>

    <main class="p-4">
        <div id="dashboard" class="tab-content active">
            <div class="card bg-gradient-to-br from-gray-900 to-black border-indigo-900/30">
                <p class="text-[11px] text-indigo-400 font-bold uppercase mb-1">Total a Receber</p>
                <p id="totalReceber" class="text-4xl font-bold">R$ 0,00</p>
            </div>
            <div id="listaDividas" class="space-y-3 mt-6"></div>
        </div>

        <div id="orcamentos" class="tab-content">
            <div class="card">
                <h3 class="text-indigo-400 text-xs font-bold mb-4 uppercase">Nova Proposta</h3>
                <input type="text" id="propNome" placeholder="Nome do Cliente">
                <input type="text" id="propWhatsapp" placeholder="WhatsApp">
                <textarea id="propDetalhes" placeholder="O que será feito?" rows="2"></textarea>
                <div class="grid grid-cols-2 gap-3">
                    <input type="number" id="propMat" placeholder="Material R$">
                    <input type="number" id="propMao" placeholder="Mão de Obra R$">
                </div>
                <button id="btnGerarOrcamento" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold">SALVAR ORÇAMENTO</button>
            </div>
            <div id="listaOrcamentos"></div>
        </div>

        <div id="novo" class="tab-content">
            <div class="card">
                <h3 class="text-indigo-400 text-xs font-bold mb-4 uppercase text-center">Registrar Venda</h3>
                <input type="text" id="vendaNome" placeholder="Nome do Cliente">
                <input type="text" id="vendaWhatsapp" placeholder="WhatsApp">
                <input type="text" id="vendaProduto" placeholder="Produto ou Serviço">
                <input type="number" id="vendaValor" placeholder="Valor total R$">
                <label class="text-[10px] text-gray-500 font-bold uppercase ml-1">Data que o cliente vai pagar:</label>
                <input type="date" id="vendaDataPagar">
                <button id="btnSalvarVendaRapida" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold mt-2">CONFIRMAR E SALVAR</button>
            </div>
        </div>

        <div id="config" class="tab-content">
            <div class="card">
                <h3 class="text-xs font-bold mb-4 uppercase">Perfil</h3>
                <input type="text" id="confNome" placeholder="Nome da Empresa">
                <input type="text" id="confPix" placeholder="Chave PIX">
                <button id="btnSalvarConfig" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold">SALVAR PERFIL</button>
                <button id="btnLogout" class="w-full mt-4 text-gray-600 text-sm">Sair da Conta</button>
            </div>
        </div>
    </main>

    <nav class="nav-bar">
        <button onclick="openTab('dashboard')" id="tabDash" class="nav-btn active"><i class="fas fa-wallet"></i></button>
        <button onclick="openTab('orcamentos')" id="tabOrc" class="nav-btn"><i class="fas fa-file-signature"></i></button>
        <button onclick="openTab('novo')" class="btn-plus"><i class="fas fa-plus"></i></button>
        <button onclick="openTab('config')" id="tabConf" class="nav-btn"><i class="fas fa-store"></i></button>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyASmjopW-EUIpZUsVFESFwMvpUZTMcdvMU",
            authDomain: "zapcaderno.firebaseapp.com",
            projectId: "zapcaderno",
            storageBucket: "zapcaderno.firebasestorage.app",
            messagingSenderId: "446641643061",
            appId: "1:446641643061:web:daf768922b53614f229b7c"
        };

        // Inicialização Compatível
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let configUser = { nome: "ZAPCADERNO", pix: "" };

        // Troca de abas
        window.openTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if(id === 'dashboard') document.getElementById('tabDash').classList.add('active');
            if(id === 'orcamentos') document.getElementById('tabOrc').classList.add('active');
            if(id === 'config') document.getElementById('tabConf').classList.add('active');
        };

        // Monitor de Login
        auth.onAuthStateChanged(async (user) => {
            if (user) {
                document.getElementById('telaLogin').style.display = 'none';
                const s = await db.collection("configuracoes").doc(user.uid).get();
                if (s.exists()) {
                    configUser = s.data();
                    document.getElementById('headerNome').innerText = configUser.nome;
                    document.getElementById('headerPix').innerText = "PIX: " + configUser.pix;
                }
                initApp(user.uid);
            } else {
                document.getElementById('telaLogin').style.display = 'flex';
            }
        });

        document.getElementById('btnEntrar').onclick = () => {
            const e = document.getElementById('logEmail').value;
            const p = document.getElementById('logSenha').value;
            auth.signInWithEmailAndPassword(e, p).catch(() => alert("Erro ao entrar!"));
        };

        document.getElementById('btnLogout').onclick = () => { auth.signOut(); };

        function initApp(uid) {
            // Monitorar Vendas
            db.collection("vendas").where("uid", "==", uid).onSnapshot(snap => {
                let total = 0;
                const div = document.getElementById('listaDividas');
                div.innerHTML = '';
                snap.forEach(s => {
                    const d = s.data();
                    if(!d.pago) {
                        total += d.valor;
                        div.innerHTML += `
                            <div class="card flex justify-between items-center border-l-4 border-indigo-600">
                                <div><b>${d.nome}</b><br><small class="text-gray-500">${d.dataPagar}</small></div>
                                <div class="flex gap-2">
                                    <button onclick="fazerCobranca('${d.whatsapp}', '${d.valor}')" class="bg-green-600 p-3 rounded-xl border-none"><i class="fab fa-whatsapp"></i></button>
                                    <button onclick="marcarPago('${s.id}')" class="bg-indigo-600 p-2 rounded-xl text-xs font-bold">RECEBI</button>
                                </div>
                            </div>`;
                    }
                });
                document.getElementById('totalReceber').innerText = "R$ " + total.toLocaleString('pt-BR');
            });

            // Monitorar Orçamentos
            db.collection("orcamentos").where("uid", "==", uid).onSnapshot(snap => {
                const div = document.getElementById('listaOrcamentos');
                div.innerHTML = '';
                snap.forEach(s => {
                    const o = s.data();
                    div.innerHTML += `
                        <div class="card">
                            <div class="flex justify-between mb-2"><b>${o.nome}</b><b>R$ ${o.valor}</b></div>
                            <div class="grid grid-cols-2 gap-2">
                                <button onclick="mandarProposta('${o.whatsapp}', '${o.valor}', '${o.detalhes}')" class="bg-green-600 py-2 rounded-xl text-xs font-bold uppercase">Enviar</button>
                                <button onclick="aprovarOrcamento('${s.id}')" class="bg-indigo-600 py-2 rounded-xl text-xs font-bold uppercase">Fechar</button>
                            </div>
                        </div>`;
                });
            });
        }

        window.fazerCobranca = (tel, val) => window.open(`https://wa.me/55${tel.replace(/\D/g,'')}?text=Lembrete de R$ ${val}. PIX: ${configUser.pix}`);
        window.marcarPago = (id) => db.collection("vendas").doc(id).update({pago: true});
        window.mandarProposta = (tel, val, det) => window.open(`https://wa.me/55${tel.replace(/\D/g,'')}?text=*ORÇAMENTO*%0A${det}%0A*Total:* R$ ${val}`);

        window.aprovarOrcamento = async (id) => {
            const s = await db.collection("orcamentos").doc(id).get();
            await db.collection("vendas").add({...s.data(), pago: false, dataPagar: new Date().toLocaleDateString()});
            await db.collection("orcamentos").doc(id).delete();
            openTab('dashboard');
        };

        document.getElementById('btnSalvarVendaRapida').onclick = async () => {
            await db.collection("vendas").add({
                uid: auth.currentUser.uid,
                nome: document.getElementById('vendaNome').value,
                whatsapp: document.getElementById('vendaWhatsapp').value,
                valor: parseFloat(document.getElementById('vendaValor').value),
                dataPagar: document.getElementById('vendaDataPagar').value,
                pago: false
            });
            openTab('dashboard');
        };

        document.getElementById('btnSalvarConfig').onclick = async () => {
            await db.collection("configuracoes").doc(auth.currentUser.uid).set({
                nome: document.getElementById('confNome').value,
                pix: document.getElementById('confPix').value
            });
            location.reload();
        };

        document.getElementById('btnGerarOrcamento').onclick = async () => {
            const v = (parseFloat(document.getElementById('propMat').value) || 0) + (parseFloat(document.getElementById('propMao').value) || 0);
            await db.collection("orcamentos").add({
                uid: auth.currentUser.uid,
                nome: document.getElementById('propNome').value,
                whatsapp: document.getElementById('propWhatsapp').value,
                detalhes: document.getElementById('propDetalhes').value,
                valor: v
            });
            openTab('orcamentos');
        };
    </script>
</body>
</html>
