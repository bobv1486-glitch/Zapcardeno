<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZapCaderno Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: white; margin: 0; padding-bottom: 110px; overflow-x: hidden; }
        .tab-content { display: none; padding: 20px; }
        .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: var(--card); border-radius: 20px; padding: 18px; border: 1px solid #334155; margin-bottom: 12px; }
        .nav-bar { position: fixed; bottom: 15px; left: 15px; right: 15px; height: 75px; background: #1e293b; border-radius: 25px; display: flex; justify-content: space-around; align-items: center; border: 1px solid #334155; z-index: 1000; }
        .btn-plus { background: var(--primary); color: white; width: 55px; height: 55px; border-radius: 18px; display: flex; align-items: center; justify-content: center; margin-top: -45px; border: none; cursor: pointer; }
        input, textarea { background: #0f172a; border: 1px solid #334155; width: 100%; padding: 14px; border-radius: 14px; margin-bottom: 10px; color: white; font-size: 16px; }
        input:focus, textarea:focus { outline: none; border-color: var(--primary); }
        #overlay { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
        button { cursor: pointer; transition: all 0.2s ease; }
        button:active { transform: scale(0.98); }
        .btn-cobrar { background: #10b981; }
        .btn-cobrar:hover { background: #059669; }
        .btn-pago { background: #475569; }
        .btn-pago:hover { background: #334155; }
        .btn-excluir { background: #991b1b; }
        .btn-excluir:hover { background: #7f1d1d; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 class="text-3xl font-black mb-6 italic text-indigo-400">ZAPCADERNO</h1>
        <input type="email" id="l-email" placeholder="E-mail">
        <input type="password" id="l-senha" placeholder="Senha">
        <button id="btnEntrar" class="w-full bg-indigo-600 py-4 rounded-xl font-bold mb-3">ENTRAR</button>
        <button id="btnCadastrar" class="text-indigo-400 text-sm font-bold bg-transparent border-none">CRIAR NOVA CONTA</button>
    </div>

    <header class="bg-indigo-600 p-6 pb-16 rounded-b-[40px] flex justify-between items-center">
        <div>
            <h1 id="header-loja" class="text-xl font-bold uppercase">MEU CADERNO</h1>
            <p class="text-[10px] opacity-60 uppercase font-bold tracking-widest"><i class="fas fa-circle text-green-400"></i> Online</p>
        </div>
        <button onclick="abrir('config')" class="bg-white bg-opacity-10 w-10 h-10 rounded-full border-none text-white"><i class="fas fa-cog"></i></button>
    </header>

    <main class="-mt-10">
        <section id="dashboard" class="tab-content active">
            <div class="card bg-gradient-to-br from-indigo-900 to-black border-none p-6 mb-6">
                <span class="text-[10px] font-bold opacity-50 uppercase">Total Fiado</span>
                <h2 id="total-txt" class="text-4xl font-black">R$ 0,00</h2>
            </div>
            <div id="lista-vendas" class="space-y-3"></div>
        </section>

        <section id="historico" class="tab-content">
            <h2 class="text-lg font-bold mb-4">Pagamentos Recebidos</h2>
            <div id="lista-pagos" class="space-y-3 opacity-60"></div>
        </section>

        <section id="novo" class="tab-content">
            <div class="card">
                <h2 class="text-lg font-bold mb-6 text-center text-indigo-400 uppercase">Novo Registro</h2>
                <input type="text" id="v-nome" placeholder="Nome do Cliente">
                <input type="tel" id="v-whats" placeholder="WhatsApp (ex: 11999999999)">
                <input type="text" id="v-item" placeholder="O que vendeu?">
                <input type="number" id="v-valor" placeholder="Valor R$">
                <button id="btnSalvar" class="w-full bg-indigo-600 py-4 rounded-xl font-bold mt-2">SALVAR AGORA</button>
            </div>
        </section>

        <section id="orcamentos" class="tab-content">
            <div class="card">
                <h2 class="text-lg font-bold mb-4 uppercase">Novo Orçamento</h2>
                <input type="text" id="o-nome" placeholder="Cliente">
                <input type="tel" id="o-whats" placeholder="WhatsApp (ex: 11999999999)">
                <textarea id="o-desc" rows="3" placeholder="Descrição do serviço..."></textarea>
                <input type="number" id="o-total" placeholder="Total R$">
                <button id="btnSalvarOrc" class="w-full bg-indigo-600 py-4 rounded-xl font-bold">REGISTRAR ORÇAMENTO</button>
            </div>
            <div id="lista-orc" class="mt-4"></div>
        </section>

        <section id="config" class="tab-content">
            <div class="card">
                <h2 class="text-lg font-bold mb-4">Meu Perfil</h2>
                <input type="text" id="c-loja" placeholder="Nome da Loja">
                <input type="text" id="c-pix" placeholder="Chave PIX">
                <button id="btnConfig" class="w-full bg-indigo-600 py-4 rounded-xl font-bold">SALVAR DADOS</button>
                <button id="btnSair" class="w-full mt-10 text-red-400 font-bold bg-transparent">Sair da Conta</button>
            </div>
        </section>
    </main>

    <nav class="nav-bar">
        <button onclick="abrir('dashboard')" id="btn-dashboard" class="bg-transparent border-none text-indigo-400"><i class="fas fa-book text-xl"></i></button>
        <button onclick="abrir('historico')" id="btn-historico" class="bg-transparent border-none text-gray-500"><i class="fas fa-history text-xl"></i></button>
        <button onclick="abrir('novo')" class="btn-plus"><i class="fas fa-plus text-xl"></i></button>
        <button onclick="abrir('orcamentos')" id="btn-orcamentos" class="bg-transparent border-none text-gray-500"><i class="fas fa-file-invoice text-xl"></i></button>
        <button onclick="abrir('config')" id="btn-config" class="bg-transparent border-none text-gray-500"><i class="fas fa-user-cog text-xl"></i></button>
    </nav>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyASmjopW-EUIpZUsVFESFwMvpUZTMcdvMU",
            authDomain: "zapcaderno.firebaseapp.com",
            projectId: "zapcaderno",
            storageBucket: "zapcaderno.firebasestorage.app",
            messagingSenderId: "446641643061",
            appId: "1:446641643061:web:daf768922b53614f229b7c"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        let configLoja = { loja: "ZAPCADERNO", pix: "" };

        function abrir(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-bar button').forEach(b => {
                if(!b.classList.contains('btn-plus')) b.classList.replace('text-indigo-400', 'text-gray-500');
            });
            const btnCorrespondente = document.getElementById('btn-'+id);
            if(btnCorrespondente && !btnCorrespondente.classList.contains('btn-plus')) {
                btnCorrespondente.classList.replace('text-gray-500', 'text-indigo-400');
            }
        }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('overlay').style.display = 'none';
                iniciarApp(user.uid);
            } else {
                document.getElementById('overlay').style.display = 'flex';
            }
        });

        function iniciarApp(uid) {
            // Sincronizar Configurações
            db.collection("configuracoes").doc(uid).onSnapshot(doc => {
                if(doc.exists) {
                    configLoja = doc.data();
                    document.getElementById('header-loja').innerText = configLoja.loja || "ZAPCADERNO";
                    document.getElementById('c-loja').value = configLoja.loja || "";
                    document.getElementById('c-pix').value = configLoja.pix || "";
                }
            });

            // Sincronizar Vendas
            db.collection("vendas").where("uid", "==", uid).onSnapshot(snap => {
                const listV = document.getElementById('lista-vendas');
                const listP = document.getElementById('lista-pagos');
                let total = 0;
                listV.innerHTML = ''; 
                listP.innerHTML = '';

                const docs = [];
                snap.forEach(d => docs.push({id: d.id, ...d.data()}));
                docs.sort((a,b) => b.data - a.data);

                docs.forEach(v => {
                    const val = parseFloat(v.valor || 0);
                    if(!v.pago) {
                        total += val;
                        listV.innerHTML += `
                        <div class="card">
                            <div class="flex justify-between items-center">
                                <div>
                                    <b class="text-lg">${v.nome}</b>
                                    <p class="text-xs opacity-40 mt-1">${v.item || 'Sem descrição'}</p>
                                    ${v.whatsapp ? `<p class="text-xs opacity-40 mt-1"><i class="fab fa-whatsapp"></i> ${v.whatsapp}</p>` : ''}
                                </div>
                                <b class="text-indigo-400 text-xl">R$ ${val.toFixed(2)}</b>
                            </div>
                            <div class="flex gap-2 mt-4">
                                <button onclick="cobrar('${v.whatsapp || ''}', ${val}, '${v.nome.replace(/'/g, "\\'")}')" class="flex-1 bg-green-600 p-2 rounded-xl font-bold border-none text-white hover:bg-green-700">COBRAR</button>
                                <button onclick="baixar('${v.id}', true)" class="flex-1 bg-gray-700 p-2 rounded-xl font-bold border-none text-white hover:bg-gray-600">PAGO</button>
                                <button onclick="excluir('vendas','${v.id}')" class="bg-red-900 px-3 rounded-xl border-none text-white hover:bg-red-800"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>`;
                    } else {
                        listP.innerHTML += `
                        <div class="card flex justify-between items-center">
                            <div>
                                <b>${v.nome}</b>
                                ${v.item ? `<p class="text-xs opacity-40">${v.item}</p>` : ''}
                            </div>
                            <b class="text-green-400">R$ ${val.toFixed(2)}</b>
                        </div>`;
                    }
                });
                document.getElementById('total-txt').innerHTML = total.toLocaleString('pt-br',{style:'currency', currency:'BRL'});
                
                if(docs.filter(v => !v.pago).length === 0) {
                    listV.innerHTML = '<div class="card text-center opacity-50">Nenhuma venda pendente ✨</div>';
                }
                if(docs.filter(v => v.pago).length === 0) {
                    listP.innerHTML = '<div class="card text-center opacity-50">Nenhum pagamento registrado 📝</div>';
                }
            });

            // Sincronizar Orçamentos
            db.collection("orcamentos").where("uid", "==", uid).onSnapshot(snap => {
                const listO = document.getElementById('lista-orc');
                listO.innerHTML = '';
                const docs = [];
                snap.forEach(doc => docs.push({id: doc.id, ...doc.data()}));
                docs.sort((a,b) => b.data - a.data);
                
                if(docs.length === 0) {
                    listO.innerHTML = '<div class="card text-center opacity-50">Nenhum orçamento cadastrado 📄</div>';
                    return;
                }
                
                docs.forEach(o => {
                    const val = parseFloat(o.valor || 0);
                    listO.innerHTML += `
                    <div class="card">
                        <div class="flex justify-between items-start mb-3">
                            <div class="flex-1">
                                <b class="text-lg">${o.nome}</b>
                                ${o.whats ? `<p class="text-xs opacity-50 mt-1"><i class="fab fa-whatsapp"></i> ${o.whats}</p>` : ''}
                                <p class="text-sm mt-2 opacity-70">${o.detalhes || 'Sem descrição'}</p>
                            </div>
                            <b class="text-indigo-400 text-xl ml-3">R$ ${val.toFixed(2)}</b>
                        </div>
                        <div class="flex gap-2 mt-2">
                            <button onclick="cobrarOrc('${o.whats || ''}', ${val}, '${o.nome.replace(/'/g, "\\'")}')" class="flex-1 bg-green-600 p-2 rounded-xl font-bold border-none text-white hover:bg-green-700">COBRAR</button>
                            <button onclick="excluir('orcamentos','${o.id}')" class="bg-red-900 px-3 rounded-xl border-none text-white hover:bg-red-800"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>`;
                });
            });
        }

        // Salvar nova venda
        document.getElementById('btnSalvar').onclick = async () => {
            const nome = document.getElementById('v-nome').value;
            const valor = parseFloat(document.getElementById('v-valor').value);
            
            if(!nome || isNaN(valor) || valor <= 0) {
                alert("Preencha Nome e Valor válido!");
                return;
            }
            
            const venda = {
                uid: auth.currentUser.uid,
                nome: nome,
                whatsapp: document.getElementById('v-whats').value,
                item: document.getElementById('v-item').value,
                valor: valor,
                pago: false,
                data: new Date().getTime()
            };
            
            await db.collection("vendas").add(venda);
            alert("✅ Venda salva com sucesso!");
            document.getElementById('v-nome').value = '';
            document.getElementById('v-whats').value = '';
            document.getElementById('v-item').value = '';
            document.getElementById('v-valor').value = '';
            abrir('dashboard');
        };

        // Salvar orçamento
        document.getElementById('btnSalvarOrc').onclick = async () => {
            const nome = document.getElementById('o-nome').value;
            const valor = parseFloat(document.getElementById('o-total').value);
            
            if(!nome || isNaN(valor) || valor <= 0) {
                alert("Preencha Nome e Valor válido!");
                return;
            }
            
            const orcamento = {
                uid: auth.currentUser.uid,
                nome: nome,
                whats: document.getElementById('o-whats').value,
                detalhes: document.getElementById('o-desc').value,
                valor: valor,
                data: new Date().getTime()
            };
            
            await db.collection("orcamentos").add(orcamento);
            alert("✅ Orçamento salvo com sucesso!");
            document.getElementById('o-nome').value = '';
            document.getElementById('o-whats').value = '';
            document.getElementById('o-desc').value = '';
            document.getElementById('o-total').value = '';
            abrir('orcamentos');
        };

        // Funções globais
        window.cobrar = (tel, val, nome) => {
            if(!tel) {
                alert("⚠️ Cliente não tem WhatsApp cadastrado!");
                return;
            }
            const mensagem = `Olá ${nome}, lembrete da loja ${configLoja.loja || 'ZAPCADERNO'}. Valor pendente: R$ ${val.toFixed(2)}. Chave Pix: ${configLoja.pix || 'não cadastrada'}`;
            const numero = tel.replace(/\D/g,'');
            window.open(`https://wa.me/55${numero}?text=${encodeURIComponent(mensagem)}`, '_blank');
        };
        
        window.cobrarOrc = (tel, val, nome) => {
            if(!tel) {
                alert("⚠️ Cliente não tem WhatsApp cadastrado!");
                return;
            }
            const mensagem = `Olá ${nome}, conforme nosso orçamento, o valor ficou em R$ ${val.toFixed(2)}. Chave Pix: ${configLoja.pix || 'não cadastrada'}`;
            const numero = tel.replace(/\D/g,'');
            window.open(`https://wa.me/55${numero}?text=${encodeURIComponent(mensagem)}`, '_blank');
        };

        window.baixar = async (id, pago) => {
            await db.collection("vendas").doc(id).update({pago: pago});
            alert("✅ Registro marcado como pago!");
        };
        
        window.excluir = async (colecao, id) => {
            if(confirm("⚠️ Tem certeza que deseja excluir永久emente este registro?")) {
                await db.collection(colecao).doc(id).delete();
                alert("🗑️ Registro excluído com sucesso!");
            }
        };

        // Configurações
        document.getElementById('btnConfig').onclick = async () => {
            const loja = document.getElementById('c-loja').value.toUpperCase();
            const pix = document.getElementById('c-pix').value;
            
            if(!loja) {
                alert("Digite o nome da sua loja!");
                return;
            }
            
            await db.collection("configuracoes").doc(auth.currentUser.uid).set({
                loja: loja,
                pix: pix
            });
            alert("✅ Perfil atualizado com sucesso!");
        };
        
        document.getElementById('btnSair').onclick = () => {
            auth.signOut();
            alert("👋 Você saiu da conta");
        };

        // Autenticação
        document.getElementById('btnEntrar').onclick = async () => {
            const email = document.getElementById('l-email').value;
            const senha = document.getElementById('l-senha').value;
            
            if(!email || !senha) {
                alert("Preencha e-mail e senha!");
                return;
            }
            
            try {
                await auth.signInWithEmailAndPassword(email, senha);
                alert("✅ Login realizado com sucesso!");
            } catch(e) {
                alert("❌ Erro ao entrar: " + (e.message.includes('user-not-found') ? 'Usuário não encontrado' : 'Senha incorreta'));
            }
        };

        document.getElementById('btnCadastrar').onclick = async () => {
            const email = document.getElementById('l-email').value;
            const senha = document.getElementById('l-senha').value;
            
            if(!email || !senha || senha.length < 6) {
                alert("Preencha e-mail e senha (mínimo 6 caracteres)!");
                return;
            }
            
            try {
                const cred = await auth.createUserWithEmailAndPassword(email, senha);
                await db.collection("configuracoes").doc(cred.user.uid).set({ 
                    loja: "MINHA LOJA", 
                    pix: "" 
                });
                alert("✅ Conta criada com sucesso!");
            } catch(e) {
                alert("❌ Erro ao criar conta: " + (e.message.includes('email-already') ? 'E-mail já cadastrado' : e.message));
            }
        };
    </script>
</body>
</html>
