        #telaLogin { position: fixed; inset: 0; background: white; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .dark-mode #telaLogin { background: #0f172a; }
    </style>
</head>

    </div>

    <main class="p-4">

        <div id="novaVenda" class="tab-content">

                <input type="text" id="cliente" placeholder="Nome do Cliente" class="w-full p-3 border rounded-lg mb-3 dark:bg-gray-700">
                <input type="text" id="valor" placeholder="Valor (Ex: 50,00)" class="w-full p-3 border rounded-lg mb-4 dark:bg-gray-700">
                <button onclick="salvarNoFirebase()" class="w-full bg-indigo-600 text-white p-4 rounded-xl font-bold">SALVAR</button>
            </div>
        </div>
    </main>

        <button onclick="mudarAba('novaVenda')" class="btn-plus"><i class="fas fa-plus text-xl"></i></button>
        <button onclick="logout()" class="text-gray-400"><i class="fas fa-sign-out-alt text-xl"></i></button>
