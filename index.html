<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZapCaderno Ultra Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8fafc; color: #1e293b; transition: 0.3s; -webkit-tap-highlight-color: transparent; }
        .dark-mode { background-color: #0f172a; color: #f1f5f9; }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        #telaLogin { position: fixed; inset: 0; background: white; z-index: 99999; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px; text-align: center; }
        .nav-bar { position: fixed; bottom: 20px; left: 15px; right: 15px; height: 75px; background: white; border-radius: 25px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 100; }
        .btn-plus { background: #4f46e5; color: white; width: 55px; height: 55px; border-radius: 18px; display: flex; align-items: center; justify-content: center; margin-top: -45px; box-shadow: 0 8px 20px rgba(79, 70, 229, 0.4); border: none; }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 15px; }
        .progress-bar { height: 10px; border-radius: 5px; background: #e2e8f0; overflow: hidden; margin: 10px 0; }
        .progress-fill { height: 100%; background: #4f46e5; width: 0%; transition: 0.8s ease-in-out; }
    </style>
</head>
<body class="pb-32">

    <div id="telaLogin">
        <i class="fas fa-wallet text-5xl text-indigo-600 mb-6"></i>
        <h1 class="text-2xl font-bold mb-6">ZapCaderno Pro</h1>
        <input type="email" id="logEmail" placeholder="E-mail" class="w-full p-4 border rounded-xl mb-3">
        <input type="password" id="logSenha" placeholder="Senha" class="w-full p-4 border rounded-xl mb-4">
        <button onclick="fazerLogin()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-xl">ENTRAR</button>
    </div>

    <header class="bg-indigo-600 text-white p-6 pb-12 rounded-b-[40px] shadow-lg">
        <div class="flex justify-between items-center">
            <div>
                <h1 id="nomeLojaExibicao" class="text-xl font-bold uppercase">Minha Loja</h1>
                <span class="text-[10px] bg-green-500 px-2 py-0.5 rounded-full font-bold">ONLINE</span>
            </div>
            <button onclick="document.body.classList.toggle('dark-mode')" class="text-white opacity-80"><i class="fas fa-moon"></i></button>
        </div>
    </header>

    <main class="p-4 -mt-8">
        <section id="dashboard" class="tab-content active">
            <div class="card">
                <div class="flex justify-between items-end mb-2">
                    <div>
                        <p class="text-[10px] font-bold text-indigo-500">TOTAL A RECEBER</p>
                        <p id="totalReceber" class="text-3xl font-black">R$ 0,00</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] font-bold text-green-500">RECEBIDO</p>
                        <p id="totalHistorico" class="text-lg font-bold text-green-600">R$ 0,00</p>
                    </div>
                </div>
                <div class="progress-bar"><div id="progressoVendas" class="progress-fill"></div></div>
            </div>
            <div id="listaDividas" class="space-y-4"></div>
        </section>

        <section id="novo" class="tab-content">
            <div class="card">
                <h2 class="text-lg font-bold mb-6">Nova Venda</h2>
                <div class="space-y-4">
                    <input type="text" id="nome" placeholder="Nome do Cliente" class="w-full p-4 border rounded-xl">
                    <input type="tel" id="whatsapp" placeholder="WhatsApp (DDD+Número)" class="w-full p-4 border rounded-xl">
                    <input type="text" id="produto" placeholder="Produto" class="w-full p-4 border rounded-xl">
                    <input type="number" id="valor" placeholder="Valor (Ex: 50.00)" class="w-full p-4 border rounded-xl text-indigo-600 font-bold">
                    <button onclick="salvarVenda()" class="w-full bg-indigo-600 text-white font-bold py-5 rounded-2xl shadow-lg">SALVAR NO FIREBASE</button>
                </div>
            </div>
        </section>
    </main>

    <nav class="nav-bar">
        <button onclick="showTab('dashboard')" class="text-indigo-600"><i class="fas fa-home text-xl"></i></button>
        <button onclick="showTab('novo')" class="btn-plus"><i class="fas fa-plus text-xl"></i></button>
        <button onclick="logout()" class="text-gray-400"><i class="fas fa-sign-out-alt text-xl"></i></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyASmjopW-EUIpZUsVFESFwMvpUZTMcdvMU",
            authDomain: "zapcaderno.firebaseapp.com",
            projectId: "zapcaderno",
            storageBucket: "zapcaderno.firebasestorage.app",
            messagingSenderId: "446641643061",
            appId: "1:446641643061:web:daf768922b53614f229b7c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.fazerLogin = () => {
            const e = document.getElementById('logEmail').value;
            const s = document.getElementById('logSenha').value;
            signInWithEmailAndPassword(auth, e, s).catch(err => alert("Erro: " + err.message));
        };

        window.logout = () => signOut(auth);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('telaLogin').style.display = 'none';
                carregarDados(user.uid);
            } else {
                document.getElementById('telaLogin').style.display = 'flex';
            }
        });

        window.salvarVenda = async () => {
            const nome = document.getElementById('nome').value;
            const valor = document.getElementById('valor').value;
            if(!nome || !valor) return alert("Preencha os campos!");

            await addDoc(collection(db, "vendas"), {
                uid: auth.currentUser.uid,
                nome: nome,
                whatsapp: document.getElementById('whatsapp').value,
                produto: document.getElementById('produto').value,
                valor: parseFloat(valor),
                pago: false
            });
            alert("Venda Salva!");
            showTab('dashboard');
        };

        function carregarDados(uid) {
            const q = query(collection(db, "vendas"), where("uid", "==", uid));
            onSnapshot(q, (snap) => {
                const lista = document.getElementById('listaDividas');
                let total = 0; let recebido = 0;
                lista.innerHTML = '';
                snap.forEach(v => {
                    const d = v.data();
                    if(d.pago) recebido += d.valor;
                    else {
                        total += d.valor;
                        lista.innerHTML += `
                        <div class="card border-l-4 border-indigo-500">
                            <div class="flex justify-between">
                                <b>${d.nome}</b>
                                <span class="text-red-500 font-bold">R$ ${d.valor.toFixed(2)}</span>
                            </div>
                            <button onclick="baixar('${v.id}')" class="w-full bg-green-500 text-white py-2 rounded-lg mt-3 text-xs font-bold">RECEBI</button>
                        </div>`;
                    }
                });
                document.getElementById('totalReceber').innerText = `R$ ${total.toFixed(2)}`;
                document.getElementById('totalHistorico').innerText = `R$ ${recebido.toFixed(2)}`;
                const perc = (recebido / (total + recebido)) * 100 || 0;
                document.getElementById('progressoVendas').style.width = perc + "%";
            });
        }

        window.baixar = (id) => updateDoc(doc(db, "vendas", id), { pago: true });

        window.showTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        };
    </script>
</body>
</html>
