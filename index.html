<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZapCaderno Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; -webkit-tap-highlight-color: transparent; }
        .dark-mode { background-color: #0f172a; color: #f1f5f9; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        #telaLogin { position: fixed; inset: 0; background: white; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .nav-bar { position: fixed; bottom: 20px; left: 15px; right: 15px; height: 70px; background: white; border-radius: 20px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 100; }
        .dark-mode .nav-bar { background: #1e293b; }

        .btn-plus { background: #4f46e5; color: white; width: 55px; height: 55px; border-radius: 15px; display: flex; align-items: center; justify-content: center; margin-top: -40px; box-shadow: 0 5px 15px rgba(79, 70, 229, 0.4); border: none; }
        
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 10px; border: 1px solid #e2e8f0; }
        .dark-mode .card { background: #1e293b; border-color: #334155; }
        
        input { border: 1px solid #cbd5e1 !important; border-radius: 10px !important; padding: 12px !important; width: 100%; margin-bottom: 10px; background: #fff; color: #000; }
        .dark-mode input { background: #0f172a; color: #fff; border-color: #475569 !important; }
        
        .nav-btn { color: #94a3b8; font-size: 24px; background: none; border: none; cursor: pointer; }
        .nav-btn.active { color: #4f46e5; }

        /* Estilo para os botões de modelo */
        .btn-modelo { background: #e2e8f0; color: #475569; padding: 8px 12px; border-radius: 8px; font-size: 10px; font-weight: bold; border: none; cursor: pointer; margin-right: 5px; margin-bottom: 5px; }
        .dark-mode .btn-modelo { background: #334155; color: #f1f5f9; }
    </style>
</head>
<body class="pb-32">

    <div id="telaLogin">
        <h1 class="text-2xl font-bold mb-4">ZapCaderno</h1>
        <input type="email" id="logEmail" placeholder="E-mail">
        <input type="password" id="logSenha" placeholder="Senha">
        <button id="btnEntrar" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold border-none">ENTRAR</button>
    </div>

    <header class="bg-indigo-600 text-white p-6 pb-12 rounded-b-[30px]">
        <div class="flex justify-between">
            <div>
                <h1 id="headerNome" class="text-lg font-bold uppercase">MINHA LOJA</h1>
                <p id="headerPix" class="text-xs opacity-80">PIX: Não configurado</p>
            </div>
            <button onclick="document.body.classList.toggle('dark-mode')" class="text-xl bg-transparent border-none text-white"><i class="fas fa-moon"></i></button>
        </div>
    </header>

    <main class="p-4 -mt-8">
        <div id="dashboard" class="tab-content active">
            <div class="card mb-4">
                <p class="text-[10px] font-bold text-gray-400">TOTAL A RECEBER</p>
                <p id="totalReceber" class="text-3xl font-bold">R$ 0,00</p>
                <p id="txtProgresso" class="text-[10px] mt-2 text-gray-400">Carregando dados...</p>
            </div>
            <div id="listaDividas"></div>
        </div>

        <div id="orcamentos" class="tab-content">
            <h2 class="font-bold mb-3 text-indigo-600">Meus Orçamentos</h2>
            <div id="listaOrcamentos"></div>
        </div>

        <div id="novo" class="tab-content">
            <div class="card">
                <h2 class="font-bold mb-4">Novo Registro</h2>
                
                <p class="text-[10px] font-bold text-gray-400 mb-2 uppercase">Modelos Rápidos:</p>
                <div class="flex flex-wrap mb-3">
                    <button class="btn-modelo" onclick="aplicarModelo('servico')">🛠️ SERVIÇO/OBRA</button>
                    <button class="btn-modelo" onclick="aplicarModelo('beleza')">💅 BELEZA</button>
                    <button class="btn-modelo" onclick="aplicarModelo('venda')">🛍️ PRODUTOS</button>
                </div>

                <input type="text" id="nome" placeholder="Nome do Cliente">
                <input type="text" id="whatsapp" placeholder="WhatsApp (DDD+Número)">
                <input type="text" id="produto" placeholder="O que comprou / Serviço?">
                <input type="text" id="valor" placeholder="Valor (Ex: 15,00)">
                
                <div class="grid grid-cols-2 gap-2 mt-2">
                    <button id="btnVenda" class="bg-indigo-600 text-white py-3 rounded-lg border-none font-bold">VENDA</button>
                    <button id="btnOrc" class="bg-gray-400 text-white py-3 rounded-lg border-none font-bold">ORÇAMENTO</button>
                </div>
            </div>
        </div>

        <div id="config" class="tab-content">
            <div class="card">
                <h2 class="font-bold mb-4">Configurações</h2>
                <input type="text" id="confNome" placeholder="Nome da Empresa">
                <input type="text" id="confPix" placeholder="Sua Chave PIX">
                <button id="btnSalvarConfig" class="w-full bg-green-500 text-white py-3 rounded-lg border-none font-bold">SALVAR DADOS</button>
            </div>
        </div>
    </main>

    <nav class="nav-bar">
        <button id="tabDash" class="nav-btn active"><i class="fas fa-home"></i></button>
        <button id="tabOrc" class="nav-btn"><i class="fas fa-file-invoice-dollar"></i></button>
        <button id="tabNovo" class="btn-plus"><i class="fas fa-plus"></i></button>
        <button id="tabConf" class="nav-btn"><i class="fas fa-cog"></i></button>
        <button id="btnLogout" class="nav-btn"><i class="fas fa-sign-out-alt"></i></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, doc, updateDoc, deleteDoc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyASmjopW-EUIpZUsVFESFwMvpUZTMcdvMU",
            authDomain: "zapcaderno.firebaseapp.com",
            projectId: "zapcaderno",
            storageBucket: "zapcaderno.firebasestorage.app",
            messagingSenderId: "446641643061",
            appId: "1:446641643061:web:daf768922b53614f229b7c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let empresa = { nome: "ZAPCADERNO", pix: "Não definido" };

        // --- MODELOS DE TEXTO ---
        window.aplicarModelo = (tipo) => {
            const campo = document.getElementById('produto');
            if(tipo === 'servico') campo.value = "Mão de obra + Materiais inclusos";
            if(tipo === 'beleza') campo.value = "Combo Manicure + Pedicure completo";
            if(tipo === 'venda') campo.value = "Kit Cosméticos (Entrega em mãos)";
        };

        const openTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if(id === 'dashboard') document.getElementById('tabDash').classList.add('active');
            if(id === 'orcamentos') document.getElementById('tabOrc').classList.add('active');
            if(id === 'config') document.getElementById('tabConf').classList.add('active');
        };

        document.getElementById('tabDash').onclick = () => openTab('dashboard');
        document.getElementById('tabOrc').onclick = () => openTab('orcamentos');
        document.getElementById('tabNovo').onclick = () => openTab('novo');
        document.getElementById('tabConf').onclick = () => openTab('config');
        document.getElementById('btnLogout').onclick = () => signOut(auth);

        document.getElementById('btnEntrar').onclick = () => {
            const e = document.getElementById('logEmail').value;
            const s = document.getElementById('logSenha').value;
            signInWithEmailAndPassword(auth, e, s).catch(() => alert("Falha no login!"));
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('telaLogin').style.display = 'none';
                await loadConfig(user.uid);
                initData(user.uid);
            } else {
                document.getElementById('telaLogin').style.display = 'flex';
            }
        });

        async function loadConfig(uid) {
            const snap = await getDoc(doc(db, "configuracoes", uid));
            if (snap.exists()) {
                empresa = snap.data();
                document.getElementById('headerNome').innerText = empresa.nome;
                document.getElementById('headerPix').innerText = "PIX: " + empresa.pix;
                document.getElementById('confNome').value = empresa.nome;
                document.getElementById('confPix').value = empresa.pix;
            }
        }

        document.getElementById('btnSalvarConfig').onclick = async () => {
            const n = document.getElementById('confNome').value;
            const p = document.getElementById('confPix').value;
            await setDoc(doc(db, "configuracoes", auth.currentUser.uid), { nome: n, pix: p });
            alert("Dados Salvos!");
            location.reload();
        };

        const salvar = async (tipo) => {
            const val = parseFloat(document.getElementById('valor').value.replace(',', '.'));
            if(!val) return alert("Digite um valor!");
            await addDoc(collection(db, tipo === 'venda' ? "vendas" : "orcamentos"), {
                uid: auth.currentUser.uid,
                nome: document.getElementById('nome').value,
                whatsapp: document.getElementById('whatsapp').value.replace(/\D/g,''),
                produto: document.getElementById('produto').value || "Produto",
                valor: val,
                pago: false,
                data: new Date()
            });
            alert("Salvo com sucesso!");
            document.getElementById('nome').value=''; document.getElementById('valor').value='';
            openTab(tipo === 'venda' ? 'dashboard' : 'orcamentos');
        };

        document.getElementById('btnVenda').onclick = () => salvar('venda');
        document.getElementById('btnOrc').onclick = () => salvar('orcamento');

        function initData(uid) {
            onSnapshot(query(collection(db, "vendas"), where("uid", "==", uid)), (snap) => {
                let total = 0;
                const div = document.getElementById('listaDividas');
                div.innerHTML = '';
                snap.forEach(s => {
                    const d = s.data();
                    if(!d.pago) {
                        total += d.valor;
                        div.innerHTML += `
                            <div class="card">
                                <div class="flex justify-between">
                                    <b>${d.nome}</b>
                                    <span class="text-red-500 font-bold">R$ ${d.valor.toFixed(2)}</span>
                                </div>
                                <div class="flex gap-2 mt-3">
                                    <a href="https://wa.me/55${d.whatsapp}?text=Olá ${d.nome}, aqui é da ${empresa.nome}. Pendência de R$ ${d.valor.toFixed(2)}. PIX: ${empresa.pix}" class="flex-1 bg-green-500 text-white text-center py-2 rounded-lg no-underline font-bold text-xs">COBRAR</a>
                                    <button onclick="window.receber('${s.id}')" class="flex-1 bg-indigo-600 text-white rounded-lg border-none font-bold text-xs">RECEBI</button>
                                </div>
                            </div>`;
                    }
                });
                document.getElementById('totalReceber').innerText = `R$ ${total.toFixed(2).replace('.', ',')}`;
                document.getElementById('txtProgresso').innerText = "Vendas atualizadas.";
            });

            onSnapshot(query(collection(db, "orcamentos"), where("uid", "==", uid)), (snap) => {
                const div = document.getElementById('listaOrcamentos');
                div.innerHTML = '';
                snap.forEach(s => {
                    const o = s.data();
                    div.innerHTML += `
                        <div class="card border-dashed">
                            <div class="flex justify-between items-start">
                                <div><b>${o.nome}</b><p class="text-[10px] text-gray-400">${o.produto}</p></div>
                                <span class="text-indigo-600 font-bold">R$ ${o.valor.toFixed(2)}</span>
                            </div>
                            <div class="flex gap-2 mt-3">
                                <a href="https://wa.me/55${o.whatsapp}?text=Olá ${o.nome}, aqui é da ${empresa.nome}. Conforme solicitado, segue seu ORÇAMENTO:%0A%0A*Serviço:* ${o.produto}%0A*Valor:* R$ ${o.valor.toFixed(2)}%0A%0A_Aguardamos seu retorno!_" class="flex-1 bg-green-500 text-white text-center py-2 rounded-lg no-underline font-bold text-[10px]">ENVIAR ZAP</a>
                                <button onclick="window.converter('${s.id}')" class="flex-1 bg-indigo-500 text-white rounded-lg border-none font-bold text-[10px]">VIRAR VENDA</button>
                            </div>
                        </div>`;
                });
            });
        }

        window.receber = async (id) => {
            if(confirm("Confirmar pagamento?")) await updateDoc(doc(db, "vendas", id), { pago: true });
        };

        window.converter = async (id) => {
            const snap = await getDoc(doc(db, "orcamentos", id));
            if(snap.exists()) {
                await addDoc(collection(db, "vendas"), { ...snap.data(), data: new Date() });
                await deleteDoc(doc(db, "orcamentos", id));
                openTab('dashboard');
            }
        };
    </script>
</body>
</html>
