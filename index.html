<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZapCaderno Pro</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: #1e293b; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: white; margin: 0; padding-bottom: 110px; overflow-x: hidden; }
        .tab-content { display: none; padding: 20px; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: var(--card); border-radius: 20px; padding: 18px; border: 1px solid #334155; margin-bottom: 12px; transition: transform 0.2s; }
        .card:active { transform: scale(0.99); }
        .nav-bar { position: fixed; bottom: 15px; left: 15px; right: 15px; height: 75px; background: #1e293b; border-radius: 25px; display: flex; justify-content: space-around; align-items: center; border: 1px solid #334155; z-index: 1000; background: rgba(30,41,59,0.95); backdrop-filter: blur(10px); }
        .btn-plus { background: var(--primary); color: white; width: 55px; height: 55px; border-radius: 18px; display: flex; align-items: center; justify-content: center; margin-top: -45px; border: none; cursor: pointer; transition: transform 0.2s; }
        .btn-plus:active { transform: scale(0.95); }
        input, textarea, select { background: #0f172a; border: 1px solid #334155; width: 100%; padding: 14px; border-radius: 14px; margin-bottom: 10px; color: white; font-size: 16px; transition: border 0.2s; }
        input:focus, textarea:focus { outline: none; border-color: var(--primary); }
        button { cursor: pointer; transition: all 0.2s ease; }
        button:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }
        #overlay { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 30px; }
        .loading { display: inline-block; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: white; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .toast { position: fixed; bottom: 100px; left: 20px; right: 20px; background: #1e293b; padding: 12px; border-radius: 12px; text-align: center; z-index: 10001; animation: slideUp 0.3s ease; border-left: 4px solid var(--primary); }
        @keyframes slideUp { from { transform: translateY(100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @media (max-width: 400px) { .nav-bar button i { font-size: 1rem; } .card { padding: 12px; } .text-4xl { font-size: 1.8rem; } }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 class="text-3xl font-black mb-6 italic text-indigo-400">ZAPCADERNO</h1>
        <input type="email" id="l-email" placeholder="E-mail" autocomplete="email">
        <input type="password" id="l-senha" placeholder="Senha (mínimo 6 caracteres)" autocomplete="new-password">
        <button id="btnEntrar" class="w-full bg-indigo-600 py-4 rounded-xl font-bold mb-3">ENTRAR</button>
        <button id="btnCadastrar" class="text-indigo-400 text-sm font-bold bg-transparent border-none">CRIAR NOVA CONTA</button>
        <div class="text-center mt-6 text-xs opacity-40">
            <p>🔒 Dados protegidos e sincronizados na nuvem</p>
        </div>
    </div>

    <header class="bg-indigo-600 p-6 pb-16 rounded-b-[40px] flex justify-between items-center shadow-lg">
        <div>
            <h1 id="header-loja" class="text-xl font-bold uppercase">MEU CADERNO</h1>
            <p class="text-[10px] opacity-60 uppercase font-bold tracking-widest"><i class="fas fa-circle text-green-400"></i> Online</p>
        </div>
        <button onclick="abrir('config')" class="bg-white bg-opacity-10 w-10 h-10 rounded-full border-none text-white hover:bg-opacity-20 transition"><i class="fas fa-cog"></i></button>
    </header>

    <main class="-mt-10">
        <section id="dashboard" class="tab-content active">
            <div class="card bg-gradient-to-br from-indigo-900 to-black border-none p-6 mb-6">
                <span class="text-[10px] font-bold opacity-50 uppercase">Total em Débito</span>
                <h2 id="total-txt" class="text-4xl font-black">R$ 0,00</h2>
            </div>
            <div id="lista-vendas" class="space-y-3"></div>
        </section>

        <section id="historico" class="tab-content">
            <h2 class="text-lg font-bold mb-4">📋 Pagamentos Recebidos</h2>
            <div id="lista-pagos" class="space-y-3"></div>
        </section>

        <section id="novo" class="tab-content">
            <div class="card">
                <h2 class="text-lg font-bold mb-6 text-center text-indigo-400 uppercase">➕ Novo Registro</h2>
                <input type="text" id="v-nome" placeholder="Nome do Cliente *" maxlength="100">
                <input type="tel" id="v-whats" placeholder="WhatsApp (11 99999-9999)" pattern="[0-9]{10,11}">
                <input type="text" id="v-item" placeholder="O que vendeu?" maxlength="200">
                <input type="number" id="v-valor" placeholder="Valor R$ *" step="0.01" min="0.01">
                <button id="btnSalvar" class="w-full bg-indigo-600 py-4 rounded-xl font-bold mt-2 hover:bg-indigo-700 transition">💾 SALVAR AGORA</button>
            </div>
        </section>

        <section id="orcamentos" class="tab-content">
            <div class="card">
                <h2 class="text-lg font-bold mb-4 uppercase">📄 Novo Orçamento</h2>
                <input type="text" id="o-nome" placeholder="Cliente *" maxlength="100">
                <input type="tel" id="o-whats" placeholder="WhatsApp (11 99999-9999)" pattern="[0-9]{10,11}">
                <textarea id="o-desc" rows="3" placeholder="Descrição do serviço..." maxlength="500"></textarea>
                <input type="number" id="o-total" placeholder="Total R$ *" step="0.01" min="0.01">
                <button id="btnSalvarOrc" class="w-full bg-indigo-600 py-4 rounded-xl font-bold hover:bg-indigo-700 transition">📌 REGISTRAR ORÇAMENTO</button>
            </div>
            <div id="lista-orc" class="mt-4"></div>
        </section>

        <section id="config" class="tab-content">
            <div class="card">
                <h2 class="text-lg font-bold mb-4">⚙️ Meu Perfil</h2>
                <input type="text" id="c-loja" placeholder="Nome da Loja *" maxlength="50">
                <input type="text" id="c-pix" placeholder="Chave PIX (e-mail/telefone/CPF)">
                <button id="btnConfig" class="w-full bg-indigo-600 py-4 rounded-xl font-bold hover:bg-indigo-700 transition">💾 SALVAR DADOS</button>
                <button id="btnSair" class="w-full mt-10 text-red-400 font-bold bg-transparent hover:bg-red-900 hover:bg-opacity-20 py-3 rounded-xl transition">🚪 Sair da Conta</button>
            </div>
        </section>
    </main>

    <nav class="nav-bar">
        <button onclick="abrir('dashboard')" id="btn-dashboard" class="bg-transparent border-none text-indigo-400 transition"><i class="fas fa-book text-xl"></i><span class="text-xs block">Vendas</span></button>
        <button onclick="abrir('historico')" id="btn-historico" class="bg-transparent border-none text-gray-500 transition"><i class="fas fa-history text-xl"></i><span class="text-xs block">Histórico</span></button>
        <button onclick="abrir('novo')" class="btn-plus"><i class="fas fa-plus text-xl"></i></button>
        <button onclick="abrir('orcamentos')" id="btn-orcamentos" class="bg-transparent border-none text-gray-500 transition"><i class="fas fa-file-invoice text-xl"></i><span class="text-xs block">Orçamentos</span></button>
        <button onclick="abrir('config')" id="btn-config" class="bg-transparent border-none text-gray-500 transition"><i class="fas fa-user-cog text-xl"></i><span class="text-xs block">Perfil</span></button>
    </nav>

    <script>
        // CONFIGURAÇÃO DO FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyASmjopW-EUIpZUsVFESFwMvpUZTMcdvMU",
            authDomain: "zapcaderno.firebaseapp.com",
            projectId: "zapcaderno",
            storageBucket: "zapcaderno.firebasestorage.app",
            messagingSenderId: "446641643061",
            appId: "1:446641643061:web:daf768922b53614f229b7c"
        };
        
        // INICIALIZAÇÃO
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        // VARIÁVEIS GLOBAIS
        let configLoja = { loja: "ZAPCADERNO", pix: "" };
        let currentToast = null;
        
        // FUNÇÃO PARA EXIBIR TOAST (notificações elegantes)
        function showToast(mensagem, tipo = 'info') {
            if(currentToast) currentToast.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.borderLeftColor = tipo === 'success' ? '#10b981' : tipo === 'error' ? '#ef4444' : '#6366f1';
            toast.innerHTML = `<span>${mensagem}</span>`;
            document.body.appendChild(toast);
            currentToast = toast;
            setTimeout(() => { if(toast) toast.remove(); if(currentToast === toast) currentToast = null; }, 3000);
        }
        
        // FUNÇÃO DE SEGURANÇA - Prevenir XSS
        function escapeHtml(texto) {
            if(!texto) return '';
            const div = document.createElement('div');
            div.textContent = texto;
            return div.innerHTML;
        }
        
        // FUNÇÃO PARA VALIDAR WHATSAPP
        function validarWhatsapp(numero) {
            if(!numero) return false;
            let clean = numero.replace(/\D/g, '');
            if(clean.length === 10) clean = clean.slice(0,2) + '9' + clean.slice(2);
            return clean.length === 11 && /^[1-9]{2}9[0-9]{8}$/.test(clean);
        }
        
        function formatarWhatsapp(numero) {
            if(!numero) return '';
            let clean = numero.replace(/\D/g, '');
            if(clean.length === 10) clean = clean.slice(0,2) + '9' + clean.slice(2);
            return clean;
        }
        
        // FUNÇÃO ABRIR ABA
        function abrir(id) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            const target = document.getElementById(id);
            if(target) target.classList.add('active');
            
            document.querySelectorAll('.nav-bar button').forEach(b => {
                if(!b.classList.contains('btn-plus')) {
                    b.classList.remove('text-indigo-400');
                    b.classList.add('text-gray-500');
                }
            });
            
            const btnCorrespondente = document.getElementById('btn-' + id);
            if(btnCorrespondente && !btnCorrespondente.classList.contains('btn-plus')) {
                btnCorrespondente.classList.remove('text-gray-500');
                btnCorrespondente.classList.add('text-indigo-400');
            }
        }
        
        // VERIFICAR AUTENTICAÇÃO
        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('overlay').style.display = 'none';
                iniciarApp(user.uid);
            } else {
                document.getElementById('overlay').style.display = 'flex';
                // Limpar campos de login
                document.getElementById('l-email').value = '';
                document.getElementById('l-senha').value = '';
            }
        });
        
        // FUNÇÃO PRINCIPAL DO APP
        function iniciarApp(uid) {
            if(!uid) return;
            
            // Sincronizar Configurações
            db.collection("configuracoes").doc(uid).onSnapshot(doc => {
                if(doc.exists) {
                    configLoja = doc.data();
                    document.getElementById('header-loja').innerText = configLoja.loja?.substring(0, 30) || "ZAPCADERNO";
                    document.getElementById('c-loja').value = configLoja.loja || "";
                    document.getElementById('c-pix').value = configLoja.pix || "";
                } else {
                    // Criar configuração inicial se não existir
                    db.collection("configuracoes").doc(uid).set({ loja: "MINHA LOJA", pix: "", criadoEm: Date.now() }).catch(e => console.error);
                }
            }, error => {
                console.error("Erro config:", error);
                showToast("Erro ao carregar configurações", "error");
            });
            
            // Sincronizar Vendas (limitado a 500 registros por performance)
            db.collection("vendas").where("uid", "==", uid).orderBy("data", "desc").limit(500).onSnapshot(snap => {
                const listV = document.getElementById('lista-vendas');
                const listP = document.getElementById('lista-pagos');
                let total = 0;
                listV.innerHTML = ''; 
                listP.innerHTML = '';
                
                const docs = [];
                snap.forEach(d => docs.push({id: d.id, ...d.data()}));
                
                if(docs.length === 0) {
                    listV.innerHTML = '<div class="card text-center opacity-50">✨ Nenhuma venda pendente</div>';
                    listP.innerHTML = '<div class="card text-center opacity-50">📝 Nenhum pagamento registrado</div>';
                    document.getElementById('total-txt').innerHTML = 'R$ 0,00';
                    return;
                }
                
                docs.forEach(v => {
                    const val = parseFloat(v.valor || 0);
                    if(!v.pago) {
                        total += val;
                        const nomeSeguro = escapeHtml(v.nome);
                        const itemSeguro = escapeHtml(v.item || 'Sem descrição');
                        const whatsRaw = v.whatsapp || '';
                        listV.innerHTML += `
                        <div class="card">
                            <div class="flex justify-between items-center">
                                <div class="flex-1">
                                    <b class="text-lg">${nomeSeguro}</b>
                                    <p class="text-xs opacity-40 mt-1">${itemSeguro}</p>
                                    ${whatsRaw ? `<p class="text-xs opacity-40 mt-1"><i class="fab fa-whatsapp"></i> ${escapeHtml(whatsRaw)}</p>` : ''}
                                </div>
                                <b class="text-indigo-400 text-xl ml-2">R$ ${val.toFixed(2)}</b>
                            </div>
                            <div class="flex gap-2 mt-4">
                                <button onclick="cobrar('${escapeHtml(whatsRaw)}', ${val}, '${nomeSeguro}')" class="flex-1 bg-green-600 p-2 rounded-xl font-bold border-none text-white hover:bg-green-700 transition" ${!whatsRaw ? 'disabled' : ''}>📱 COBRAR</button>
                                <button onclick="baixar('${v.id}', true)" class="flex-1 bg-gray-700 p-2 rounded-xl font-bold border-none text-white hover:bg-gray-600 transition">💰 PAGO</button>
                                <button onclick="excluir('vendas','${v.id}')" class="bg-red-900 px-3 rounded-xl border-none text-white hover:bg-red-800 transition"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>`;
                    } else {
                        listP.innerHTML += `
                        <div class="card flex justify-between items-center">
                            <div>
                                <b>${escapeHtml(v.nome)}</b>
                                ${v.item ? `<p class="text-xs opacity-40">${escapeHtml(v.item)}</p>` : ''}
                            </div>
                            <b class="text-green-400">R$ ${val.toFixed(2)}</b>
                        </div>`;
                    }
                });
                
                document.getElementById('total-txt').innerHTML = total.toLocaleString('pt-br',{style:'currency', currency:'BRL'});
                
                if(docs.filter(v => !v.pago).length === 0) {
                    listV.innerHTML = '<div class="card text-center opacity-50">🎉 Todas as vendas estão pagas!</div>';
                }
                if(docs.filter(v => v.pago).length === 0 && docs.length > 0) {
                    listP.innerHTML = '<div class="card text-center opacity-50">⏳ Nenhum pagamento registrado ainda</div>';
                }
            }, error => {
                console.error("Erro vendas:", error);
                document.getElementById('lista-vendas').innerHTML = '<div class="card text-red-400">❌ Erro ao carregar vendas. Verifique sua internet.</div>';
                showToast("Erro ao sincronizar vendas", "error");
            });
            
            // Sincronizar Orçamentos (limitado a 200)
            db.collection("orcamentos").where("uid", "==", uid).orderBy("data", "desc").limit(200).onSnapshot(snap => {
                const listO = document.getElementById('lista-orc');
                listO.innerHTML = '';
                const docs = [];
                snap.forEach(doc => docs.push({id: doc.id, ...doc.data()}));
                
                if(docs.length === 0) {
                    listO.innerHTML = '<div class="card text-center opacity-50">📄 Nenhum orçamento cadastrado</div>';
                    return;
                }
                
                docs.forEach(o => {
                    const val = parseFloat(o.valor || 0);
                    const nomeSeguro = escapeHtml(o.nome);
                    const detalhesSeguro = escapeHtml(o.detalhes || 'Sem descrição');
                    const whatsRaw = o.whats || '';
                    listO.innerHTML += `
                    <div class="card">
                        <div class="flex justify-between items-start mb-3">
                            <div class="flex-1">
                                <b class="text-lg">${nomeSeguro}</b>
                                ${whatsRaw ? `<p class="text-xs opacity-50 mt-1"><i class="fab fa-whatsapp"></i> ${escapeHtml(whatsRaw)}</p>` : ''}
                                <p class="text-sm mt-2 opacity-70">${detalhesSeguro}</p>
                            </div>
                            <b class="text-indigo-400 text-xl ml-3">R$ ${val.toFixed(2)}</b>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="cobrarOrc('${escapeHtml(whatsRaw)}', ${val}, '${nomeSeguro}')" class="flex-1 bg-green-600 p-2 rounded-xl font-bold border-none text-white hover:bg-green-700 transition" ${!whatsRaw ? 'disabled' : ''}>📱 COBRAR</button>
                            <button onclick="excluir('orcamentos','${o.id}')" class="bg-red-900 px-3 rounded-xl border-none text-white hover:bg-red-800 transition flex-1"><i class="fas fa-trash"></i> EXCLUIR</button>
                        </div>
                    </div>`;
                });
            }, error => {
                console.error("Erro orçamentos:", error);
                document.getElementById('lista-orc').innerHTML = '<div class="card text-red-400">❌ Erro ao carregar orçamentos</div>';
            });
        }
        
        // FUNÇÕES GLOBAIS
        
        window.cobrar = (tel, val, nome) => {
            if(!tel || tel === 'null' || tel === 'undefined') {
                showToast("⚠️ Cliente não tem WhatsApp cadastrado!", "error");
                return;
            }
            if(!validarWhatsapp(tel)) {
                showToast("⚠️ Número de WhatsApp inválido! Use DDD + número (ex: 11999999999)", "error");
                return;
            }
            const numero = formatarWhatsapp(tel);
            const mensagem = `Olá ${nome}, lembrete da loja ${configLoja.loja || 'ZAPCADERNO'}. Valor pendente: R$ ${val.toFixed(2)}. Chave Pix: ${configLoja.pix || 'não cadastrada'}`;
            window.open(`https://wa.me/55${numero}?text=${encodeURIComponent(mensagem)}`, '_blank');
            showToast("📱 Abrindo WhatsApp...", "success");
        };
        
        window.cobrarOrc = (tel, val, nome) => {
            if(!tel || tel === 'null' || tel === 'undefined') {
                showToast("⚠️ Cliente não tem WhatsApp cadastrado!", "error");
                return;
            }
            if(!validarWhatsapp(tel)) {
                showToast("⚠️ Número de WhatsApp inválido! Use DDD + número (ex: 11999999999)", "error");
                return;
            }
            const numero = formatarWhatsapp(tel);
            const mensagem = `Olá ${nome}, conforme nosso orçamento, o valor ficou em R$ ${val.toFixed(2)}. Chave Pix: ${configLoja.pix || 'não cadastrada'}`;
            window.open(`https://wa.me/55${numero}?text=${encodeURIComponent(mensagem)}`, '_blank');
            showToast("📱 Abrindo WhatsApp...", "success");
        };
        
        window.baixar = async (id, pago) => {
            if(!auth.currentUser) return showToast("Faça login novamente", "error");
            try {
                await db.collection("vendas").doc(id).update({pago: pago, dataPagamento: Date.now()});
                showToast("✅ Registro marcado como pago!", "success");
            } catch(e) {
                showToast("❌ Erro ao atualizar: " + e.message, "error");
            }
        };
        
        window.excluir = async (colecao, id) => {
            if(!auth.currentUser) return showToast("Faça login novamente", "error");
            if(confirm("⚠️ Tem certeza que deseja excluir permanentemente este registro?\n\nEsta ação NÃO pode ser desfeita!")) {
                try {
                    await db.collection(colecao).doc(id).delete();
                    showToast("🗑️ Registro excluído com sucesso!", "success");
                } catch(e) {
                    showToast("❌ Erro ao excluir: " + e.message, "error");
                }
            }
        };
        
        // BOTÃO SALVAR VENDA
        let salvandoVenda = false;
        document.getElementById('btnSalvar').onclick = async () => {
            if(salvandoVenda) return;
            if(!auth.currentUser) return showToast("Faça login novamente", "error");
            
            const nome = document.getElementById('v-nome').value.trim();
            const valor = parseFloat(document.getElementById('v-valor').value);
            const whats = document.getElementById('v-whats').value.trim();
            
            if(!nome) {
                showToast("❌ Digite o nome do cliente!", "error");
                return;
            }
            if(isNaN(valor) || valor <= 0) {
                showToast("❌ Digite um valor válido (maior que zero)!", "error");
                return;
            }
            if(whats && !validarWhatsapp(whats)) {
                showToast("⚠️ WhatsApp inválido! Use formato: 11999999999", "error");
                return;
            }
            
            salvandoVenda = true;
            const btn = document.getElementById('btnSalvar');
            const txtOriginal = btn.innerText;
            btn.innerText = "💾 Salvando...";
            btn.disabled = true;
            
            try {
                const venda = {
                    uid: auth.currentUser.uid,
                    nome: nome.substring(0, 100),
                    whatsapp: whats,
                    item: document.getElementById('v-item').value.trim().substring(0, 200),
                    valor: valor,
                    pago: false,
                    data: Date.now()
                };
                await db.collection("vendas").add(venda);
                showToast("✅ Venda salva com sucesso!", "success");
                document.getElementById('v-nome').value = '';
                document.getElementById('v-whats').value = '';
                document.getElementById('v-item').value = '';
                document.getElementById('v-valor').value = '';
                abrir('dashboard');
            } catch(e) {
                showToast("❌ Erro ao salvar: " + e.message, "error");
            } finally {
                salvandoVenda = false;
                btn.innerText = txtOriginal;
                btn.disabled = false;
            }
        };
        
        // BOTÃO SALVAR ORÇAMENTO
        let salvandoOrc = false;
        document.getElementById('btnSalvarOrc').onclick = async () => {
            if(salvandoOrc) return;
            if(!auth.currentUser) return showToast("Faça login novamente", "error");
            
            const nome = document.getElementById('o-nome').value.trim();
            const valor = parseFloat(document.getElementById('o-total').value);
            const whats = document.getElementById('o-whats').value.trim();
            
            if(!nome) {
                showToast("❌ Digite o nome do cliente!", "error");
                return;
            }
            if(isNaN(valor) || valor <= 0) {
                showToast("❌ Digite um valor válido (maior que zero)!", "error");
                return;
            }
            if(whats && !validarWhatsapp(whats)) {
                showToast("⚠️ WhatsApp inválido! Use formato: 11999999999", "error");
                return;
            }
            
            salvandoOrc = true;
            const btn = document.getElementById('btnSalvarOrc');
            const txtOriginal = btn.innerText;
            btn.innerText = "📌 Salvando...";
            btn.disabled = true;
            
            try {
                const orcamento = {
                    uid: auth.currentUser.uid,
                    nome: nome.substring(0, 100),
                    whats: whats,
                    detalhes: document.getElementById('o-desc').value.trim().substring(0, 500),
                    valor: valor,
                    data: Date.now()
                };
                await db.collection("orcamentos").add(orcamento);
                showToast("✅ Orçamento salvo com sucesso!", "success");
                document.getElementById('o-nome').value = '';
                document.getElementById('o-whats').value = '';
                document.getElementById('o-desc').value = '';
                document.getElementById('o-total').value = '';
                abrir('orcamentos');
            } catch(e) {
                showToast("❌ Erro ao salvar: " + e.message, "error");
            } finally {
                salvandoOrc = false;
                btn.innerText = txtOriginal;
                btn.disabled = false;
            }
        };
        
        // BOTÃO CONFIGURAÇÕES
        document.getElementById('btnConfig').onclick = async () => {
            if(!auth.currentUser) return showToast("Faça login novamente", "error");
            
            const loja = document.getElementById('c-loja').value.trim().toUpperCase();
            const pix = document.getElementById('c-pix').value.trim();
            
            if(!loja) {
                showToast("❌ Digite o nome da sua loja!", "error");
                return;
            }
            
            const btn = document.getElementById('btnConfig');
            const txtOriginal = btn.innerText;
            btn.innerText = "💾 Salvando...";
            btn.disabled = true;
            
            try {
                await db.collection("configuracoes").doc(auth.currentUser.uid).set({
                    loja: loja.substring(0, 50),
                    pix: pix,
                    atualizadoEm: Date.now()
                }, { merge: true });
                showToast("✅ Perfil atualizado com sucesso!", "success");
            } catch(e) {
                showToast("❌ Erro ao salvar: " + e.message, "error");
            } finally {
                btn.innerText = txtOriginal;
                btn.disabled = false;
            }
        };
        
        // BOTÃO SAIR
        document.getElementById('btnSair').onclick = async () => {
            if(confirm("Tem certeza que deseja sair da conta?")) {
                try {
                    await auth.signOut();
                    showToast("👋 Você saiu da conta", "success");
                } catch(e) {
                    showToast("❌ Erro ao sair: " + e.message, "error");
                }
            }
        };
        
        // AUTENTICAÇÃO - LOGIN
        document.getElementById('btnEntrar').onclick = async () => {
            if(auth.currentUser) {
                showToast("⚠️ Você já está logado!", "error");
                return;
            }
            
            const email = document.getElementById('l-email').value.trim();
            const senha = document.getElementById('l-senha').value;
            
            if(!email || !senha) {
                showToast("❌ Preencha e-mail e senha!", "error");
                return;
            }
            
            const btn = document.getElementById('btnEntrar');
            const txtOriginal = btn.innerText;
            btn.innerText = "🔄 Entrando...";
            btn.disabled = true;
            
            try {
                await auth.signInWithEmailAndPassword(email, senha);
                showToast("✅ Login realizado com sucesso!", "success");
                document.getElementById('l-email').value = '';
                document.getElementById('l-senha').value = '';
            } catch(e) {
                let msg = "❌ Erro ao entrar: ";
                if(e.code === 'auth/user-not-found') msg += "Usuário não encontrado";
                else if(e.code === 'auth/wrong-password') msg += "Senha incorreta";
                else if(e.code === 'auth/invalid-email') msg += "E-mail inválido";
                else if(e.code === 'auth/too-many-requests') msg += "Muitas tentativas. Tente depois";
                else msg += e.message;
                showToast(msg, "error");
            } finally {
                btn.innerText = txtOriginal;
                btn.disabled = false;
            }
        };
        
        // AUTENTICAÇÃO - CADASTRO
        document.getElementById('btnCadastrar').onclick = async () => {
            if(auth.currentUser) {
                showToast("⚠️ Você já está logado! Saia antes de criar nova conta.", "error");
                return;
            }
            
            const email = document.getElementById('l-email').value.trim();
            const senha = document.getElementById('l-senha').value;
            
            if(!email || !senha) {
                showToast("❌ Preencha e-mail e senha!", "error");
                return;
            }
            if(senha.length < 6) {
                showToast("❌ A senha deve ter no mínimo 6 caracteres!", "error");
                return;
            }
            if(!email.includes('@') || !email.includes('.')) {
                showToast("❌ Digite um e-mail válido!", "error");
                return;
            }
            
            const btn = document.getElementById('btnCadastrar');
            const txtOriginal = btn.innerText;
            btn.innerText = "🔄 Criando conta...";
            btn.disabled = true;
            
            try {
                const cred = await auth.createUserWithEmailAndPassword(email, senha);
                await db.collection("configuracoes").doc(cred.user.uid).set({ 
                    loja: "MINHA LOJA", 
                    pix: "",
                    criadoEm: Date.now()
                });
                showToast("✅ Conta criada com sucesso! Bem-vindo!", "success");
                document.getElementById('l-email').value = '';
                document.getElementById('l-senha').value = '';
            } catch(e) {
                let msg = "❌ Erro ao criar conta: ";
                if(e.code === 'auth/email-already-in-use') msg += "E-mail já cadastrado";
                else if(e.code === 'auth/invalid-email') msg += "E-mail inválido";
                else if(e.code === 'auth/weak-password') msg += "Senha muito fraca";
                else msg += e.message;
                showToast(msg, "error");
            } finally {
                btn.innerText = txtOriginal;
                btn.disabled = false;
            }
        };
        
        // PREVENIR SUBMIT EM FORMS
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('keypress', (e) => {
                if(e.key === 'Enter') e.preventDefault();
            });
        });
    </script>
</body>
</html>
