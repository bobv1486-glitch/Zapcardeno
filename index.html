<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZapCaderno Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; -webkit-tap-highlight-color: transparent; }
        .dark-mode { background-color: #0f172a; color: #f1f5f9; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        #telaLogin { position: fixed; inset: 0; background: white; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .nav-bar { position: fixed; bottom: 20px; left: 15px; right: 15px; height: 70px; background: white; border-radius: 20px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); z-index: 100; }
        .dark-mode .nav-bar { background: #1e293b; }

        .btn-plus { background: #4f46e5; color: white; width: 55px; height: 55px; border-radius: 15px; display: flex; align-items: center; justify-content: center; margin-top: -40px; box-shadow: 0 5px 15px rgba(79, 70, 229, 0.4); border: none; }
        
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 10px; border: 1px solid #e2e8f0; }
        .dark-mode .card { background: #1e293b; border-color: #334155; }
        
        input { border: 1px solid #cbd5e1 !important; border-radius: 10px !important; padding: 12px !important; width: 100%; margin-bottom: 10px; background: #fff; color: #000; }
        .dark-mode input { background: #0f172a; color: #fff; border-color: #475569 !important; }
        
        .nav-btn { color: #94a3b8; font-size: 24px; background: none; border: none; cursor: pointer; }
        .nav-btn.active { color: #4f46e5; }

        /* Estilo para os botões de modelo */
        .btn-modelo { background: #e2e8f0; color: #475569; padding: 8px 12px; border-radius: 8px; font-size: 10px; font-weight: bold; border: none; cursor: pointer; margin-right: 5px; margin-bottom: 5px; }
        .dark-mode .btn-modelo { background: #334155; color: #f1f5f9; }
    </style>
</head>
<body class="pb-32">

    <div id="telaLogin">
        <h1 class="text-2xl font-bold mb-4">ZapCaderno</h1>
        <input type="email" id="logEmail" placeholder="E-mail">
        <input type="password" id="logSenha" placeholder="Senha">
        <button id="btnEntrar" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold border-none">ENTRAR</button>
    </div>

    <header class="bg-indigo-600 text-white p-6 pb-12 rounded-b-[30px]">
        <div class="flex justify-between">
            <div>
                <h1 id="headerNome" class="text-lg font-bold uppercase">MINHA LOJA</h1>
                <p id="headerPix" class="text-xs opacity-80">PIX: Não configurado</p>
            </div>
            <button onclick="document.body.classList.toggle('dark-mode')" class="text-xl bg-transparent border-none text-white"><i class="fas fa-moon"></i></button>
        </div>
    </header>

    <main class="p-4 -mt-8">
        <div id="dashboard" class="tab-content active">
            <div class="card mb-4">
                <p class="text-[10px] font-bold text-gray-400">TOTAL A RECEBER</p>
                <p id="totalReceber" class="text-3xl font-bold">R$ 0,00</p>
                <p id="txtProgresso" class="text-[10px] mt-2 text-gray-400">Carregando dados...</p>
            </div>
            <div id="listaDividas"></div>
        </div>

        <div id="orcamentos" class="tab-content">
            <h2 class="font-bold mb-3 text-indigo-600">Meus Orçamentos</h2>
            <div id="listaOrcamentos"></div>
        </div>

        <div id="novo" class="tab-content">
            <div class="card">
                <h2 class="font-bold mb-4">Novo Registro</h2>
                
                <p class="text-[10px] font-bold text-gray-400 mb-2 uppercase">Modelos Rápidos:</p>
                <div class="flex flex-wrap mb-3">
                    <button class="btn-modelo" onclick="aplicarModelo('servico')">🛠️ SERVIÇO/
