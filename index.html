<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZapCaderno Pro</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { color-scheme: dark; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #0a0a0a; color: #ffffff; margin: 0; padding: 0; overflow-x: hidden; }
        
        /* Controle de Telas Fixo */
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        #tela-carregamento, #tela-bloqueio, #tela-login {
            position: fixed; inset: 0; background: #0a0a0a; z-index: 9999;
            display: none; flex-direction: column; align-items: center; justify-content: center; padding: 30px;
        }

        /* Estilo App */
        .nav-bar { position: fixed; bottom: 20px; left: 15px; right: 15px; height: 75px; background: #161616; border-radius: 30px; display: flex; justify-content: space-around; align-items: center; box-shadow: 0 15px 35px rgba(0,0,0,0.9); z-index: 1000; border: 1px solid #222; }
        .btn-plus { background: #4f46e5; color: white; width: 65px; height: 65px; border-radius: 22px; display: flex; align-items: center; justify-content: center; margin-top: -45px; border: 4px solid #0a0a0a; font-size: 26px; box-shadow: 0 10px 20px rgba(79, 70, 229, 0.4); }
        .nav-btn { color: #444; font-size: 24px; transition: 0.3s; background: none; border: none; cursor: pointer; }
        .nav-btn.active { color: #818cf8; }
        .card { background: #161616; border-radius: 24px; padding: 22px; margin-bottom: 15px; border: 1px solid #222; }
        input, textarea { background: #1f1f1f !important; border: 1px solid #333 !important; border-radius: 14px !important; padding: 16px !important; width: 100%; margin-bottom: 12px; color: #fff !important; outline: none; }
    </style>
</head>
<body class="pb-36">

    <div id="tela-carregamento" style="display: flex;">
        <div class="h-12 w-12 animate-spin rounded-full border-4 border-indigo-600 border-t-transparent"></div>
        <p class="mt-4 text-xs font-bold text-gray-500 uppercase tracking-widest">Sincronizando...</p>
    </div>

    <div id="tela-bloqueio">
        <h2 class="text-4xl font-black text-red-600 italic mb-4">EXPIRADO</h2>
        <p class="text-gray-500 mb-8 text-center">Seu teste grátis acabou.<br>Ative o acesso vitalício.</p>
        <div class="text-6xl font-black mb-8">R$ 14,99</div>
        <a href="https://link.mercadopago.com.br/zapcaderno" target="_blank" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-bold text-center">LIBERAR AGORA</a>
        <button onclick="window.location.reload()" class="mt-6 text-gray-600 underline text-xs">JÁ PAGUEI? CLIQUE PARA ATUALIZAR</button>
    </div>

    <div id="tela-login">
        <h2 class="text-4xl font-black text-indigo-500 italic mb-8">ZAPCADERNO</h2>
        <input type="email" id="email" placeholder="E-mail">
        <input type="password" id="senha" placeholder="Senha">
        <button id="btn-entrar" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-bold">ENTRAR</button>
    </div>

    <header class="p-6 flex justify-between items-center">
        <div>
            <h1 id="header-nome" class="text-xl font-bold italic uppercase">ZAPCADERNO</h1>
            <div class="flex items-center gap-2">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <span id="label-acesso" class="text-[10px] text-gray-500 font-bold uppercase">Acesso Ativo</span>
            </div>
        </div>
        <button onclick="location.reload()" class="text-gray-500"><i class="fas fa-sync-alt"></i></button>
    </header>

    <main class="p-4">
        <div id="dashboard" class="tab-content active">
            <div class="card bg-gradient-to-br from-indigo-900/20 to-black">
                <p class="text-[10px] text-indigo-400 font-bold uppercase mb-1">Total Pendente</p>
                <p id="total-receber" class="text-4xl font-bold">R$ 0,00</p>
            </div>
            <div id="lista-vendas" class="space-y-3 mt-6"></div>
        </div>

        <div id="orcamentos" class="tab-content">
            <div class="card">
                <h3 class="text-indigo-400 text-xs font-bold mb-4 uppercase">Nova Proposta</h3>
                <input type="text" id="o-nome" placeholder="Nome do Cliente">
                <input type="text" id="o-whats" placeholder="WhatsApp">
                <textarea id="o-detalhe" placeholder="Descrição do serviço..."></textarea>
                <input type="number" id="o-valor" placeholder="Valor Total R$">
                <button id="btn-save-o" class="w-full bg-indigo-600 py-4 rounded-xl font-bold">GRAVAR ORÇAMENTO</button>
            </div>
        </div>

        <div id="novo" class="tab-content">
            <div class="card">
                <h3 class="text-indigo-400 text-xs font-bold mb-4 uppercase">Registrar Cobrança</h3>
                <input type="text" id="v-nome" placeholder="Nome do Cliente">
                <input type="text" id="v-whats" placeholder="WhatsApp">
                <input type="number" id="v-valor" placeholder="Valor R$">
                <input type="date" id="v-data">
                <button id="btn-save-v" class="w-full bg-indigo-600 py-4 rounded-xl font-bold">CONFIRMAR</button>
            </div>
        </div>
    </main>

    <nav class="nav-bar">
        <button onclick="changeTab('dashboard')" class="nav-btn active"><i class="fas fa-wallet"></i></button>
        <button onclick="changeTab('orcamentos')" class="nav-btn"><i class="fas fa-file-invoice"></i></button>
        <button onclick="changeTab('novo')" class="btn-plus"><i class="fas fa-plus"></i></button>
        <button onclick="alert('Funcionalidade em breve!')" class="nav-btn"><i class="fas fa-cog"></i></button>
    </nav>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, where, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyASmjopW-EUIpZUsVFESFwMvpUZTMcdvMU",
            authDomain: "zapcaderno.firebaseapp.com",
            projectId: "zapcaderno",
            storageBucket: "zapcaderno.firebasestorage.app",
            messagingSenderId: "446641643061",
            appId: "1:446641643061:web:daf768922b53614f229b7c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const API_SHEETDB = 'https://sheetdb.io/api/v1/2f431iyij8cgi';

        // --- CONTROLE DE ABAS ---
        window.changeTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            window.scrollTo(0,0);
        };

        // --- SISTEMA DE ACESSO (REVISADO) ---
        async function validarEntrada() {
            // 1. Checa pagamento
            try {
                const res = await fetch(API_SHEETDB);
                const dados = await res.json();
                if (dados.some(i => String(i.status).toLowerCase() === 'approved')) {
                    document.getElementById('label-acesso').innerText = "ASSINANTE VITALÍCIO";
                    document.getElementById('tela-carregamento').style.display = 'none';
                    return true;
                }
            } catch (e) { console.log("Erro API"); }

            // 2. Checa 15 dias
            let start = localStorage.getItem('zap_start_date');
            if (!start) {
                start = new Date().toISOString();
                localStorage.setItem('zap_start_date', start);
            }
            const diff = Math.floor((new Date() - new Date(start)) / (1000*60*60*24));

            if (diff > 15) {
                document.getElementById('tela-bloqueio').style.display = 'flex';
                document.getElementById('tela-carregamento').style.display = 'none';
                return false;
            } else {
                document.getElementById('label-acesso').innerText = `TESTE: ${15-diff} DIAS`;
                document.getElementById('tela-carregamento').style.display = 'none';
                return true;
            }
        }

        // --- LOGIN E MONITORAMENTO ---
        onAuthStateChanged(auth, async (user) => {
            const isAllowed = await validarEntrada();
            if (isAllowed) {
                if (user) {
                    document.getElementById('tela-login').style.display = 'none';
                    carregarDados(user.uid);
                } else {
                    document.getElementById('tela-login').style.display = 'flex';
                }
            }
        });

        document.getElementById('btn-entrar').onclick = () => {
            const e = document.getElementById('email').value;
            const s = document.getElementById('senha').value;
            signInWithEmailAndPassword(auth, e, s).catch(() => alert("Erro ao acessar!"));
        };

        function carregarDados(uid) {
            onSnapshot(query(collection(db, "vendas"), where("uid", "==", uid)), (snap) => {
                let total = 0;
                const lista = document.getElementById('lista-vendas');
                lista.innerHTML = '';
                snap.forEach(docSnap => {
                    const d = docSnap.data();
                    if (!d.pago) {
                        total += d.valor;
                        lista.innerHTML += `
                            <div class="card flex justify-between items-center border-l-4 border-indigo-600">
                                <div><b>${d.nome}</b><br><span class="text-[10px] text-gray-500 uppercase">${d.data}</span></div>
                                <div class="flex gap-2">
                                    <span class="font-bold text-indigo-400">R$ ${d.valor}</span>
                                    <button onclick="window.marcar('${docSnap.id}')" class="bg-indigo-600 text-[9px] font-black p-2 rounded-lg">PAGO</button>
                                </div>
                            </div>`;
                    }
                });
                document.getElementById('total-receber').innerText = `R$ ${total.toLocaleString('pt-BR')}`;
            });
        }

        window.marcar = async (id) => {
            if(confirm("Confirmar pagamento?")) await updateDoc(doc(db, "vendas", id), { pago: true });
        };

        document.getElementById('btn-save-v').onclick = async () => {
            await addDoc(collection(db, "vendas"), {
                uid: auth.currentUser.uid,
                nome: document.getElementById('v-nome').value,
                whatsapp: document.getElementById('v-whats').value,
                valor: parseFloat(document.getElementById('v-valor').value),
                data: document.getElementById('v-data').value,
                pago: false
            });
            alert("Salvo!");
            changeTab('dashboard');
        };
    </script>
</body>
</html>
